                    <div class="hero-label" style="color:var(--amber);">⏳ ОЧІКУВАННЯ</div>
                    <div class="hero-title">${escapeHtml(title)}</div>
                    <div class="hero-sub">Ви відмітили завершення. Очікуємо підтвердження партнера.</div>
                    <div style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;">
                        <div class="pulse-dot"></div>
                        <span style="font-size:13px;color:var(--text-secondary);">Очікування...</span>
                    </div>
                </div>`;
        }

        async function respondHandshake(partnerId, dirId, accept) {
            if (!beginOp('respond_handshake')) return;
            try {
                const res = await api('/api/v3/match/respond', { method: 'POST', body: JSON.stringify({ user_id: S.userId, target_id: partnerId, direction_id: dirId, accept }) });
                if (res?.status === 'ok') {
                    if (accept) notifyCriticalEvent('crew_formed_manual', `${partnerId}:${dirId}`);
                    showToast(accept ? '✓ Ваш екіпаж готовий!' : 'Запит відхилено', accept ? 'success' : '');
                    clearCriticalState();
                    await hydrate();
                    return true;
                } else if (res?.reason === 'action_forbidden') {
                    showToast('Після старту — тільки фініш', 'error');
                } else {
                    showToast(getErrorMessage(res, 'Не вдалось обробити запит'), 'error');
                }
            } catch (e) {
                showToast('Немає з\'єднання — спробуйте ще раз', 'error');
            } finally { endOp('respond_handshake'); }
            return false;
        }

        async function stopSearchFromHandshake(partnerId, dirId) {
            const safePartnerId = parseInt(partnerId, 10) || 0;
            const safeDirId = parseInt(dirId, 10) || 0;
            if (!safePartnerId || !safeDirId) {
                showToast('Запит не знайдено', 'error');
                return false;
            }
            if (!beginOp('stop_search')) return false;
            try {
                const res = await api('/api/v3/match/stop-search', {
                    method: 'POST',
                    silent: true,
                    body: JSON.stringify({ user_id: S.userId, target_id: safePartnerId, direction_id: safeDirId })
                });
                if (res?.status === 'ok') {
                    showToast('Пошук зупинено', 'success');
                    clearCriticalState();
                    removePendingMatchByPair(safePartnerId, safeDirId);
                    renderSubBar();
                    renderTrips();
                    verifyHandshakePanelState();
                    await hydrate();
                    return true;
                }
                showToast(getErrorMessage(res, 'Не вдалось зупинити пошук'), 'error');
            } catch (e) {
                showToast('Немає з\'єднання — спробуйте ще раз', 'error');
            } finally { endOp('stop_search'); }
            return false;
        }

        function verifyHandshakePanelState() {
            const panel = document.getElementById('handshake-panel');
            if (!panel) return;

            // Only show panel if we have incoming matches and NO active trip
            const incoming = S.pendingMatches.filter(m => m.scope === 'incoming');

            if (incoming.length === 0 || (S.activeTrip && S.activeTrip.is_started) || waitingForPartner) {
                panel.classList.remove('open');
                panel.innerHTML = '';
                document.body.style.paddingBottom = '';
                return;
            }

            const m = incoming[0];
            const partnerName = m.partner_name || m.sender_name || `#${m.partner_id}`;
            const partnerId = m.partner_id || m.sender_id;
            const dirTitle = m.direction || m.direction_title || 'Напрямок';

            document.body.style.paddingBottom = '170px';

            panel.innerHTML = `
                <div style="font-weight:800;font-size:14px;margin-bottom:4px;color:var(--accent);">🟢 Вхідний запит!</div>
                <div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:12px;">
                    <b>${escapeHtml(partnerName)}</b> • ${escapeHtml(dirTitle)}
                </div>
                <div style="display:flex;gap:10px;">
                    <button class="btn btn-primary" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, true)">✓ Прийняти</button>
                    <button class="btn btn-danger" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, false)">✕ Відхилити</button>
                </div>
                <button class="btn btn-secondary" style="width:100%;margin-top:10px;" onclick="stopSearchFromHandshake(${partnerId}, ${m.direction_id})">⏹️ Зупинити пошук</button>
            `;
            panel.classList.add('open');
        }

        function currentRequestIdFromTrip(trip) {
            const raw = trip?.id ?? trip?.request_id ?? null;
            const reqId = Number(raw);
            return Number.isFinite(reqId) && reqId > 0 ? reqId : null;
        }

        function tripViewerFinished(trip) {
            if (!trip) return false;
            return trip.viewer_role === 'driver' ? !!trip.driver_finished : !!trip.client_finished;
        }

        function tripPartnerFinished(trip) {
            if (!trip) return false;
            return trip.viewer_role === 'driver' ? !!trip.client_finished : !!trip.driver_finished;
        }

        function shouldPromptPartnerFinish(trip) {
            return !!trip && !!currentRequestIdFromTrip(trip) && tripPartnerFinished(trip) && !tripViewerFinished(trip);
        }

        function maybeOpenPartnerFinishSheet(trip = S.activeTrip) {
            const reqId = currentRequestIdFromTrip(trip);
            if (!reqId || !shouldPromptPartnerFinish(trip)) return false;
            if (S.partnerFinishSheetShownIds.has(reqId)) return false;
            if (isAppInBackground || S.roleGateOpen || S.matchSheetOpen || isSheetOpen()) return false;

            S.partnerFinishSheetShownIds.add(reqId);
            const title = escapeHtml(trip.direction_title || 'поїздка');
            const partner = trip.viewer_role === 'driver' ? 'Попутник' : 'Водій';
            openSheet(`
                <div class="sheet-title">🏁 ${partner} відмітив фініш</div>
                <div class="sheet-sub">Поїздка «${title}» чекає вашого підтвердження. Натисніть завершення тільки якщо ви справді доїхали.</div>
                <div class="sheet-actions">
                    <button class="btn btn-success" id="partner-finish-confirm">✅ Підтвердити завершення</button>
                    <button class="btn btn-secondary" id="partner-finish-open">Відкрити Поїздки</button>
                    <button class="btn btn-ghost" id="partner-finish-later">Ще в дорозі</button>
                </div>
            `);
            document.getElementById('partner-finish-confirm').onclick = () => { closeSheet(); finishTrip(); };
            document.getElementById('partner-finish-open').onclick = () => { closeSheet(); switchScreen('trips'); };
            document.getElementById('partner-finish-later').onclick = () => { closeSheet(); showToast('Фініш лишився у Поїздках', ''); };
            return true;
        }

        function notifyLifecycleTransitions(prevTrip, nextTrip, options = {}) {
            if (!nextTrip) return;
            const reqId = currentRequestIdFromTrip(nextTrip);
            if (!reqId) return;
            const sameTrip = prevTrip && currentRequestIdFromTrip(prevTrip) === reqId;
            if (!sameTrip && options.allowNewTrip) {
                notifyCriticalEvent('crew_formed', reqId);
            }
            if (sameTrip && prevTrip.status !== 'pickup' && nextTrip.status === 'pickup' && nextTrip.viewer_role !== 'driver' && !S.pickupNotifiedIds.has(reqId)) {
                S.pickupNotifiedIds.add(reqId);
                notifyCriticalEvent('pickup_arrived', reqId);
                showToast('🚗 Водій прибув до точки збору!', 'success');
            }
            if (sameTrip && !prevTrip.is_started && nextTrip.is_started && nextTrip.viewer_role !== 'driver' && !S.tripStartNotifiedIds.has(reqId)) {
                S.tripStartNotifiedIds.add(reqId);
                notifyCriticalEvent('trip_started', reqId);
                showToast('🚀 Водій почав поїздку. Скасування закрито', 'success');
            }
            if (sameTrip && !tripPartnerFinished(prevTrip) && tripPartnerFinished(nextTrip) && !tripViewerFinished(nextTrip) && !S.partnerFinishNotifiedIds.has(reqId)) {
                S.partnerFinishNotifiedIds.add(reqId);
                notifyCriticalEvent('finish_confirmation_needed', reqId);
                showToast('🏁 Партнер відмітив фініш. Підтвердіть у Поїздках', '');
            }
            maybeOpenPartnerFinishSheet(nextTrip);
        }

        function buildCrewTree(trip) {
            if (!trip || !trip.members) return '';
            const isDriver = trip.viewer_role === 'driver';
            // Sort: driver first, then passengers, then empty seats
            const sorted = [...trip.members].sort((a, b) => {
                if (a.role === 'driver') return -1;
                if (b.role === 'driver') return 1;
                return 0;
            });
            const totalSeats = trip.total_seats || sorted.length + 1;
            const emptySeats = Math.max(0, totalSeats - sorted.length);
            let html = '<div class="crew-tree">';
            sorted.forEach((m, i) => {
                const isLast = i === sorted.length - 1 && emptySeats === 0;
                const connector = i === 0 ? '' : (isLast ? '└' : '├');
                const isMe = String(m.user_id) === String(S.userId);
                const icon = m.role === 'driver' ? '🚗' : '👤';
                const name = escapeHtml(m.name || `#${m.user_id || '?'}`);
                const roleLabel = m.role === 'driver' ? 'водій' : (isMe ? 'Ви' : '');
                html += `<div class="crew-member${isMe ? ' is-self' : ''}">
                    ${connector ? `<span class="crew-connector">${connector} </span>` : ''}
                    <span class="crew-icon">${icon}</span>
                    <span>${name}</span>
                    ${roleLabel ? `<span class="crew-role">${roleLabel}</span>` : ''}
                </div>`;
            });
            for (let e = 0; e < emptySeats; e++) {
                const isLastE = e === emptySeats - 1;
                const connector = sorted.length === 0 && e === 0 ? '' : (isLastE ? '└' : '├');
                html += `<div class="crew-empty">
                    ${connector ? `<span class="crew-connector">${connector} </span>` : ''}
                    <span class="crew-icon">⬜</span>
                    <span>Вільне місце</span>
                </div>`;
            }
            html += '</div>';
            return html;
        }

        function buildRatingContext(trip) {
            if (!trip) return null;
            const requestId = currentRequestIdFromTrip(trip);
            if (!requestId) return null;
            const viewerRole = String(trip.viewer_role || S.userRole || '').toLowerCase();
            const partnerRaw = viewerRole === 'driver'
                ? (trip.client_id ?? trip.partner_id)
                : (trip.driver_id ?? trip.partner_id);
            const partnerId = Number(partnerRaw);
            if (!Number.isFinite(partnerId) || partnerId <= 0) return null;
            return { request_id: requestId, partner_id: partnerId };
        }

        function getCurrentRatingContext() {
            return S._ratingContext || buildRatingContext(S.activeTrip);
        }

        function maybeOpenCompletedTripRatingSheet(source = '') {
            if (S.activeTrip || !lastKnownTripForRating) return false;
            const reqId = currentRequestIdFromTrip(lastKnownTripForRating);
            const ratingContext = buildRatingContext(lastKnownTripForRating);
            if (!reqId || !ratingContext) return false;

            waitingForPartner = false;
            try { localStorage.removeItem(_stateKey('wfp')); } catch (_) { }

            if (isAppInBackground || S.roleGateOpen || S.matchSheetOpen || isSheetOpen()) {
                if (!S.completedRatingNotifiedIds.has(reqId)) {
                    S.completedRatingNotifiedIds.add(reqId);
                    notifyCriticalEvent('trip_completed', reqId);
                    showToast('🏁 Подорож завершена. Оцініть партнера у Поїздках', '');
                }
                renderSubBar();
                persistCriticalState();
                return false;
            }

            if (S.completedRatingSheetShownIds.has(reqId)) return false;
            S.completedRatingSheetShownIds.add(reqId);
            notifyCriticalEvent('trip_completed', reqId);
            showToast('🎉 Подорож завершена! Оцініть партнера.', 'success');
            openRatingSheet(ratingContext);
            lastKnownTripForRating = null;
            try {
                localStorage.removeItem(_stateKey('ltr'));
                localStorage.removeItem(_stateKey('wfp'));
            } catch (_) { }
            renderSubBar();
            return true;
        }

        function currentRequestId() {
            return currentRequestIdFromTrip(S.activeTrip);
        }

        function confirmStartTripIntent() {
            if (!S.activeTrip) return;
            const t = S.activeTrip;
            const crewLabel = t.crew_id ? ` #${parseInt(t.crew_id, 10) || ''}` : '';
            return new Promise(resolve => {
                openSheet(`
                    <div class="sheet-title">🚀 Почати поїздку${crewLabel}?</div>
                    <div class="sheet-sub">Після старту екіпаж перейде у стан «В дорозі». Скасування буде заблоковано, далі доступне тільки завершення подорожі.</div>
                    <div class="sheet-actions">
                        <button class="btn btn-primary" id="confirm-start-trip-yes">Так, поїхали</button>
                        <button class="btn btn-ghost" id="confirm-start-trip-no">Ще ні</button>
                    </div>
                `);
                document.getElementById('confirm-start-trip-yes').onclick = () => { closeSheet(); resolve(true); };
                document.getElementById('confirm-start-trip-no').onclick = () => { closeSheet(); resolve(false); };
            });
        }

        async function startTrip() {
            if (!S.activeTrip) return;
            if (!await confirmStartTripIntent()) return;
            if (!beginOp('start_trip')) return;
            try {
                const reqId = currentRequestId();
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/start', { method: 'POST', body: JSON.stringify({ request_id: reqId, user_id: S.userId }) });
                if (res?.status === 'ok') { showToast('🚀 Поїхали!', 'success'); await hydrate(); }
                else showToast('Помилка старту', 'error');
            } finally { endOp('start_trip'); }
        }

        async function arriveAtPickup() {
            if (!S.activeTrip) return;
            if (!beginOp('arrive_at_pickup')) return;
            try {
                const reqId = currentRequestId();
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/arrive', { method: 'POST', body: JSON.stringify({ request_id: reqId, user_id: S.userId }) });
                if (res?.status === 'ok') { showToast('📍 Ви на місці! Пасажири сповіщені', 'success'); await hydrate(); }
                else showToast('Помилка', 'error');
            } finally { endOp('arrive_at_pickup'); }
        }

        async function finishTrip() {
            if (!S.activeTrip) return;
            if (!beginOp('finish_trip')) return;
            try {
                const reqId = currentRequestId();
                const tripSnapshot = S.activeTrip ? { ...S.activeTrip } : null;
                const ratingContext = buildRatingContext(tripSnapshot);
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/done', {
                    method: 'POST',
                    body: JSON.stringify({ request_id: reqId, user_id: S.userId, role: S.activeTrip.viewer_role || S.userRole })
                });
                if (res?.status === 'ok') {
                    stopLocationTracking(true);
                    if (res?.completed) {
                        showToast('🎉 Подорож завершена! Дякуємо.', 'success');
                        waitingForPartner = false;
                        openRatingSheet(ratingContext);
                        lastKnownTripForRating = null;
                    } else {
                        showToast('⏳ Очікуємо підтвердження партнера...', '');
                        waitingForPartner = true;
                        if (tripSnapshot) lastKnownTripForRating = tripSnapshot;
                        renderTripsWaiting();
                    }
                    await hydrate();
                } else if (res?.reason === 'action_forbidden') {
                    showToast('Вже завершено — очікуємо партнера', '');
                } else { showToast('Помилка', 'error'); }
            } finally { endOp('finish_trip'); }
        }

        async function cancelTrip() {
            if (!S.activeTrip) return;
            const t = S.activeTrip;
            const crewLabel = t.crew_id ? `#${t.crew_id}` : '';
            const isDriver = t.viewer_role === 'driver';
            openSheet(`
                <div class="sheet-title">❌ Покинути домовленість ${crewLabel}?</div>
                <div class="sheet-sub">${isDriver ? 'Ваш екіпаж буде розформовано. Всі попутники отримають сповіщення.' : 'Ви вийдете з екіпажу. Водій та інші попутники залишаться.'}</div>
                <div class="sheet-sub" style="margin-top:8px;font-weight:600;">Вкажіть причину:</div>
                <div class="sheet-actions" style="flex-direction:column;">
                    <button class="btn btn-secondary" onclick="doCancelTrip('plans')">📅 Змінилися плани</button>
                    <button class="btn btn-secondary" onclick="doCancelTrip('wait')">⏳ Довго чекати</button>
                    <button class="btn btn-secondary" onclick="doCancelTrip('force')">🤕 Захворів / Форс-мажор</button>
                    <button class="btn btn-ghost" style="margin-top:8px;" onclick="closeSheet()">Скасувати вихід</button>
                </div>
            `);
        }

        async function doCancelTrip(reason) {
            closeSheet();
            if (!beginOp('cancel_trip')) return;
            try {
                const reqId = currentRequestId();
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/cancel', { method: 'POST', body: JSON.stringify({ request_id: reqId, user_id: S.userId, reason: reason || '' }) });
                if (res?.status === 'ok' || res?.cancelled) {
                    if (res?.cancel_requested_by) {
                        // Mutual consent: waiting for partner
                        showToast('⏳ Очікуємо підтвердження партнера', '');
                    } else {
                        stopLocationTracking(true);
                        showToast('✅ Екіпаж розформовано', 'success');
                    }
                    await hydrate();
                } else {
                    showToast(getErrorMessage(res, 'Не вдалося скасувати поїздку'), 'error');
                }
            } finally { endOp('cancel_trip'); }
        }

        async function confirmCancelTrip() {
            if (!beginOp('confirm_cancel')) return;
            try {
                const reqId = currentRequestId();
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/confirm-cancel', { method: 'POST', body: JSON.stringify({ request_id: reqId, user_id: S.userId }) });
                if (res?.status === 'ok') {
                    stopLocationTracking(true);
                    showToast('Поїздку скасовано', 'success');
                    await hydrate();
                } else {
                    showToast(getErrorMessage(res, 'Не вдалося підтвердити скасування'), 'error');
                }
            } finally { endOp('confirm_cancel'); }
        }

        async function rejectCancelTrip() {
            if (!beginOp('reject_cancel')) return;
            try {
                const reqId = currentRequestId();
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/reject-cancel', { method: 'POST', body: JSON.stringify({ request_id: reqId, user_id: S.userId }) });
                if (res?.status === 'ok') {
                    showToast('Скасування відхилено — поїздка триває', 'success');
                    await hydrate();
                } else {
                    showToast(getErrorMessage(res, 'Не вдалося відхилити скасування'), 'error');
                }
            } finally { endOp('reject_cancel'); }
        }

        // ─── RATING WITH COMMENT ───
        function openRatingSheet(ratingContext = null) {
            S._ratingContext = ratingContext || getCurrentRatingContext();
            openSheet(`
                <div class="sheet-title">Оцініть поїздку</div>
                <div class="sheet-sub">Ваш відгук допомагає покращити сервіс</div>
                <div style="display:flex;justify-content:center;gap:32px;margin:20px 0 16px;">
                    <div style="text-align:center;cursor:pointer;" onclick="selectRating(-1)">
                        <div id="thumb-down" style="font-size:48px;opacity:0.4;transition:all 0.15s;">👎</div>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Погано</div>
                    </div>
                    <div style="text-align:center;cursor:pointer;" onclick="selectRating(1)">
                        <div id="thumb-up" style="font-size:48px;opacity:0.4;transition:all 0.15s;">👍</div>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Добре</div>
                    </div>
                </div>
                <input class="board-search" id="rating-comment" placeholder="Коментар (необов'язково)..." style="margin:0 0 16px;">
                <button class="btn btn-primary" onclick="submitRating()">Надіслати оцінку</button>
                <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="closeSheet()">Пропустити</button>
            `);
            S._ratingScore = null;
        }

        function selectRating(score) {
            S._ratingScore = score;
            const up = document.getElementById('thumb-up');
            const down = document.getElementById('thumb-down');
            if (up) up.style.opacity = score === 1 ? '1' : '0.35';
            if (down) down.style.opacity = score === -1 ? '1' : '0.35';
        }

        async function submitRating() {
            const score = S._ratingScore != null ? S._ratingScore : 1;
            const comment = document.getElementById('rating-comment')?.value?.trim() || '';
            const ctx = getCurrentRatingContext();
            const pid = ctx?.partner_id || null;
            const reqId = ctx?.request_id || null;
            if (pid && reqId) {
                await api('/api/v3/rating', { method: 'POST', body: JSON.stringify({ from_user_id: S.userId, to_user_id: pid, request_id: reqId, score, comment }) });
                showToast('Дякуємо за відгук!', 'success');
            } else {
                showToast('Контекст оцінки втрачено', 'error');
            }
            closeSheet(); S._ratingScore = null; S._ratingContext = null;
        }

        // ─── CHAT ───
        async function openChat(requestId, partnerId) {
            S.chatRequestId = requestId; S.chatPartnerId = partnerId;
            document.getElementById('chat-backdrop').classList.add('open');
            document.getElementById('chat-sheet').classList.add('open');
            document.getElementById('chat-title').textContent = 'Чат екіпажу';
            document.getElementById('chat-subtitle').textContent = `#${requestId}`;
            await loadChatMessages();
        }

        function closeChat() {
            document.getElementById('chat-backdrop').classList.remove('open');
            document.getElementById('chat-sheet').classList.remove('open');
            S.chatRequestId = null;
        }

        async function loadChatMessages() {
            if (!S.chatRequestId) return;
            const feed = document.getElementById('chat-feed');
            const data = await api(`/api/v3/trip/messages?request_id=${S.chatRequestId}&user_id=${S.userId}&limit=50`);
            const msgs = data?.messages || [];
            if (!msgs.length) { feed.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">Повідомлень поки немає 👋</div>'; return; }
            feed.innerHTML = msgs.map(m => {
                const mine = m.user_id == S.userId;
                return `<div class="chat-msg ${mine ? 'mine' : 'theirs'}">${!mine ? `<div class="chat-meta">${escapeHtml(m.name || 'Учасник')}</div>` : ''}<div class="chat-bubble">${escapeHtml(m.text || '')}</div></div>`;
            }).join('');
            feed.scrollTop = feed.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !S.chatRequestId) return;
            input.value = '';
            const feed = document.getElementById('chat-feed');
            const div = document.createElement('div'); div.className = 'chat-msg mine';

        function escapeHtml(str) {
            const d = document.createElement('div'); d.textContent = String(str ?? ''); return d.innerHTML;

        function escapeAttr(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function sanitizeSearchInput(str) {
            // Remove HTML tags and limit length
            return String(str || '').replace(/[<>]/g, '').slice(0, 100);

        // ═══ SHEET — mobile drag / desktop click-only ═══
        function openSheet(html, options = {}) {
            const body = document.getElementById('sheet-body');
            body.innerHTML = html;
            body.style.maxHeight = options?.maxHeight || '';
            document.getElementById('sheet-backdrop').classList.add('open');
            document.getElementById('sheet').classList.add('open');
            const sheet = document.getElementById('sheet');

            // Track if sheet is alive (prevents stale event fires)
            const sheetId = Date.now();
            sheet._sheetId = sheetId;

            // ── MOBILE: drag-to-dismiss from sheet ──
            let touchStartY = 0, touchCurrentY = 0, isTouchDragging = false;
            const TOUCH_DISMISS_PX = 150;

            const onTouchStart = (e) => {
                const target = e.target;
                
                // Do not drag if touching interactive/form elements
                if (target.closest('button') || target.closest('input') || target.closest('textarea') || target.closest('select') || target.closest('a')) {
                    touchStartY = 0;
                    return;
                }
                
                // If touching inside the body, only drag if sheet-body is scrolled to the top
                const body = document.getElementById('sheet-body');
                if (body && body.contains(target) && body.scrollTop > 0) {
                    touchStartY = 0;
                    return;
                }

                touchStartY = e.touches[0].clientY;
                touchCurrentY = touchStartY;
                isTouchDragging = false;
                sheet.style.transition = 'none';
            };

            const onTouchMove = (e) => {
                if (sheet._sheetId !== sheetId) return;
                if (!touchStartY) return;
                
                const y = e.touches[0].clientY;
                const diff = y - touchStartY;

                if (!isTouchDragging) {
                    if (diff > 10) {
                        isTouchDragging = true;
                    } else if (diff < -10) {
                        // User swiped up: cancel drag detection so normal scroll occurs
                        touchStartY = 0;
                        return;
                    }
                }

                if (!isTouchDragging) return;

                touchCurrentY = y;
                if (diff > 0) {
                    e.preventDefault();
                    sheet.style.transform = `translateY(${diff * 0.55}px)`; // rubber-band drag
                }
            };

            const onTouchEnd = () => {
                if (sheet._sheetId !== sheetId) return;
                if (!isTouchDragging) { 
                    sheet.style.transition = ''; 
                    touchStartY = 0;
                    return; 
                }
                isTouchDragging = false;
                sheet.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                
                const diff = touchCurrentY - touchStartY;
                touchStartY = 0;
                
                if (diff > TOUCH_DISMISS_PX) {
                    sheet.style.transform = 'translateY(100%)';
                    setTimeout(() => { if (sheet._sheetId === sheetId) closeSheet(); }, 300);
                } else {
                    sheet.style.transform = '';
                }
            };

            sheet.addEventListener('touchstart', onTouchStart, { passive: true });
            sheet.addEventListener('touchmove', onTouchMove, { passive: false });
            sheet.addEventListener('touchend', onTouchEnd);

            // Store cleanup
            sheet._cleanup = () => {
                sheet._sheetId = null;
                sheet.removeEventListener('touchstart', onTouchStart);
                sheet.removeEventListener('touchmove', onTouchMove);
                sheet.removeEventListener('touchend', onTouchEnd);
            };
        }

        // ─── CRITICAL IN-APP SOUND (foreground only, deduped) ───
        let _appAudioCtx = null;
        let _appAudioUnlockWired = false;

        function ensureAppAudioContext() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return null;
            if (!_appAudioCtx) _appAudioCtx = new AudioCtx();
            return _appAudioCtx;
        }

        function initAppSoundUnlock() {
            updateAppSoundToggle();
            if (_appAudioUnlockWired) return;
            _appAudioUnlockWired = true;
            const unlock = () => {
                if (!S.appSoundEnabled) return;
                const ctx = ensureAppAudioContext();
                if (!ctx) return;
                Promise.resolve(ctx.resume?.()).catch(() => { });
            };
            ['pointerdown', 'touchstart', 'keydown'].forEach(evt => {
                document.addEventListener(evt, unlock, { passive: true });
            });
        }

        function updateAppSoundToggle() {
            const toggle = document.getElementById('toggle-app-sound');
            const label = document.getElementById('settings-sound');
            if (toggle) toggle.classList.toggle('on', !!S.appSoundEnabled);
            if (label) label.textContent = S.appSoundEnabled ? 'Важливі' : 'Вимкнено';
        }

        function toggleAppSound() {
            S.appSoundEnabled = !S.appSoundEnabled;
            localStorage.setItem('wt_app_sound', S.appSoundEnabled ? 'on' : 'off');
            updateAppSoundToggle();
            if (S.appSoundEnabled) {
                const ctx = ensureAppAudioContext();
                Promise.resolve(ctx?.resume?.()).finally(() => {
                    pulseCriticalHaptic('sound_test');
                    playCriticalSound('sound_test');
                });
                showToast('Звуки важливих подій увімкнено', 'success');
            } else {
                showToast('Звуки в додатку вимкнено', '');
            }
        }

        function playCriticalSound(kind = 'notice') {
            if (!S.appSoundEnabled || isAppInBackground || document.hidden) return;
            const ctx = ensureAppAudioContext();
            if (!ctx || ctx.state !== 'running') return;
            const now = ctx.currentTime;
            const gain = ctx.createGain();
            const osc = ctx.createOscillator();
            const base = kind === 'trip_started' ? 660 : kind === 'trip_completed' ? 880 : 740;
            osc.type = 'sine';
            osc.frequency.setValueAtTime(base, now);
            osc.frequency.exponentialRampToValueAtTime(base * 1.18, now + 0.12);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.045, now + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.24);
        }

        function pulseCriticalHaptic(kind = 'notice') {
            const haptic = window.Telegram?.WebApp?.HapticFeedback;
            try {
                if (haptic?.notificationOccurred) {
                    haptic.notificationOccurred(kind === 'finish_confirmation_needed' ? 'warning' : 'success');
                } else if (haptic?.impactOccurred) {
                    haptic.impactOccurred('light');
                }
            } catch (_) { }
        }

        function notifyCriticalEvent(kind, id = '') {
            const key = `${kind}:${id || 'global'}`;
            if (S.criticalSoundEventIds.has(key)) return false;
            S.criticalSoundEventIds.add(key);
            if (!S.appSoundEnabled || isAppInBackground || document.hidden) return true;
            pulseCriticalHaptic(kind);
            playCriticalSound(kind);
            return true;
        }

        // ═══════ LOCATION MAP PICKER (overlay над формою, форма не руйнується) ═══════
        const _mapPicker = { map: null, onConfirm: null, searchTimer: null, wired: false };

        function openLocationPicker(opts = {}) {
            const overlay = document.getElementById('map-picker');
            if (!overlay) return;
            _mapPicker.onConfirm = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
            overlay.style.display = 'block';

            const hasCoords = Number.isFinite(opts.lat) && Number.isFinite(opts.lng);
            let center, zoom;
            if (hasCoords) { center = [opts.lat, opts.lng]; zoom = 15; }
            else if (S._lastKnownPos) { center = [S._lastKnownPos.lat, S._lastKnownPos.lng]; zoom = 14; }
            else { center = [S.homeCity.lat, S.homeCity.lng]; zoom = 11; }

            if (!_mapPicker.map) {
                _mapPicker.map = L.map('map-picker-map', { zoomControl: true, attributionControl: false }).setView(center, zoom);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(_mapPicker.map);
            } else {
                _mapPicker.map.setView(center, zoom);
            }
            if (!_mapPicker.wired) { _wireMapPickerControls(); _mapPicker.wired = true; }
            setTimeout(() => { try { _mapPicker.map.invalidateSize(); } catch (e) {} }, 60);

            // Якщо точних координат немає — пробуємо свіжий GPS, щоб одразу показати, де користувач
            if (!hasCoords && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        S._lastKnownPos = { lat: p.coords.latitude, lng: p.coords.longitude, at: Date.now() };
                        if (document.getElementById('map-picker').style.display !== 'none') {
                            _mapPicker.map.setView([p.coords.latitude, p.coords.longitude], 15);
                        }
                    },
                    () => {},
                    { enableHighAccuracy: true, maximumAge: 30000, timeout: 8000 }
                );
            }

            const search = document.getElementById('map-picker-search');
            if (search) search.value = '';
            const results = document.getElementById('map-picker-results');
            if (results) results.innerHTML = '';
        }

        function closeLocationPicker() {
            const overlay = document.getElementById('map-picker');
            if (overlay) overlay.style.display = 'none';
            const results = document.getElementById('map-picker-results');
            if (results) results.innerHTML = '';
        }

        function _wireMapPickerControls() {
            const cancelBtn = document.getElementById('map-picker-cancel');
            const gpsBtn = document.getElementById('map-picker-gps');
            const confirmBtn = document.getElementById('map-picker-confirm');
            const search = document.getElementById('map-picker-search');

            if (cancelBtn) cancelBtn.onclick = closeLocationPicker;

            if (gpsBtn) gpsBtn.onclick = () => {
                if (!navigator.geolocation) { showToast('GPS недоступний', 'error'); return; }
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        S._lastKnownPos = { lat: p.coords.latitude, lng: p.coords.longitude, at: Date.now() };
                        _mapPicker.map.flyTo([p.coords.latitude, p.coords.longitude], 15);
                    },
                    () => showToast('Не вдалося отримати GPS', 'error'),
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            };

            if (confirmBtn) confirmBtn.onclick = async () => {
                const c = _mapPicker.map.getCenter();
                const lat = c.lat, lng = c.lng;
                let label = '';
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=uk&zoom=14`, { headers: { 'Accept': 'application/json' } });
                    if (r.ok) label = _shortPlaceName(await r.json());
                } catch (e) {}
                closeLocationPicker();
                if (_mapPicker.onConfirm) _mapPicker.onConfirm({ lat, lng, label });
            };

            if (search) search.oninput = () => {
                clearTimeout(_mapPicker.searchTimer);
                const q = search.value.trim();
                const box = document.getElementById('map-picker-results');
                if (q.length < 3) { if (box) box.innerHTML = ''; return; }
                _mapPicker.searchTimer = setTimeout(() => _runPickerSearch(q), 450);
            };
        }

        async function _runPickerSearch(q) {
            const box = document.getElementById('map-picker-results');
            if (!box) return;
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(q)}&accept-language=uk&limit=6`, { headers: { 'Accept': 'application/json' } });
                const arr = r.ok ? await r.json() : [];
                if (!Array.isArray(arr) || !arr.length) {
                    box.innerHTML = '<div class="map-picker-result" style="opacity:.6;cursor:default;">Нічого не знайдено</div>';
                    return;
                }
                box.innerHTML = arr.map(it => `<div class="map-picker-result" data-lat="${it.lat}" data-lng="${it.lon}">${escapeHtml(it.display_name)}</div>`).join('');
                Array.from(box.querySelectorAll('.map-picker-result[data-lat]')).forEach(el => {
                    el.onclick = () => {
                        const lat = parseFloat(el.dataset.lat), lng = parseFloat(el.dataset.lng);
                        if (Number.isFinite(lat) && Number.isFinite(lng)) _mapPicker.map.flyTo([lat, lng], 14);
                        box.innerHTML = '';
                        const s = document.getElementById('map-picker-search');
                        if (s) s.blur();
                    };
                });
            } catch (e) { box.innerHTML = ''; }
        }

        function _shortPlaceName(j) {
            if (!j) return '';
            const a = j.address || {};
            const parts = [a.city || a.town || a.village || a.municipality || a.county, a.country].filter(Boolean);
            if (parts.length) return parts.join(', ');
            return (j.display_name || '').split(',').slice(0, 2).join(',').trim();
        }

        async function doCreateDirection() {
            const title = document.getElementById('create-dir-title')?.value?.trim();

            if (startDate && endDate && endDate < startDate) { showToast('Дата завершення не може бути раніше початку', 'error'); return; }
            const oldSub = (S.subscriptions || [])[0];
            if (oldSub) {
                const oldTitle = oldSub.title || oldSub.direction_title || `#${oldSub.direction_id}`;
                const confirmed = await new Promise(resolve => {
                    openSheet(`
                        <div class="sheet-title">Створити і перемкнути чергу?</div>
                        <div class="sheet-sub">Ви вже в черзі на "${escapeHtml(oldTitle)}".<br>Після створення "${escapeHtml(title)}" активною стане нова черга.</div>
                        <div class="sheet-actions">
                            <button class="btn btn-primary" id="confirm-create-switch-yes">✓ Створити і перейти</button>
                            <button class="btn btn-ghost" id="confirm-create-switch-no">Скасувати</button>
                        </div>
                    `);
                    document.getElementById('confirm-create-switch-yes').onclick = () => { closeSheet(); resolve(true); };
                    document.getElementById('confirm-create-switch-no').onclick = () => { closeSheet(); resolve(false); };
                });
                if (!confirmed) return;
            }
            if (!beginOp('create_direction')) return;
            try {
                const body = {
                    user_id: S.userId,
                    title,
                    parent_id: S.boardParentId || null,
                    meeting_point: meetingPoint,
                    description,
                    start_date: startDate,
                    end_date: endDate
                };
                if (S._createDirLat != null && S._createDirLng != null) {
                    body.lat = S._createDirLat;
                    body.lng = S._createDirLng;
                    if (!body.meeting_point) body.meeting_point = `${S._createDirLat.toFixed(5)}, ${S._createDirLng.toFixed(5)}`;
                }
                const res = await api('/api/v3/board', { method: 'POST', body: JSON.stringify(body) });
                if (res?.id || res?.status === 'ok' || res?.direction_id) {
                    showToast('✓ Напрямок створено. Ви в черзі.', 'success');
                    closeSheet(); S._createDirLat = null; S._createDirLng = null;
                    await hydrate();
                    renderNews();
                } else if (res?.status === 'limit') {
                    showToast('У вас вже є активна ідея в каталозі. Видаліть її щоб запропонувати нову.', 'error');
                } else { showToast(res?.message || res?.error || 'Помилка створення', 'error'); }
            } catch (e) { showToast('Помилка мережі', 'error'); }
            finally { endOp('create_direction'); }
        }

        async function doEditDirection(dirId) {
            const title = document.getElementById('edit-dir-title')?.value?.trim();
            const meetingPoint = document.getElementById('edit-dir-place')?.value?.trim() || '';
            const startDate = document.getElementById('edit-dir-start')?.value || '';
            const endDate = document.getElementById('edit-dir-end')?.value || '';
            const description = document.getElementById('edit-dir-desc')?.value?.trim() || '';
            if (!title || title.length < 3) { showToast('Назва має бути від 3 символів', 'error'); return; }
            if (startDate && endDate && endDate < startDate) { showToast('Дата завершення не може бути раніше початку', 'error'); return; }
            const meetingChanged = meetingPoint !== (S._editDirOriginalMeetingPoint || '');
            if (!meetingPoint && !S._editDirGpsTouched && meetingChanged) { showToast('Вкажіть публічну локацію або точку на карті', 'error'); return; }
            if (!beginOp('edit_direction')) return;
            try {
                const payload = {
                    user_id: S.userId,
                    direction_id: dirId,
                    title,
                    meeting_point: meetingPoint,
                    description,
                    start_date: startDate,
                    end_date: endDate
                };
                if (S._editDirGpsTouched && S._editDirLat != null && S._editDirLng != null) {
                    payload.lat = S._editDirLat;
                    payload.lng = S._editDirLng;
                    if (!payload.meeting_point) payload.meeting_point = `${S._editDirLat.toFixed(5)}, ${S._editDirLng.toFixed(5)}`;
                }
                const res = await api('/api/v3/board', { method: 'PATCH', body: JSON.stringify(payload) });
                if (res?.status === 'ok' || res?.id) {
                    showToast('✓ Ідею оновлено', 'success');
                    const updated = res?.direction || payload;
                    const patch = {
                        title: updated.title || title,
                        direction_title: updated.title || title,
                        meeting_point: updated.meeting_point ?? payload.meeting_point,
                        description: updated.description ?? payload.description,
                        start_date: updated.start_date ?? payload.start_date,
                        end_date: updated.end_date ?? payload.end_date,
                        lat: Object.prototype.hasOwnProperty.call(updated, 'lat') ? updated.lat : payload.lat,
                        lng: Object.prototype.hasOwnProperty.call(updated, 'lng') ? updated.lng : payload.lng
                    };
                    [allDirections, S.myDirections, S.subscriptions].forEach(list => {
                        (list || []).forEach(d => {
                            if (String(d.id || d.direction_id) === String(dirId)) Object.assign(d, patch);
                        });
                    });
                    closeSheet(); renderBoardList(allDirections, S.boardSubSet); renderSubBar(); renderNews(); refreshMap();
                } else { showToast(res?.message || 'Помилка редагування', 'error'); }
            } catch (e) { showToast('Помилка мережі', 'error'); }
            finally { endOp('edit_direction'); }
        }

        async function doDeleteDirection(dirId) {

        // ═══════ GROUP JOIN ═══════
        async function groupJoinDirection(dirId, userIds) {
            if (!Array.isArray(userIds) || !userIds.length) { showToast('Немає доступних екіпажів', 'error'); return; }
            const uid = userIds[0];

        // ═══════ MY IDEAS (My Directions) ═══════
        // Відкриває каталог на папці, де лежить створена подія, і скролює до неї.
        async function openMyIdeaInBoard(dirId, parentId) {
            closeSheet();
            switchScreen('board');
            if (!parentId) {
                // немає parent_id — відкриваємо корінь каталогу
                S.boardStack = [];
                S.boardParentId = null;
                await renderBoard();
                return;
            }
            // Будуємо повний breadcrumb-ланцюжок від кореня до parent
            const ancestors = [];
            let cur = String(parentId);
            const visited = new Set();
            // Йдемо вгору по дереву через allDirections
            while (cur && !visited.has(cur)) {
                visited.add(cur);
                const node = allDirections.find(d => String(d.id) === cur);
                if (!node) break;
                ancestors.unshift({ id: node.id, title: node.title || `#${node.id}` });
                cur = node.parent_id ? String(node.parent_id) : null;
            }
            // Якщо allDirections не має даних (до першого renderBoard) — читаємо з сервера
            if (!ancestors.length) {
                const data = await api(`/api/v3/board?lang=${S.lang}&parent_id=${parentId}&user_id=${S.userId||''}`);
                const dirs = Array.isArray(data) ? data : (data?.directions || []);
                const node = dirs.find(d => String(d.id) === String(parentId)) ||
                             { id: parentId, title: `#${parentId}` };
                ancestors.push({ id: node.id, title: node.title || `#${node.id}` });
            }
            // Встановлюємо boardStack і boardParentId
            S.boardStack = ancestors;
            S.boardParentId = ancestors[ancestors.length - 1].id;
            await renderBoard();
            // Скролимо до картки події
            setTimeout(() => {
                const el = document.querySelector(`[data-dir-id="${dirId}"]`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        // ═══════ PICKUP LOCATION WITH MAP MARKER ═══════
        async function pickPickupLocation(dirId) {
            if (!navigator.geolocation) { showToast('GPS недоступний', 'error'); return; }
            showToast('📍 Визначення локації...');
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        S.pickupCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        // Show marker on map
                        if (S._pickupMarker && S.map) { S.map.removeLayer(S._pickupMarker); }
                        if (S.map) {
                            S._pickupMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {
                                icon: L.divIcon({
                                    className: '',
                                    html: '<div style="width:32px;height:32px;border-radius:50%;background:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid rgba(0,0,0,0.4);box-shadow:0 2px 10px rgba(251,191,36,0.5);">📍</div>',
                                    iconSize: [32, 32], iconAnchor: [16, 32]
                                })
                            }).addTo(S.map).bindPopup('Моя точка посадки');
                            S.map.flyTo([pos.coords.latitude, pos.coords.longitude], 15, { duration: 1 });
                        }
                        showToast('✓ Точку посадки визначено', 'success');
                        resolve(S.pickupCoords);
                    },
                    () => { showToast('Не вдалося отримати GPS', 'error'); resolve(null); },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }

        async function subscribeAndPickup(dirId) {
            const ok = await subscribeDir(dirId);
            if (ok) await pickPickupLocation(dirId);
        }

        // ═══════ LIVE LOCATION TRACKING (Reservation pickup + Phase 2) ═══════
        let _locationTrackInterval = null;
        let _locationConsentPromptOpen = false;
        let _locationConsentDeclinedForReqId = null;

        function shouldShareLiveLocation(trip = S.activeTrip) {
            const reqId = currentRequestIdFromTrip(trip);
            if (!reqId) return false;
            const status = String(trip?.status || '').toLowerCase();
            return !['done', 'completed', 'cancelled', 'canceled'].includes(status);
        }

        function shouldRenderCrewMembersOnMap(trip = S.activeTrip) {
            return shouldShareLiveLocation(trip) && Array.isArray(trip?.members);
        }

        function startLocationTracking() {
            if (_locationTrackInterval) return;
            if (!navigator.geolocation) return;
            const reqId = currentRequestId();
            if (!reqId) return;
            const consentKey = _stateKey('live_location_consent');
            if (localStorage.getItem(consentKey) !== '1') {
                if (isAppInBackground || isSheetOpen() || _locationConsentPromptOpen || _locationConsentDeclinedForReqId === reqId || isLiveLocationDeclined(reqId)) return;
                _locationConsentPromptOpen = true;
                const phase = S.activeTrip?.is_started ? 'на маршруті' : 'біля точки збору';
                openSheet(`
                    <div class="sheet-title">📍 Показувати live-локацію екіпажу?</div>
                    <div class="sheet-sub">WayTandem може надсилати вашу геопозицію учасникам екіпажу кожні 10 секунд у фазі зустрічі та поїздки. Це допомагає знайти одне одного ${phase}.</div>
                    <div class="sheet-actions">
                        <button class="btn btn-primary" id="live-location-yes">Дозволити для цієї поїздки</button>
                        <button class="btn btn-ghost" id="live-location-no">Не зараз</button>
                    </div>
                `);
                document.getElementById('live-location-yes').onclick = () => {
                    localStorage.setItem(consentKey, '1');
                    _locationConsentPromptOpen = false;
                    closeSheet();
                    startLocationTracking();
                };
                document.getElementById('live-location-no').onclick = () => {
                    _locationConsentDeclinedForReqId = reqId;
                    setLiveLocationDeclined(reqId);
                    _locationConsentPromptOpen = false;
                    closeSheet();
                    showToast('Live GPS вимкнено для цієї поїздки', '');
                };
                return;
            }
            // Send immediately, then every 10 seconds
            _sendMyLocation();
            _locationTrackInterval = setInterval(_sendMyLocation, 10000);
        }

        function stopLocationTracking(clearConsent = false) {
            if (_locationTrackInterval) {
                clearInterval(_locationTrackInterval);
                _locationTrackInterval = null;
            }
            _locationConsentPromptOpen = false;
            if (clearConsent) {
                clearLiveLocationConsent();
                _locationConsentDeclinedForReqId = null;
            }
        }

        function _sendMyLocation() {
            if (!navigator.geolocation || !S.apiBase || !S.userId) return;
            // Якщо кнопка "моя локація" увімкнена, watchPosition уже дав свіжу позицію —
            // використовуємо її, щоб не викликати getCurrentPosition (і не перепитувати GPS).
            const cached = S._lastKnownPos;
            if (cached && (Date.now() - cached.at) < 15000) {
                api('/api/v3/user/location', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: S.userId, lat: cached.lat, lng: cached.lng })
                }).catch(() => {});
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    api('/api/v3/user/location', {
                        method: 'POST',
                        body: JSON.stringify({ user_id: S.userId, lat: pos.coords.latitude, lng: pos.coords.longitude })
                    }).catch(() => {});
                },
                () => {},
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        function renderCrewMembersOnMap() {
            if (!S.map) return;
            // Remove old crew member markers and route
            (S._crewMemberMarkers || []).forEach(m => S.map.removeLayer(m));
            S._crewMemberMarkers = [];
            if (S._routePolyline) { S.map.removeLayer(S._routePolyline); S._routePolyline = null; }
            // Show crew members if trip is active (reservation pickup or Phase 2)
            const t = S.activeTrip;
            if (!shouldRenderCrewMembersOnMap(t)) return;
            const coords = [];
            const context = activeMapContextForMap();
            const eventFilter = S.mapEventFilter || 'all';
            if (context && String(t.direction_id || '') !== String(context.dirId || '')) return;
            if (context && eventFilter === 'event') return;
            const members = (t.members || []).filter(m => {
                if (!context || eventFilter === 'all') return true;
                const role = String(m?.role || '').toLowerCase();
                if (eventFilter === 'drivers') return role === 'driver';
                if (eventFilter === 'passengers') return role !== 'driver';
                return true;
            });
            members.forEach(m => {
                if (!m.lat || !m.lng) return;
                coords.push([m.lat, m.lng]);
                const isMe = String(m.user_id) === String(S.userId);
                const emoji = m.role === 'driver' ? '🚗' : '👤';
                const color = isMe ? '#34d399' : '#38bdf8';
                const name = isMe ? 'Ви' : escapeHtml(m.name || '?');
                const phaseLabel = t.is_started ? 'в дорозі' : 'зустріч';
                const statusLabel = `${m.role === 'driver' ? 'водій' : 'попутник'} · ${phaseLabel}`;
                const marker = L.marker([m.lat, m.lng], {
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="width:36px;height:36px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid rgba(0,0,0,0.4);box-shadow:0 2px 12px ${color}66;">${emoji}</div>`,
                        iconSize: [36, 36], iconAnchor: [18, 18]
                    })
                }).addTo(S.map).bindPopup(`<b>${name}</b><br>${statusLabel}`);
                S._crewMemberMarkers.push(marker);
            });
            // Draw route polyline between crew members
            if (coords.length >= 2) {
                S._routePolyline = L.polyline(coords, { color: '#38bdf8', weight: 3, opacity: 0.6, dashArray: '8 4' }).addTo(S.map);
            }
            // Fit bounds
            if (coords.length >= 1) S.map.fitBounds(coords, { padding: [40, 40], maxZoom: 14 });
        }

    </script>
</body>

</html>
