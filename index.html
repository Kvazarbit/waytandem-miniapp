        async function openStartDirectionInvite(dirId, options = {}) {
            const safeDirId = parseInt(dirId) || 0;
            if (!safeDirId) return;
            S._openDirectionSeq = (S._openDirectionSeq || 0) + 1;
            const seq = S._openDirectionSeq;
            openStartDirectionLoadingSheet(safeDirId);
            const data = await api(`/api/v3/fractal/organizers?direction_id=${safeDirId}&lang=${S.lang}&user_id=${S.userId || ''}`);
            if (seq !== S._openDirectionSeq) return;
            const localDir = allDirections.find(d => String(d.id) === String(safeDirId)) || {};
            const remoteDir = data?.direction && typeof data.direction === 'object' ? data.direction : {};
            const dir = { ...localDir, ...remoteDir, id: remoteDir.id ?? localDir.id ?? safeDirId };
            if (!dir || !dir.id) { closeSheet(); showToast('Подія недоступна', 'error'); return; }
            if (isFolderNode(dir)) { closeSheet(); await boardOpenFolder(safeDirId); return; }
            S.directionDetailsCache = S.directionDetailsCache || {};
            S.directionDetailsCache[safeDirId] = { ...(data || {}), direction: dir };
            const inviteOptions = options || {};
            if (inviteOptions?.source === 'map' && !inviteOptions?.fullInvite) {
                openMapCompactDirectionInviteSheet(safeDirId, dir, data || {}, inviteOptions);
                return;
            }
            openDirectionInviteSheet(safeDirId, dir, data || {}, inviteOptions);
        }

        async function joinInvitedDirection(dirId, source = '') {
            const safeDirId = parseInt(dirId) || 0;
            if (!safeDirId) { showToast('Подію не знайдено', 'error'); return false; }
            if (source === 'map') return openMapInviteRoleSheet(safeDirId);
            if (!requireRoleForAction('приєднатися до події', () => joinInvitedDirection(safeDirId, source))) return false;
            return subscribeDir(safeDirId, { afterSuccessScreen: source === 'map' ? 'explore' : '' });
        }

        async function openStartDirectionIfNeeded() {
            const dirId = parseInt(S.pendingStartDirectionId) || 0;
            if (!dirId || S.startDirectionHandled) return;
            S.startDirectionHandled = true;
            S.pendingStartDirectionId = null;
            switchScreen('board');
            await openStartDirectionInvite(dirId);
        }

        function updateNewsBadge() {
            const badge = document.getElementById('nav-news-badge');
            if (!badge) return;
            const count = Math.min(99, (S.news || []).filter(isDiscoveryNewsItem).length);
            if (count > 0) { badge.style.display = 'flex'; badge.textContent = count; }
            else { badge.style.display = 'none'; }
        }

        function livePassengerCountForMapContext(context = activeMapContextForMap()) {
            if (!context || !S.activeTrip || String(S.activeTrip.direction_id || '') !== String(context.dirId || '')) return 0;
            const members = Array.isArray(S.activeTrip.members) ? S.activeTrip.members : [];
            return members.filter(m =>
                String(m?.role || '').toLowerCase() !== 'driver' &&
                m?.lat != null &&
                m?.lng != null &&
                Number.isFinite(Number(m.lat)) &&
                Number.isFinite(Number(m.lng))
            ).length;
        }

        function eventPointForMapContext(context = activeMapContextForMap()) {
            if (!context) return null;
            const dirId = String(context.dirId || '');
            const sources = [
                ...(S.news || []),
                ...(allDirections || []),
                ...(S.subscriptions || []),
            ];
            const hit = sources.find(n =>
                String(n?.direction_id || n?.id || '') === dirId &&
                n?.lat != null &&
                n?.lng != null &&
                Number.isFinite(Number(n.lat)) &&
                Number.isFinite(Number(n.lng))
            );
            if (!hit) return null;
            return {
                ...hit,
                direction_id: Number(dirId),
                dir_title: hit.dir_title || hit.direction_title || hit.title || context.title,
                text: hit.text || 'Подія на карті',
                kind: hit.kind || 'direction_event',
                is_active: hit.is_active !== false,
            };
        }

        function eventPinCountForMapContext(context = activeMapContextForMap()) {
            return eventPointForMapContext(context) ? 1 : 0;
        }

        function renderMapModeStrip() {
            const strip = document.getElementById('map-mode-strip');
            if (!strip) return;
            const raw = activeMapContextForMap();
            // Перемикач Підписка/Загальна доступний лише для активної ПІДПИСКИ (не під час поїздки)
            const canToggle = !!(raw && raw.kind === 'subscription');
            // Авто-скидання на «Підписка» при зміні активної підписки
            const rawDirId = canToggle ? String(raw.dirId) : '';
            if (S._mapScopeDirId !== rawDirId) {
                S.mapScope = 'sub';
                S._mapScopeDirId = rawDirId;
            }
            const scoped = mapContextScoped();
            const value = scoped ? 'координація події' : 'пошук виїзду';
            let toggleHtml = '';
            if (canToggle) {
                const isSub = S.mapScope !== 'all';
                toggleHtml = `<button class="map-scope-btn ${isSub ? 'scope-sub' : ''}" onclick="toggleMapScope()" type="button">${isSub ? '📍 Підписка' : '🌐 Загальна'}</button>`;
            }
            strip.style.display = 'flex';
            strip.innerHTML = `<span class="map-mode-label">Режим:</span><span class="map-mode-value">${value}</span>${toggleHtml}`;
        }

        function toggleMapScope() {
            S.mapScope = (S.mapScope === 'all') ? 'sub' : 'all';
            // Скидаємо активні фільтри, щоб стара вибірка не ховала піни в новому режимі
            S.mapEventFilter = 'all';
            S.mapNewsFilter = 'all';
            renderNewsStrip();
            if (S.currentScreen === 'explore') { refreshMap(); }
        }

        function renderNewsStrip() {
            renderMapModeStrip();
            const strip = document.getElementById('news-strip');
            if (!strip) return;
            const context = mapContextScoped();
            if (context) {
                const drivers = (S.mapCrews || []).filter(c =>
                    String(c?.direction_id || '') === String(context.dirId || '') &&
                    c?.lat != null &&
                    c?.lng != null &&
                    Number.isFinite(Number(c.lat)) &&
                    Number.isFinite(Number(c.lng))
                ).length;
                const cards = [
                    { key: 'event', title: 'Подія', color: '#fbbf24', count: eventPinCountForMapContext(context) },
                    { key: 'drivers', title: 'Водії', color: '#38bdf8', count: drivers },
                    { key: 'passengers', title: 'Попутники', color: '#34d399', count: livePassengerCountForMapContext(context) },
                ];
                strip.style.display = 'grid';
                strip.style.gridTemplateColumns = 'repeat(3, minmax(0, 1fr))';
                strip.innerHTML = cards.map(c => {
                    const active = S.mapEventFilter === c.key;
                    const nextFilter = active ? 'all' : c.key;
                    return `<div class="news-banner ${active ? 'active' : ''}" onclick="setMapEventFilter('${nextFilter}')" style="background:${active ? c.color : 'var(--bg-card)'};border-color:${active ? c.color : 'var(--border)'};">
                        <div class="news-banner-title">${c.title}</div>
                        <div class="news-banner-count">${c.count}</div>
                    </div>`;
                }).join('');
                return;
            }
            S.mapEventFilter = 'all';
            const items = mapEventPointsForDiscovery('all');
            const buckets = { theocracy: 0, leisure: 0, work: 0 };
            items.forEach(point => {
                const k = classifyNewsItem(point);
                if (k in buckets) buckets[k] += 1;
            });
            const cards = [
                { key: 'theocracy', title: 'Теократія', color: '#a78bfa', count: buckets.theocracy },
                { key: 'leisure', title: 'Відпочинок', color: '#34d399', count: buckets.leisure },
                { key: 'work', title: 'Робота', color: '#38bdf8', count: buckets.work },
            ];
            strip.style.display = 'grid';
            strip.style.gridTemplateColumns = 'repeat(3, minmax(0, 1fr))';
            strip.innerHTML = cards.map(c => {
                const active = S.mapNewsFilter === c.key;
                const nextFilter = active ? 'all' : c.key;
                return `<div class="news-banner ${active ? 'active' : ''}" onclick="setMapNewsFilter('${nextFilter}')" style="background:${active ? c.color : 'var(--bg-card)'};border-color:${active ? c.color : 'var(--border)'};">
                    <div class="news-banner-title">${c.title}</div>
                    <div class="news-banner-count">${c.count}</div>
                </div>`;
            }).join('');
        }

        // Пункт 2: фокус карти на піни ВІДПОВІДНО до активного фільтра
        function focusMapByFilter() {
            if (!S.map) return;
            const context = mapContextScoped();
            const coords = [];

            if (context) {
                const dirId = String(context.dirId || '');
                const ef = S.mapEventFilter || 'all';
                if (ef === 'event' || ef === 'all') {
                    const pt = eventPointForMapContext(context);
                    if (pt && pt.lat != null && pt.lng != null) _pushMapCoord(coords, pt.lat, pt.lng);
                }
                if (ef === 'drivers' || ef === 'all') {
                    (S.mapCrews || []).forEach(c => {
                        if (String(c?.direction_id || '') === dirId) _pushMapCoord(coords, c.lat, c.lng);
                    });
                }
                if (ef === 'passengers' || ef === 'all') {
                    const members = (S.activeTrip && String(S.activeTrip.direction_id || '') === dirId
                        && Array.isArray(S.activeTrip.members)) ? S.activeTrip.members : [];
                    members.forEach(m => {
                        if (String(m?.role || '').toLowerCase() !== 'driver') _pushMapCoord(coords, m.lat, m.lng);
                    });
                }
            } else {
                const nf = S.mapNewsFilter || 'all';
                mapEventPointsForDiscovery().forEach(point => {
                    if (nf !== 'all' && classifyNewsItem(point) !== nf) return;
                    _pushMapCoord(coords, point.lat, point.lng);
                });
            }

            const seen = new Set();
            const uniq = coords.filter(([lat, lng]) => {
                const k = `${lat.toFixed(5)},${lng.toFixed(5)}`;
                if (seen.has(k)) return false; seen.add(k); return true;
            });

            if (!uniq.length) { showToast('Немає пінів цього типу на карті', ''); return; }
            if (uniq.length === 1) S.map.flyTo(uniq[0], 15, { duration: 0.6 });
            else S.map.fitBounds(uniq, { padding: [56, 56], maxZoom: 15 });
        }

        async function setMapEventFilter(filter) {
            S.mapEventFilter = filter || 'all';
            renderNewsStrip();
            if (S.currentScreen === 'explore') { await refreshMap(); focusMapByFilter(); }
        }

        async function setMapNewsFilter(filter) {
            if (guardMapFilterChange(filter)) return;
            S.mapNewsFilter = filter || 'all';
            renderNewsStrip();
            if (S.currentScreen === 'explore') { await refreshMap(); focusMapByFilter(); }
        }

        function setNewsFilter(filter) { S.newsFilter = filter || 'all'; renderNewsScreen(); }

        async function openNewsDirection(dirId) {
            if (!dirId) return;
            // Find the news item to get parent_id
            const newsItem = S.news.find(n => Number(n.direction_id) === Number(dirId));
            const parentId = newsItem?.parent_id;

            // Navigate to board screen first
            switchScreen('board');
            openDirectionLoadingSheet(dirId);

            // If news has parent folder, navigate through the tree hierarchy
            if (parentId) {
                // Build path from root to parent by walking up the tree
                const path = [];
                let currentId = parentId;
                const maxDepth = 20; // safety limit
                let depth = 0;
                while (currentId && depth < maxDepth) {
                    const dir = allDirections.find(d => String(d.id) === String(currentId));
                    if (!dir) break;
                    path.unshift({ id: dir.id, title: dir.title || `#${dir.id}` });
                    currentId = dir.parent_id;
                    depth++;
                }
                // Now navigate through the path
                S.boardStack = [];
                S.boardParentId = null;
                for (const folder of path) {
                    S.boardStack.push(folder);
                    S.boardParentId = folder.id;
                }
                // Render the board at the parent folder level, then open the direction
                await renderBoard();
                await openDirection(dirId);
            } else {
                // No parent — just open the direction detail
                await openDirection(dirId);
            }
        }

        function renderNewsFeedItems(items) {
            return items.slice(0, 60).map(n => {
                const dId = Number(n?.direction_id || 0);
                const clickHandler = dId > 0 ? `onclick="openNewsDirection(${dId})"` : '';
                const cursorStyle = dId > 0 ? 'cursor:pointer;' : '';
                return `
                <div class="news-feed-item" ${clickHandler} style="${cursorStyle}">
                    <div style="font-size:13px;font-weight:700;line-height:1.45;">${escapeHtml(n.text || 'Новина')}</div>
                    <div class="news-feed-meta">${escapeHtml(n.dir_title || 'Без напряму')} • ${formatNewsTime(n.created_at)}</div>
                </div>
            `}).join('');
        }

        // Перемикач "Підписка" ⇄ "Загальна" біля заголовка стрічки.
        function toggleNewsScope() {
            S.newsScope = (S.newsScope === 'sub') ? 'all' : 'sub';
            renderNewsScreen();
        }

        function setNewsEventFilter(key) {
            S.newsEventFilter = key || 'all';
            renderNewsScreen();
        }

        function renderNewsScreen() {
            const banners = document.getElementById('news-banners');
            const feed = document.getElementById('news-feed');
            if (!banners || !feed) return;
            const allItems = Array.isArray(S.news) ? S.news.filter(isDiscoveryNewsItem) : [];

            // Активна підписка/поїздка визначає, чи доступний режим "Підписка".
            const context = activeMapContextForMap();
            const hasSub = !!(context && context.dirId);
            // При появі НОВОЇ підписки автоматично вмикаємо режим "Підписка";
            // у межах однієї підписки ручний вибір користувача зберігається.
            if (hasSub) {
                if (S._newsScopeDirId !== String(context.dirId)) {
                    S._newsScopeDirId = String(context.dirId);
                    S.newsScope = 'sub';
                    S.newsEventFilter = 'all'; // скидаємо фільтр при зміні підписки
                }
            } else {
                S._newsScopeDirId = null;
            }
            const scope = hasSub ? (S.newsScope || 'sub') : 'all';

            // Кнопка-перемикач показується лише за наявності активної підписки.
            const scopeBtn = document.getElementById('news-scope-btn');
            if (scopeBtn) {
                if (hasSub) {
                    scopeBtn.style.display = '';
                    scopeBtn.textContent = scope === 'sub' ? '📍 Підписка' : '🌐 Загальна';
                    scopeBtn.classList.toggle('scope-sub', scope === 'sub');
                } else {
                    scopeBtn.style.display = 'none';
                    scopeBtn.classList.remove('scope-sub');
                }
            }

            // Режим "Підписка": фільтри Подія/Водії/Попутники + новини свого напрямку.
            if (scope === 'sub') {
                const dirId = String(context.dirId);
                const dirItems = allItems.filter(n => String(n?.direction_id || '') === dirId);
                const ef = S.newsEventFilter || 'all';

                // Підраховуємо кількість для кожного фільтра
                const eventCount  = dirItems.filter(n => n?.item_type === 'event'  || n?.type === 'event').length  || (dirItems.length ? 1 : 0);
                const driverCount = dirItems.filter(n => n?.item_type === 'driver' || n?.type === 'driver' || n?.viewer_role === 'driver').length;
                const paxCount    = dirItems.filter(n => n?.item_type === 'passenger' || n?.type === 'passenger' || n?.viewer_role === 'client').length;

                const eventCards = [
                    { key: 'event',      title: 'Подія',     color: '#fbbf24', count: eventCount  },
                    { key: 'drivers',    title: 'Водії',     color: '#38bdf8', count: driverCount },
                    { key: 'passengers', title: 'Попутники', color: '#34d399', count: paxCount    },
                ];
                banners.style.display = '';
                banners.innerHTML = eventCards.map(c => {
                    const active = ef === c.key;
                    return `<div class="news-banner ${active ? 'active' : ''}" onclick="setNewsEventFilter('${active ? 'all' : c.key}')" style="background:${active ? c.color + '33' : 'var(--bg-card)'};border-color:${active ? c.color : 'var(--border)'};">
                        <div class="news-banner-title">${c.title}</div>
                        <div class="news-banner-count">${c.count}</div>
                    </div>`;
                }).join('');

                // Фільтруємо новини по обраному типі
                let items = dirItems;
                if (ef === 'event')      items = dirItems.filter(n => n?.item_type === 'event'  || n?.type === 'event');
                if (ef === 'drivers')    items = dirItems.filter(n => n?.item_type === 'driver' || n?.type === 'driver' || n?.viewer_role === 'driver');
                if (ef === 'passengers') items = dirItems.filter(n => n?.item_type === 'passenger' || n?.type === 'passenger' || n?.viewer_role === 'client');

                if (!items.length) {
                    const hint = ef === 'all'
                        ? 'Натисніть «🌐 Загальна», щоб бачити всі новини'
                        : 'По цьому фільтру поки тихо';
                    feed.innerHTML = `<div class="empty"><div class="empty-icon">🗞️</div><div class="empty-title">По вашій події поки тихо</div><div class="empty-sub">${hint}</div></div>`;
                    return;
                }
                feed.innerHTML = renderNewsFeedItems(items);
                return;
            }

            // Режим "Загальна": категорійні банери + фільтр за категорією.
            banners.style.display = '';
            const buckets = { theocracy: 0, leisure: 0, work: 0 };
            allItems.forEach(n => { const k = classifyNewsItem(n); if (k in buckets) buckets[k]++; });
            const cards = [
                { key: 'theocracy', title: 'Теократія', color: '#a78bfa', count: buckets.theocracy || 0 },
                { key: 'leisure', title: 'Відпочинок', color: '#34d399', count: buckets.leisure || 0 },
                { key: 'work', title: 'Робота', color: '#38bdf8', count: buckets.work || 0 },
            ];
            banners.innerHTML = cards.map(c => {
                const active = S.newsFilter === c.key;
                return `<div class="news-banner ${active ? 'active' : ''}" onclick="setNewsFilter('${active ? 'all' : c.key}')" style="background:${active ? c.color + '22' : 'var(--bg-card)'};border-color:${active ? c.color : 'var(--border)'};">
                    <div class="news-banner-title">${c.title}</div>
                    <div class="news-banner-count">${c.count}</div>
                </div>`;
            }).join('');
            const items = S.newsFilter === 'all' ? allItems : allItems.filter(n => classifyNewsItem(n) === S.newsFilter);
            if (!items.length) {
                feed.innerHTML = '<div class="empty"><div class="empty-icon">🗞️</div><div class="empty-title">Поки тихо</div><div class="empty-sub">Нові події з\'являться незабаром</div></div>';
                return;
            }
            feed.innerHTML = renderNewsFeedItems(items);
        }

        function renderNews() {
            if (!S.apiBase) { S.news = []; renderNewsStrip(); renderNewsScreen(); updateNewsBadge(); return; }
            api('/api/v3/home/feed?limit=60&lang=' + encodeURIComponent(S.lang || 'uk')).then(data => {
                S.news = (data?.news || []).filter(isDiscoveryNewsItem);
                renderNewsStrip(); renderNewsScreen(); updateNewsBadge();
                if (S.currentScreen === 'explore') refreshMap();
            });
        }

        // ─── BOARD ───
        let allDirections = [];

        function isFolderNode(d) {
            if (!d || typeof d !== 'object') return false;
            const kind = String(d.kind || '').toLowerCase();
            return !!d.is_folder || !!d.has_kids || kind === 'folder' || kind === 'topic' || kind === 'category';
        }

        function safeCount(value) {
            const n = Number(value);
            return Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
        }

        function pluralUk(n, one, few, many) {
            const mod10 = n % 10;
            const mod100 = n % 100;
            if (mod10 === 1 && mod100 !== 11) return one;
            if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
            return many;
        }

        function buildDirectionCardStats(d) {
            const drivers = safeCount(d?.drivers ?? d?.drivers_count);
            const passengers = safeCount(d?.passengers ?? d?.passengers_count);
            const freeSeats = safeCount(d?.free_seats ?? d?.seats_free ?? d?.available_seats);
            const role = normalizeRole(S.userRole || 'client');
            if (isFolderNode(d)) {
                const total = drivers + passengers;
                return { primary: `${total} учасників нижче`, secondary: 'Відкрити розділ каталогу' };
            }
            if (_isDriverRole(role)) {
                return {
                    primary: `👤 ${passengers} ${pluralUk(passengers, 'попутник чекає', 'попутники чекають', 'попутників чекають')}`,
                    secondary: `🚗 ${drivers} ${pluralUk(drivers, 'водій уже відкрив місця', 'водії вже відкрили місця', 'водіїв вже відкрили місця')}`
                };
            }
            if (_isPassengerRole(role)) {
                const seatText = freeSeats > 0
                    ? ` • 💺 ${freeSeats} ${pluralUk(freeSeats, 'вільне місце', 'вільні місця', 'вільних місць')}`
                    : '';
                return {
                    primary: `🚗 ${drivers} ${pluralUk(drivers, 'водій з місцями', 'водії з місцями', 'водіїв з місцями')}${seatText}`,
                    secondary: `👤 ${passengers} ${pluralUk(passengers, 'попутник у черзі', 'попутники у черзі', 'попутників у черзі')}`
                };
            }
            return {
                primary: `🚗 ${drivers} ${pluralUk(drivers, 'водій', 'водії', 'водіїв')} • 👤 ${passengers} ${pluralUk(passengers, 'попутник', 'попутники', 'попутників')}`,
                secondary: 'Оберіть роль перед дією'
            };
        }

        function renderBoardBreadcrumb(canCreate = false) {
            const el = document.getElementById('board-breadcrumb');
            if (!el) return;
            if (!S.boardStack.length) { el.innerHTML = ''; updateBottomNavForBoardDepth(); return; }
            const path = S.boardStack.map(x => x?.title || `#${x?.id || '?'}`);
            el.innerHTML = `<div class="board-crumb-path" onclick="boardGoRoot()" title="До кореня">${path.map(p => escapeHtml(String(p))).join(' / ')}</div>`;
            updateBottomNavForBoardDepth();
        }

        async function boardGoRoot() {
            S.boardStack = []; S.boardParentId = null;
            const search = document.getElementById('board-search');
            if (search) search.value = '';
            await renderBoard();
        }

        async function boardGoUp() {
            if (!S.boardStack.length) return;
            S.boardStack.pop();
            S.boardParentId = S.boardStack.length ? S.boardStack[S.boardStack.length - 1].id : null;
            const search = document.getElementById('board-search');
            if (search) search.value = '';
            await renderBoard();
        }

        async function boardOpenFolder(dirId) {
            const dir = allDirections.find(d => String(d.id) === String(dirId));
            if (!dir || !isFolderNode(dir)) return;
            S.boardParentId = dir.id;
            S.boardStack.push({ id: dir.id, title: dir.title || `#${dir.id}` });
            const search = document.getElementById('board-search');
            if (search) search.value = '';
            await renderBoard();
        }

        async function renderBoard() {
            const list = document.getElementById('board-list');
            list.innerHTML = '<div class="skeleton" style="height:60px;margin:12px 16px;"></div>'.repeat(3);
            if (!S.apiBase) {
                renderBoardBreadcrumb(false);
                list.innerHTML = '<div class="empty"><div class="empty-icon">🧭</div><div class="empty-title">Підключіть API</div><div class="empty-sub">Вкажіть адресу сервера в налаштуваннях</div></div>';
                return;
            }

            const currentDirs = allDirections || [];
            S.canCreateEvent = S.boardStack.length > 0
                && S.boardParentId !== null
                && S.boardParentId !== undefined
                && !(document.getElementById('board-search')?.value?.trim())
                && !currentDirs.some(d => isFolderNode(d));

            renderBoardBreadcrumb(S.canCreateEvent);
            const qp = new URLSearchParams({ lang: S.lang });
            if (S.userId) qp.set('user_id', String(S.userId));
            if (S.boardParentId !== null && S.boardParentId !== undefined) qp.set('parent_id', String(S.boardParentId));
            const [data, subs] = await Promise.all([
                api(`/api/v3/board?${qp.toString()}`),
                S.userId ? api(`/api/v3/user/subscriptions?user_id=${S.userId}`) : Promise.resolve(null),
            ]);
            allDirections = Array.isArray(data) ? data : (data?.directions || []);
            const freshSubscriptions = subs?.subscriptions || [];
            S.subscriptions = freshSubscriptions;
            const subSet = new Set(freshSubscriptions.map(s => String(s.direction_id)));
            S.boardSubSet = subSet;
            renderBoardList(allDirections, S.boardSubSet);
            // Перерахунок зі свіжими даними (чи є підпапки) + оновлення нижнього меню
            S.canCreateEvent = S.boardStack.length > 0
                && S.boardParentId !== null
                && S.boardParentId !== undefined
                && !(document.getElementById('board-search')?.value?.trim())
                && !(allDirections || []).some(d => isFolderNode(d));
            updateBottomNavForBoardDepth();
        }

        function renderBoardList(dirs, subSet) {
            const list = document.getElementById('board-list');
            if (!dirs.length) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Немає напрямків</div></div>`;
                return;
            }
            list.innerHTML = dirs.map(d => {
                const id = String(d.id);
                const isFolder = isFolderNode(d);
                const isSub = !isFolder && subSet?.has(id);
                const stats = buildDirectionCardStats(d);
                const sigil = isFolder
                    ? `<svg viewBox="0 0 24 24"><path d="M12 3l7 4.5v9L12 21l-7-4.5v-9L12 3z"></path><path d="M12 7v10"></path><path d="M8 12h8"></path></svg>`
                    : `<svg viewBox="0 0 24 24"><path d="M12 3l8 9-8 9-8-9 8-9z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>`;
                const click = isFolder ? `boardOpenFolder(${d.id})` : `openDirection(${d.id})`;
                return `<div class="dir-card ${isSub ? 'subscribed' : ''}" onclick="${click}">
                    <div class="dir-card-icon" style="background:${isSub ? 'var(--green-dim)' : 'rgba(255,255,255,0.04)'};color:${isSub ? 'var(--green)' : (isFolder ? 'var(--text-secondary)' : 'var(--accent)')};">${sigil}</div>
                    <div class="dir-card-info">
                        <div class="dir-card-name">${escapeHtml(d.title || 'Напрямок')}</div>
                        <div class="dir-card-stats"><span class="dir-card-total">${escapeHtml(stats.primary)}</span><span class="dir-card-context">${escapeHtml(stats.secondary)}</span></div>
                    </div>
                    <div class="dir-card-arrow">›</div>
                </div>`;
            }).join('');
        }

        function activeSubscriptionForRadar() {
            return (S.subscriptions || [])[0] || null;
        }

        function directionIdForRadar(sub) {
            const raw = sub?.direction_id ?? sub?.id ?? 0;
            const dirId = Number(raw);
            return Number.isFinite(dirId) && dirId > 0 ? dirId : 0;
        }

        function openCrewCountForRadar(dirId) {
            if (!dirId) return 0;
            return (S.mapCrews || []).filter(c =>
                String(c?.direction_id || '') === String(dirId) &&
                String(c?.organizer_id || '') !== String(S.userId || '') &&
                c?.lat != null &&
                c?.lng != null &&
                Number.isFinite(Number(c?.lat)) &&
                Number.isFinite(Number(c?.lng))
            ).length;
        }

        function activeMapContextForMap() {
            const tripDirId = Number(S.activeTrip?.direction_id || 0);
            if (Number.isFinite(tripDirId) && tripDirId > 0) {
                return {
                    kind: 'trip',
                    dirId: tripDirId,
                    title: S.activeTrip?.direction_title || S.activeTrip?.dir_title || S.activeTrip?.title || `#${tripDirId}`,
                };
            }

            const sub = activeSubscriptionForRadar();
            const subDirId = directionIdForRadar(sub);
            if (sub && subDirId) {
                return {
                    kind: 'subscription',
                    dirId: subDirId,
                    title: sub.title || sub.direction_title || sub.dir_title || `#${subDirId}`,
                };
            }
            return null;
        }

        // Контекст карти з урахуванням перемикача Підписка/Загальна.
        // У режимі 'all' трактуємо як відсутність контексту → карта показує всі піни (discovery).
        // ВАЖЛИВО: стрічку новин (renderNewsScreen) це НЕ зачіпає — там свій S.newsScope.
        function mapContextScoped() {
            if (S.mapScope === 'all') return null;
            return activeMapContextForMap();
        }

        function mapFocusedDirectionId() {
            return mapContextScoped()?.dirId || 0;
        }

        function isMapFocusedMode() {
            return !!mapFocusedDirectionId();
        }

        function visibleMapCrewsForContext(crews) {
            const focusedDirId = mapFocusedDirectionId();
            return (crews || []).filter(c => {
                if (!c || c.lat == null || c.lng == null) return false;
                if (focusedDirId) {
                    const eventFilter = S.mapEventFilter || 'all';
                    if (eventFilter !== 'all' && eventFilter !== 'drivers') return false;
                    return String(c?.direction_id || '') === String(focusedDirId);
                }
                return false;
            });
        }

        function _pushMapCoord(coords, lat, lng) {
            const y = Number(lat);
            const x = Number(lng);
            if (Number.isFinite(y) && Number.isFinite(x)) coords.push([y, x]);
        }

        function activeMapContextCoords(context = activeMapContextForMap()) {
            const dirId = String(context?.dirId || '');
            if (!dirId) return [];
            const coords = [];
            (S.mapCrews || []).forEach(c => {
                if (String(c?.direction_id || '') === dirId) _pushMapCoord(coords, c.lat, c.lng);
            });
            (S.news || []).forEach(n => {
                if (String(n?.direction_id || '') === dirId && isDiscoveryNewsItem(n)) _pushMapCoord(coords, n.lat, n.lng);
            });
            if (S.activeTrip && String(S.activeTrip.direction_id || '') === dirId) {
                _pushMapCoord(coords, S.activeTrip.pickup_lat, S.activeTrip.pickup_lng);
            }
            if (S.pickupCoords && context?.kind === 'trip') {
                _pushMapCoord(coords, S.pickupCoords.lat, S.pickupCoords.lng);
            }
            const seen = new Set();
            return coords.filter(([lat, lng]) => {
                const key = `${lat.toFixed(5)},${lng.toFixed(5)}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function renderMapFocusButton() {
            const btn = document.getElementById('map-focus-btn');
            if (!btn) return;
            const context = activeMapContextForMap();
            if (!context) {
                btn.hidden = true;
                return;
            }
            const title = context.kind === 'trip' ? 'Сфокусувати поїздку' : 'Сфокусувати подію';
            btn.hidden = false;
            btn.title = title;
            btn.setAttribute('aria-label', title);
        }

        function focusActiveMapContext() {
            const context = activeMapContextForMap();
            if (!S.map || !context) return;
            const coords = activeMapContextCoords(context);
            if (!coords.length) {
                showToast('У цієї події ще немає точки на карті', '');
                return;
            }
            if (coords.length === 1) {
                S.map.flyTo(coords[0], 15, { duration: 0.8 });
            } else {
                S.map.fitBounds(coords, { padding: [64, 64], maxZoom: 15 });
            }
        }

        function guardMapFilterChange(filter) {
            const context = mapContextScoped();
            if (!context) return false;
            const nextFilter = filter || 'all';
            if (nextFilter === S.mapNewsFilter) return false;
            const dirId = parseInt(context.dirId) || 0;
            const title = escapeHtml(context.title || `#${dirId}`);
            const stopButton = context.kind === 'subscription'
                ? '<button class="btn btn-danger" id="map-filter-stop">Зупинити пошук</button>'
                : '';
            openSheet(`
                <div class="sheet-title">У вас активний пошук</div>
                <div class="sheet-sub">
                    Карта зараз сфокусована на «${title}». Щоб не змішувати пін-пошук з активною підпискою,
                    спочатку завершіть цей фокус або відкрийте його картку.
                </div>
                <div class="sheet-actions">
                    <button class="btn btn-primary" id="map-filter-stay">Лишитись тут</button>
                    <button class="btn btn-secondary" id="map-filter-open">Відкрити подію</button>
                    ${stopButton}
                </div>
            `);
            requestAnimationFrame(() => {
                document.getElementById('map-filter-stay')?.addEventListener('click', closeSheet);
                document.getElementById('map-filter-open')?.addEventListener('click', () => {
                    closeSheet();
                    openDirectionFromMap(dirId);
                });
                document.getElementById('map-filter-stop')?.addEventListener('click', () => unsubscribeDir(dirId));
            });
            return true;
        }

        function formatRadarSyncAge(ts) {
            if (!ts) return 'синхронізація очікується';
            const sec = Math.max(0, Math.round((Date.now() - ts) / 1000));
            if (sec < 10) return 'оновлено щойно';
            if (sec < 60) return `оновлено ${sec} сек тому`;
            return `оновлено ${Math.floor(sec / 60)} хв тому`;
        }

        function renderQueueRadarPanel(isDriver) {
            const sub = activeSubscriptionForRadar();
            if (!sub) return '';
            const dirId = directionIdForRadar(sub);
            const title = escapeHtml(sub.title || sub.direction_title || (dirId ? `#${dirId}` : 'Напрямок'));
            const openCrews = openCrewCountForRadar(dirId);
            const mapText = S.lastMapSyncAt ? `${openCrews} ${openCrews === 1 ? 'водій' : 'водіїв'} на карті` : 'карта синхронізується';
            const primaryLine = isDriver
                ? (S.myCrew ? 'Екіпаж відкрито. Попутники можуть постукати до вас.' : 'Відкрийте місця, щоб попутники побачили ваш екіпаж.')
                : (openCrews > 0 ? 'Є відкриті екіпажі на цьому напрямку.' : 'Поки немає відкритих водіїв, але ваша підписка активна.');
            const pollSec = Math.round(POLL_INTERVAL_MS / 1000);
            const stopButton = dirId
                ? `<button class="btn btn-ghost" style="margin-top:8px;width:100%;" onclick="unsubscribeDir(${dirId})">⏹️ Зупинити пошук</button>`
                : '';
            return `
                <div style="margin:16px auto 0;max-width:360px;text-align:left;padding:14px;border:1px solid rgba(56,189,248,0.22);border-radius:12px;background:rgba(56,189,248,0.07);">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
                        <div style="font-size:12px;font-weight:800;color:var(--accent);letter-spacing:0;">🔎 Автоматичний пошук активний</div>
                        <div style="font-size:11px;color:var(--text-muted);">${escapeHtml(formatRadarSyncAge(S.lastHydrateAt || S.lastMapSyncAt))}</div>
                    </div>
                    <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:6px;">✅ Підписка активна · ${title}</div>
                    <div style="font-size:12px;color:var(--text-secondary);line-height:1.45;">${escapeHtml(primaryLine)}</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
                        <div style="padding:9px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);">
                            <div style="font-size:11px;color:var(--text-muted);">Сервер</div>
                            <div style="font-size:12px;font-weight:700;color:var(--text-primary);">бачить вас</div>
                        </div>
                        <div style="padding:9px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);">
                            <div style="font-size:11px;color:var(--text-muted);">Карта</div>
                            <div style="font-size:12px;font-weight:700;color:var(--text-primary);">${escapeHtml(mapText)}</div>
                        </div>
                    </div>
                    <div style="margin-top:10px;font-size:11px;color:var(--text-muted);">Синхронізація активна · polling ${pollSec} сек · без таймера підбору</div>
                    ${!isDriver ? `<button class="btn btn-secondary" style="margin-top:12px;width:100%;" onclick="switchScreen('explore')">🗺️ Переглянути водіїв на карті</button>` : ''}
                    ${stopButton}
                </div>`;
        }

        function filterBoard(query) {
            clearTimeout(searchTimer);
            const q = sanitizeSearchInput(query).trim();
            if (!q) {
                // Clear search, reload current level
                renderBoard();
                return;
            }
            // First, filter locally (current level)
            const localResults = allDirections.filter(d => (d.title || '').toLowerCase().includes(q.toLowerCase()));
            if (localResults.length > 0) {
                renderBoardList(localResults, S.boardSubSet);
                const el = document.getElementById('board-breadcrumb');
                if (el) {
                    el.innerHTML = `<div class="board-crumb-path" style="color:var(--accent);">🔍 ${localResults.length} результат${localResults.length !== 1 ? 'ів' : ''} (поточний рівень)</div>`;
                }
                return;
            }
            // No local results, perform deep search (debounced)
            searchTimer = setTimeout(async () => {
                // Show loading indicator
                const el = document.getElementById('board-breadcrumb');
                if (el) {
                    el.innerHTML = `<div class="board-crumb-path" style="color:var(--accent);">🔍 Шукаю по всій дошці...</div>`;
                }
                const qp = new URLSearchParams({ lang: S.lang, q });
                if (S.userId) qp.set('user_id', String(S.userId));
                const data = await api(`/api/v3/board?${qp.toString()}`);
                const searchResults = Array.isArray(data) ? data : (data?.directions || []);
                renderBoardList(searchResults, S.boardSubSet);
                if (el) {
                    el.innerHTML = `<div class="board-crumb-path" style="color:var(--accent);">🔍 ${searchResults.length} результат${searchResults.length !== 1 ? 'ів' : ''} (вся дошка)</div>`;
                }
            }, 300);
        }

        function cachedDirectionDetails(dirId) {
            const key = String(dirId);
            const sources = [
                allDirections.find(d => String(d?.id) === key),
                (S.subscriptions || []).find(s => String(s?.direction_id || s?.id) === key),
                (S.news || []).find(n => String(n?.direction_id || n?.id) === key),
                (S.mapCrews || []).find(c => String(c?.direction_id || c?.id) === key),
            ].filter(Boolean);
            const hit = {};
            sources.forEach(src => {
                Object.keys(src || {}).forEach(k => {
                    if (hit[k] === undefined || hit[k] === null || hit[k] === '') hit[k] = src[k];
                });
            });
            return hit;
        }

        function cachedDirectionTitle(dirId) {
            const hit = cachedDirectionDetails(dirId);
            return hit.title || hit.direction_title || hit.dir_title || hit.direction || hit.name || `#${dirId}`;
        }

        function openDirectionLoadingSheet(dirId) {
            const title = escapeHtml(cachedDirectionTitle(dirId));
            openSheet(`
                <div class="sheet-title">Відкриваю подію</div>
                <div class="sheet-sub">${title}</div>
                <div style="text-align:center;padding:18px 0 8px;">
                    <div class="pulse-dot" style="margin:0 auto 12px;"></div>
                    <div style="font-size:13px;color:var(--text-muted);">Завантажуємо організатора й екіпажі...</div>
                </div>
            `);
        }

        // ─── OPEN DIRECTION — full version ───
        async function openDirection(dirId) {
            S._openDirectionSeq = (S._openDirectionSeq || 0) + 1;
            const seq = S._openDirectionSeq;
            openDirectionLoadingSheet(dirId);
            const data = await api(`/api/v3/fractal/organizers?direction_id=${dirId}&lang=${S.lang}&user_id=${S.userId || ''}`);
            if (seq !== S._openDirectionSeq) return;
            let dir = allDirections.find(d => String(d.id) === String(dirId));
            if (!dir && data?.direction && typeof data.direction === 'object') {
                dir = {
                    id: data.direction.id ?? dirId,
                    title: data.direction.title || data.direction.name || 'Напрямок',
                    drivers: Number(data.direction.drivers || data.direction.drivers_count || 0),
                    passengers: Number(data.direction.passengers || data.direction.passengers_count || 0),
                    is_folder: !!data.direction.is_folder,
                    has_kids: !!data.direction.has_kids,
                    kind: data.direction.kind || '',
                };
            }
            if (!dir) { closeSheet(); showToast('Напрямок недоступний', 'error'); return; }
            if (isFolderNode(dir)) { closeSheet(); await boardOpenFolder(dirId); return; }
            const orgs = data?.organizers || [];
            const isSub = data?.user_status?.subscribed;
            const creatorId = data?.direction?.creator_id || data?.direction?.user_id || dir?.creator_id || dir?.user_id;
            const isMyDir = creatorId && String(creatorId) === String(S.userId);
            const creatorName = data?.direction?.creator_name || dir?.creator_name || (isMyDir ? S.userName : '');
            const creatorUsername = sanitizeBotUsername(data?.direction?.creator_username || dir?.creator_username || (isMyDir ? S.userUsername : ''));
            const creatorDisplay = creatorName || (creatorId ? `#${creatorId}` : '');
            const creatorContactBlock = creatorId ? `
                <div style="margin:10px 0 12px;padding:10px;border-radius:8px;background:rgba(56,189,248,0.07);border:1px solid rgba(56,189,248,0.18);">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                        <div style="font-size:12px;color:var(--text-secondary);line-height:1.45;">
                            <span style="color:var(--text-muted);">Організатор:</span>
                            <strong style="color:var(--text-primary);">${escapeHtml(creatorDisplay || 'Організатор')}</strong>
                            ${creatorUsername ? `<span style="color:var(--blue);">@${escapeHtml(creatorUsername)}</span>` : ''}
                        </div>
                        ${!isMyDir ? `<button class="btn btn-secondary" style="padding:7px 10px;font-size:12px;min-height:34px;" data-tg-username="${escapeAttr(creatorUsername)}" data-tg-user-id="${parseInt(creatorId, 10) || 0}" onclick="openTelegramContactFromButton(this)">💬 Написати організатору</button>` : `<span class="tag tag-green">Ваша ідея</span>`}
                    </div>
                </div>` : '';
            const availOrgs = orgs.filter(o => String(o.user_id) !== String(S.userId) && (o.seats_free > 0 || o.role !== 'driver'));
            const hasPickup = !!S.pickupCoords;
            const directionStats = buildDirectionCardStats(dir);
            const dirMeta = data?.direction || dir || {};
            const meetingPoint = dirMeta.meeting_point || dir.meeting_point || '';
            const desc = dirMeta.description || dir.description || '';
            const startAt = dirMeta.start_date || dir.start_date || '';
            const endAt = dirMeta.end_date || dir.end_date || '';
            const whenText = startAt && endAt ? `${formatIdeaDate(startAt)} — ${formatIdeaDate(endAt)}` : (formatIdeaDate(startAt) || formatIdeaDate(endAt));
            const detailRows = [
                meetingPoint ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.4;">📍 ${escapeHtml(meetingPoint)}</div>` : '',
                whenText ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.4;">🗓 ${escapeHtml(whenText)}</div>` : '',
                desc ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.45;margin-top:6px;white-space:pre-wrap;">${escapeHtml(desc)}</div>` : ''
            ].filter(Boolean).join('');

            openSheet(`
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
                    <div style="font-size:28px;">🧭</div>
                    <div style="flex:1;">
                        <div class="sheet-title" style="margin-bottom:0;">${escapeHtml(dir.title || 'Напрямок')}</div>
                        <div style="font-size:12px;color:var(--text-secondary);font-weight:600;">${escapeHtml(directionStats.primary)}<br><span style="color:var(--text-muted);">${escapeHtml(directionStats.secondary)}</span></div>
                    </div>
                    ${isMyDir ? `<div style="display:flex;gap:6px;flex-shrink:0;"><button onclick="shareDirectionInvite(${parseInt(dirId) || 0})" style="padding:6px 10px;border-radius:8px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.28);color:var(--blue);font-size:14px;cursor:pointer;" title="Запросити учасників">📨</button><button data-dir-id="${parseInt(dirId) || 0}" data-dir-title="${escapeAttr(String(dir.title || ''))}" onclick="openEditDirectionFromButton(this)" style="padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text-secondary);font-size:14px;cursor:pointer;" title="Редагувати">✏️</button></div>` : ''}
                </div>
                ${creatorContactBlock}
                ${detailRows ? `<div style="margin:10px 0 12px;padding:10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);">${detailRows}</div>` : ''}
                <div style="display:flex;gap:8px;margin:12px 0 8px;">
                    ${isSub
                    ? `<button class="btn btn-danger" style="flex:1;" onclick="unsubscribeDir(${dirId})">🚫 Відписатись</button>`
                    : `<button class="btn btn-primary" style="flex:1;" onclick="subscribeAndPickup(${dirId})">Шукати місце / партнера</button>`}
                    <button class="btn btn-secondary" onclick="closeSheet()">Закрити</button>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);line-height:1.45;margin:-2px 0 10px;">${isSub ? 'Ви ще не в поїздці. Очікуйте запит або запросіться до водія.' : 'Напрямок може створити водій або попутник. Після підписки ви дієте за своєю роллю.'}</div>
                ${isSub ? `<button class="btn btn-secondary" style="width:100%;margin-bottom:8px;font-size:12px;" onclick="pickPickupLocation(${dirId})">${hasPickup ? '📍 Моя точка посадки ✓' : '📍 Додати точку посадки'}</button>` : ''}
                ${availOrgs.length > 1 ? `<button class="btn btn-secondary" style="width:100%;margin-bottom:8px;font-size:12px;color:var(--blue);" onclick="groupJoinDirection(${dirId}, [${availOrgs.map(o => o.user_id).join(',')}])">🔀 Запроситись до доступного екіпажу (${availOrgs.length})</button>` : ''}
                ${orgs.length ? `
                    <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text-muted);letter-spacing:1px;margin:8px 0 4px;">Водії та екіпажі</div>
                    ${orgs.slice(0, 6).map(o => `
                        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
                            ${renderAvatarInline(o.name || 'Водій', o.photo_url || '', 36)}
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:700;font-size:13px;">${escapeHtml(o.name || 'Водій')}</div>
                                <div style="font-size:11px;color:var(--text-secondary);">${normalizeRole(o.role || 'driver') === 'driver' ? '🚗 Водій' : '👤 Попутник'}${o.seats_free > 0 ? ' • <span style="color:var(--accent);">' + o.seats_free + ' місць</span>' : ''}</div>
                            </div>
                            ${String(o.user_id) !== String(S.userId)
                            ? (S.userRole !== 'driver' && normalizeRole(o.role || 'driver') === 'driver'
                            ? `<button class="btn btn-primary" style="padding:6px 10px;font-size:12px;min-height:36px;" onclick="requestJoin(${o.user_id}, ${dirId}, { closeSheetOnSuccess: true })">Запроситись</button>`
                            : '')
                            : '<span class="tag tag-green">Ви</span>'}
                        </div>`).join('')}`
                    : '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">Поки немає відкритих екіпажів. Можете стати в чергу.</div>'}
            `);
        }

        async function subscribeDir(dirId, options = {}) {
            if (!requireRoleForAction('стати в чергу', () => subscribeDir(dirId, options))) return false;
            const dir = allDirections.find(d => String(d.id) === String(dirId));
            if (isFolderNode(dir)) { showToast('Оберіть конкретний напрямок, не каталог', 'error'); return; }
            // Re-subscribing to a recently-removed direction: stop suppressing it.
            if (S._recentlyUnsubbed && S._recentlyUnsubbed.id === String(dirId)) S._recentlyUnsubbed = null;

            // Check if user is already subscribed to a different direction
            const currentSubs = S.subscriptions || [];
            const otherSub = currentSubs.find(s => String(s.direction_id) !== String(dirId));
            if (otherSub) {
                const oldTitle = otherSub.title || otherSub.direction_title || `#${otherSub.direction_id}`;
                const newTitle = dir?.title || `#${dirId}`;
                const confirmed = await new Promise(resolve => {
                    openSheet(`
                        <div class="sheet-title">Перемкнути чергу?</div>
                        <div class="sheet-sub">Ви вже в черзі на "${escapeHtml(oldTitle)}".<br>Перейти на "${escapeHtml(newTitle)}"?<br><br>Попередня черга буде скасована.</div>
                        <div class="sheet-actions">
                            <button class="btn btn-primary" id="confirm-switch-yes">✓ Так, перемкнути</button>
                            <button class="btn btn-ghost" id="confirm-switch-no">Скасувати</button>
                        </div>
                    `);
                    document.getElementById('confirm-switch-yes').onclick = () => { closeSheet(); resolve(true); };
                    document.getElementById('confirm-switch-no').onclick = () => { closeSheet(); resolve(false); };
                });
                if (!confirmed) return false;
                // Hide the old direction from the sub-bar until the server finishes the switch.
                S._recentlyUnsubbed = { id: String(otherSub.direction_id), until: Date.now() + 8000 };
            }

            const manualOnly = !!options?.manualOnly;
            const resp = await apiWithStatus('/api/v3/board/subscribe', {
                method: 'POST',
                body: JSON.stringify({ user_id: S.userId, direction_id: dirId, role: S.userRole, auto_match: !manualOnly })
            });
            const status = String(resp?.data?.status || '');
            if (!resp.ok || (status !== 'ok' && status !== 'already_subscribed')) {
                showToast(resp?.data?.detail || 'Не вдалося стати в чергу', 'error');
                return false;
            }

            // Show notification if direction was switched
            const switchedFrom = resp?.data?.switched_from;
            if (switchedFrom) {
                showToast('↩️ Чергу перемкнено на новий напрямок', 'success');
            }

            await hydrate();
            const keepSheetOpen = !!options?.keepSheetOpen;
            if (!keepSheetOpen) closeSheet();
            const showCoordinationMap = options?.afterSuccessScreen === 'explore';
            const openCoordinationMap = async () => {
                switchScreen('explore');
                renderNewsStrip();
                await refreshMap();
                focusActiveMapContext();
            };
            if (S.pendingMatches.length > 0) {
                if (showCoordinationMap) {
                    await openCoordinationMap();
                    if (keepSheetOpen) {
                        openMapSubscribedSheet(dirId, { sheetMaxHeight: '65vh' });
                        showToast('Підписка активна на карті', 'success');
                        return true;
                    }
                    if (resp.ok && (status === 'ok' || status === 'already_subscribed')) {
                        showToast('🔔 Є збіг інтересів! Перевірте Поїздки', 'success');
                    }
                } else {
                    switchScreen('trips');
                    showToast('🔔 Є збіг інтересів! Перевірте вкладку Поїздки', 'success');
                }
            } else {
                showToast(manualOnly ? 'Подія відкрита на карті' : (status === 'already_subscribed' ? 'Ви вже в черзі' : '✓ Ви в черзі. Поїздку ще не підтверджено.'), 'success');
                if (showCoordinationMap) {
                    await openCoordinationMap();
                    if (keepSheetOpen) openMapSubscribedSheet(dirId, { sheetMaxHeight: '65vh' });
                    return true;
                }
                // Re-hydrate after delay to catch handshakes created by async matching task
                setTimeout(async () => {
                    await hydrate();
                    if (S.pendingMatches.length > 0 && !S.activeTrip) {
                        switchScreen('trips');
                        showToast('🔔 Є збіг інтересів!', 'success');
                    } else {
                        // No match yet — show lifecycle feedback
                        switchScreen('trips');
                    }
                }, 1500);
            }
            return true;
        }

        async function unsubscribeDir(dirId) {
            const dir = allDirections.find(d => String(d.id) === String(dirId));
            if (isFolderNode(dir)) { showToast('Це каталог, оберіть напрямок', 'error'); return; }
            const resp = await apiWithStatus('/api/v3/board/unsubscribe', {
                method: 'POST',
                body: JSON.stringify({ user_id: S.userId, direction_id: dirId })
            });
            if (!resp.ok) {
                showToast(resp?.data?.detail || 'Не вдалося відписатись', 'error');
                return false;
            }
            S._recentlyUnsubbed = { id: String(dirId), until: Date.now() + 8000 };
            await hydrate();
            showToast('Відписано');
            closeSheet();
            return true;
        }
