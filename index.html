<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WayTandem</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080A0F;--s1:#0E1118;--s2:#141926;--s3:#1C2235;
  --rim:rgba(255,255,255,0.06);--rim2:rgba(255,255,255,0.11);
  --g1:#C8FF57;--g2:#A8EF3C;--b1:#57D1FF;--b2:#38B8F0;
  --r1:#FF5757;--o1:#FFB347;
  --w:#EEF1F8;--w2:#8890AA;--w3:#3D4460;
  --rad:20px;--rad2:14px;--rad3:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;width:100%;background:var(--bg);color:var(--w);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");}
.amb{position:fixed;pointer-events:none;border-radius:50%;filter:blur(90px);transition:all 1.4s cubic-bezier(.4,0,.2,1);}
#a1{width:340px;height:340px;top:-100px;right:-80px;background:rgba(200,255,87,.07);}
#a2{width:300px;height:300px;bottom:40px;left:-90px;background:rgba(87,209,255,.06);}
.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px;background:linear-gradient(110deg,var(--g1),var(--b1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-pill{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--rim);padding:5px 11px 5px 5px;border-radius:30px;font-size:12px;color:var(--w2);}
.hdr-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--b1));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#080A0F;}
.sbar{position:relative;z-index:10;display:flex;align-items:center;gap:9px;padding:0 18px 10px;flex-shrink:0;}
.sdots{display:flex;gap:4px;align-items:center;}
.sd{height:3px;border-radius:2px;background:var(--w3);transition:all .3s;}
.sd.a{background:var(--g1);width:20px;}.sd.d{background:var(--w2);width:8px;}.sd.t{width:8px;}
.slbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--w3);}
.ca{flex:1;position:relative;overflow:hidden;padding:0 14px;}
.card{position:absolute;inset:0 14px;display:flex;flex-direction:column;border-radius:var(--rad);border:1px solid var(--rim);background:var(--s1);overflow:hidden;
  transition:transform .38s cubic-bezier(.34,1.15,.64,1),opacity .32s;transform:translateX(0) scale(1);opacity:1;will-change:transform,opacity;}
.card.xl{transform:translateX(108%) scale(.93);opacity:0;}.card.xr{transform:translateX(-108%) scale(.93);opacity:0;}
.card.er{transform:translateX(108%) scale(.93);opacity:0;}.card.el{transform:translateX(-108%) scale(.93);opacity:0;}
.card.in{transform:translateX(0) scale(1);opacity:1;}
.hero{flex-shrink:0;padding:22px 22px 16px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,var(--s1) 100%);pointer-events:none;}
.h-em{font-size:48px;line-height:1;display:block;margin-bottom:12px;filter:drop-shadow(0 6px 20px rgba(0,0,0,.4));}
.h-tag{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--w3);margin-bottom:4px;}
.h-ttl{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(20px,5.5vw,26px);line-height:1.15;color:var(--w);}
.h-ttl em{font-style:normal;}
.h-sub{font-size:13px;color:var(--w2);margin-top:6px;line-height:1.5;font-weight:300;}
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 22px 12px;scrollbar-width:none;}
.body::-webkit-scrollbar{display:none;}
.acts{flex-shrink:0;padding:10px 18px calc(10px + var(--safe-b));display:flex;flex-direction:column;gap:8px;background:linear-gradient(to top,var(--s1) 75%,transparent);}
.btn{width:100%;padding:14px 18px;border-radius:var(--rad2);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .14s;position:relative;overflow:hidden;}
.btn:active{transform:scale(.97);}
.btn-p{background:linear-gradient(135deg,var(--g1),var(--g2));color:#080A0F;box-shadow:0 5px 24px rgba(200,255,87,.26);}
.btn-b{background:linear-gradient(135deg,var(--b1),var(--b2));color:#080A0F;box-shadow:0 5px 24px rgba(87,209,255,.20);}
.btn-g{background:var(--s2);border:1px solid var(--rim);color:var(--w2);}
.btn-d{background:rgba(255,87,87,.09);border:1px solid rgba(255,87,87,.18);color:var(--r1);}
.btn-row{display:flex;gap:8px;}.btn-row .btn{flex:1;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mode-card{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:14px 12px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:6px;}
.mode-card:active{transform:scale(.97);}
.mode-card.mc-g{border-color:rgba(200,255,87,.25);background:rgba(200,255,87,.04);}
.mode-card.mc-b{border-color:rgba(87,209,255,.25);background:rgba(87,209,255,.04);}
.mc-ico{font-size:26px;line-height:1;}.mc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.mc-sub{font-size:11px;color:var(--w2);line-height:1.4;}
.breadcrumb{display:flex;align-items:center;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.bc-seg{font-size:11px;color:var(--w3);cursor:pointer;padding:3px 7px;border-radius:8px;transition:all .15s;}
.bc-seg:active{background:var(--s2);}.bc-seg.cur{color:var(--w);background:var(--s3);}
.bc-arr{font-size:10px;color:var(--w3);}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--w3);margin-bottom:9px;}
.dir-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.dir-item{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);overflow:hidden;transition:border-color .2s;}
.dir-item.expanded{border-color:var(--b1);}
.dir-row{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;user-select:none;}
.dir-row:active{background:rgba(255,255,255,.03);}
.di-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--s3);}
.di-icon.g{background:rgba(200,255,87,.12);}.di-icon.b{background:rgba(87,209,255,.12);}
.di-body{flex:1;min-width:0;}
.di-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-meta{display:flex;gap:7px;margin-top:3px;font-size:11px;color:var(--w2);}
.di-chevron{font-size:11px;color:var(--w3);transition:transform .25s;}
.dir-item.expanded .di-chevron{transform:rotate(180deg);}
.shutter{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.shutter.open{max-height:200px;}
.shutter-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;}
.sh-divider{height:1px;background:var(--rim);margin:0 -14px 4px;}
.sh-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sh-stat{background:var(--s3);border-radius:var(--rad3);padding:8px 10px;}
.sh-label{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--w3);margin-bottom:2px;}
.sh-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.sh-val.g{color:var(--g1);}.sh-val.b{color:var(--b1);}
.sh-btn-row{display:flex;gap:7px;}
.sh-btn{flex:1;padding:9px;border-radius:var(--rad3);border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.sh-btn:active{transform:scale(.97);}
.sh-btn-p{background:linear-gradient(135deg,var(--g1),var(--g2));color:#080A0F;}
.sh-btn-b{background:linear-gradient(135deg,var(--b1),var(--b2));color:#080A0F;}
.sh-btn-g{background:var(--s3);color:var(--w2);border:1px solid var(--rim);}
.pag-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0 2px;}
.pag-btn{padding:7px 14px;border-radius:var(--rad3);border:1px solid var(--rim);background:var(--s2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--w2);cursor:pointer;}
.pag-btn:disabled{opacity:.3;cursor:default;}
.pag-info{font-size:12px;color:var(--w3);}
.grp-card{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:13px 14px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.grp-card:active{transform:scale(.98);}
.grp-av{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--b1),rgba(200,255,87,.6));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.grp-body{flex:1;min-width:0;}
.grp-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.grp-meta{font-size:11px;color:var(--w2);margin-top:2px;}
.grp-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;flex-shrink:0;}
.grp-open{background:rgba(200,255,87,.1);color:var(--g1);}.grp-closed{background:var(--s3);color:var(--w3);}
.hist-item{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:12px 14px;margin-bottom:7px;}
.h-ico{width:36px;height:36px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.h-dir{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-meta{font-size:11px;color:var(--w2);margin-top:2px;}
.h-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;background:var(--s3);color:var(--w3);margin-left:auto;flex-shrink:0;}
.spinner{display:flex;align-items:center;justify-content:center;padding:30px;color:var(--w3);font-size:13px;gap:10px;}
.spin{width:18px;height:18px;border:2px solid var(--w3);border-top-color:var(--g1);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-hint{text-align:center;padding:24px 16px;color:var(--w3);font-size:13px;}
.nav{position:relative;z-index:10;display:flex;background:rgba(8,10,15,.94);backdrop-filter:blur(22px);border-top:1px solid var(--rim);padding:7px 0 calc(7px + var(--safe-b));flex-shrink:0;}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px;cursor:pointer;color:var(--w3);transition:color .14s;user-select:none;}
.nv.on{color:var(--g1);}
.nv-ico{font-size:20px;line-height:1;}.nv-lbl{font-size:8px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;}
.sheet-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);display:none;align-items:flex-end;}
.sheet-ov.open{display:flex;}
.sheet{background:var(--s1);border:1px solid var(--rim);border-radius:22px 22px 0 0;padding:18px 18px calc(18px + var(--safe-b));width:100%;animation:sup .3s cubic-bezier(.34,1.2,.64,1);}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:30px;height:3px;border-radius:2px;background:var(--w3);margin:0 auto 16px;}
.sh-ttl{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;}
.fld label{display:block;font-size:11px;color:var(--w3);font-weight:500;margin-bottom:5px;}
.fld input{width:100%;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--w);outline:none;transition:border-color .2s;margin-bottom:11px;}
.fld input:focus{border-color:var(--b1);}.fld input::placeholder{color:var(--w3);}

/* API Setup panel */
.api-panel{background:var(--s2);border:1px solid rgba(255,179,71,.25);border-radius:var(--rad2);padding:14px;margin-bottom:12px;}
.api-status{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px;}
.api-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.api-dot.ok{background:var(--g1);box-shadow:0 0 8px var(--g1);}
.api-dot.err{background:var(--r1);}.api-dot.wait{background:var(--o1);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#toast{position:fixed;bottom:calc(72px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--s3);border:1px solid var(--rim2);padding:9px 18px;border-radius:30px;
  font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;z-index:999;
  transition:all .26s cubic-bezier(.34,1.3,.64,1);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--g1);color:var(--g1);}
#toast.err{border-color:var(--r1);color:var(--r1);}
</style>
</head>
<body>
<div id="app">
  <div class="amb" id="a1"></div><div class="amb" id="a2"></div>
  <div class="hdr">
    <div class="logo">WayTandem</div>
    <div class="hdr-pill">
      <div class="hdr-av" id="hdAv">?</div>
      <span id="hdName">...</span>
    </div>
  </div>
  <div class="sbar"><div class="sdots" id="sdots"></div><div class="slbl" id="slbl">...</div></div>
  <div class="ca" id="ca"></div>
  <div class="nav">
    <div class="nv on" id="nv0" onclick="navTo(0)"><div class="nv-ico">🏠</div><div class="nv-lbl">Головна</div></div>
    <div class="nv"    id="nv1" onclick="navTo(1)"><div class="nv-ico">🌍</div><div class="nv-lbl">Дошка</div></div>
    <div class="nv"    id="nv2" onclick="navTo(2)"><div class="nv-ico">🤝</div><div class="nv-lbl">Екіпаж</div></div>
    <div class="nv"    id="nv3" onclick="navTo(3)"><div class="nv-ico">📋</div><div class="nv-lbl">Мої</div></div>
  </div>
</div>

<!-- Sheet: New direction -->
<div class="sheet-ov" id="shNewDir">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-ttl">✨ Запропонувати маршрут</div>
    <div class="fld"><label>Назва напрямку</label><input id="ndInput" placeholder="Київ → Варшава" maxlength="60" autocomplete="off"></div>
    <div class="btn btn-p" onclick="createDir()">Додати на дошку →</div>
    <div class="btn btn-g" style="margin-top:7px" onclick="_cs('shNewDir')">Скасувати</div>
  </div>
</div>

<!-- Sheet: API URL setup -->
<div class="sheet-ov" id="shApi">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-ttl">⚙️ Адреса сервера</div>
    <div class="fld">
      <label>URL тунелю (localtunnel/ngrok)</label>
      <input id="apiInput" placeholder="https://xxxx.lhr.life" autocomplete="off">
    </div>
    <div class="btn btn-p" onclick="saveApiUrl()">✅ Зберегти і підключитись</div>
    <div class="btn btn-g" style="margin-top:7px" onclick="_cs('shApi')">Скасувати</div>
  </div>
</div>

<div id="toast"></div>
<script>
// ── Telegram WebApp init ──────────────────────────────────────────────────
var tg = window.Telegram && window.Telegram.WebApp;
if(tg){ tg.ready(); tg.expand();
  try{tg.setHeaderColor('#080A0F'); tg.setBackgroundColor('#080A0F');}catch(e){}
}

// ── API URL — читається з: 1) URL параметр ?api=, 2) localStorage, 3) порожній ──
var API_URL = (function(){
  var params = new URLSearchParams(window.location.search);
  var fromUrl = params.get('api');
  if(fromUrl) { try{localStorage.setItem('wt_api', fromUrl);}catch(e){} return fromUrl.replace(/\/$/,''); }
  try{ var saved = localStorage.getItem('wt_api'); if(saved) return saved.replace(/\/$/,''); }catch(e){}
  return '';
})();

var API_STATUS = 'unknown'; // ok | err | unknown

async function apiFetch(endpoint, params, options){
  params = params || {};
  options = options || {};
  if(!API_URL){ showApiSheet(); return null; }
  var url = new URL(API_URL + endpoint);
  Object.keys(params).forEach(function(k){ if(params[k]!==undefined && params[k]!==null) url.searchParams.append(k, params[k]); });
  try{
    var headers = {'Content-Type':'application/json'};
    if(tg && tg.initData) headers['Authorization'] = 'tma ' + tg.initData;
    var res = await fetch(url.toString(), Object.assign({headers:headers}, options));
    if(!res.ok){ console.error('API error:', res.status, endpoint); return null; }
    API_STATUS = 'ok'; updateApiDot();
    return await res.json();
  }catch(e){
    console.error('fetch error:', e);
    API_STATUS = 'err'; updateApiDot();
    return null;
  }
}

function updateApiDot(){
  document.querySelectorAll('.api-dot').forEach(function(el){
    el.className = 'api-dot ' + (API_URL ? API_STATUS : 'wait');
  });
  document.querySelectorAll('.api-url-txt').forEach(function(el){
    el.textContent = API_URL ? API_URL.replace('https://','') : 'Не налаштовано';
  });
}

function showApiSheet(){
  try{ document.getElementById('apiInput').value = API_URL || ''; }catch(e){}
  _os('shApi');
}

function saveApiUrl(){
  var v = (document.getElementById('apiInput').value || '').trim().replace(/\/$/,'');
  if(!v){ toast('Введіть URL','err'); return; }
  try{ localStorage.setItem('wt_api', v); }catch(e){}
  API_URL = v;
  _cs('shApi');
  updateApiDot();
  toast('✅ Збережено','ok');
  checkApiHealth();
}

async function checkApiHealth(){
  if(!API_URL) return;
  var data = await apiFetch('/api/health');
  if(data && data.status){ API_STATUS='ok'; toast('🟢 Сервер підключено','ok'); }
  else { API_STATUS='err'; toast('🔴 Сервер недоступний','err'); }
  updateApiDot();
}

// ── State ─────────────────────────────────────────────────────────────────
var tgUser = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) || {};
var S = {
  user: { name: tgUser.first_name || 'Користувач', id: tgUser.id || 0 },
  role: null,
  dirs: [],
  groups: [],
  history: [],
  board: { parentId: null, expandedId: null, page: 0 },
  loading: false,
};
var LIMIT = 8;

// ── Data loaders ──────────────────────────────────────────────────────────
async function loadBoard(){
  S.loading = true; renderCurrent();
  var params = {};
  if(S.board.parentId !== null) params.parent_id = S.board.parentId;
  var data = await apiFetch('/api/v3/board', params);
  S.dirs = data || [];
  S.board.page = 0;
  S.board.expandedId = null;
  S.loading = false;
  renderCurrent();
}

async function loadGroups(){
  S.loading = true; renderCurrent();
  var data = await apiFetch('/api/v3/groups');
  S.groups = data || [];
  S.loading = false;
  renderCurrent();
}

async function loadHistory(){
  S.loading = true; renderCurrent();
  var data = await apiFetch('/api/v3/history', { user_id: S.user.id });
  S.history = data || [];
  S.loading = false;
  renderCurrent();
}

// ── Rendering helpers ─────────────────────────────────────────────────────
function spinner(){ return '<div class="spinner"><div class="spin"></div>Завантаження...</div>'; }
function empty(msg){ return '<div class="empty-hint">'+msg+'</div>'; }

function apiPanel(){
  return '<div class="api-panel">'
    +'<div class="api-status"><div class="api-dot '+(API_URL ? API_STATUS : 'wait')+'"></div>'
    +'<span class="api-url-txt">'+(API_URL ? API_URL.replace('https://','') : 'Не налаштовано')+'</span></div>'

SCENES.bg = { label:'Маршрути', flow:'board', stage:2, total:3, render:function(){
  if(S.loading) return '<div class="hero"><div class="h-ttl">Маршрути</div></div><div class="body">'+spinner()+'</div>';
  
  var pool = S.dirs;
  var off = S.board.page * LIMIT;
  var page = pool.slice(off, off+LIMIT);
  var hasPrev = S.board.page > 0;
  var hasNext = pool.length > off+LIMIT;

  var bc = '<div class="breadcrumb"><span class="bc-seg" onclick="boardGlobal()">🌐 Глобальна</span>';
  if(S.board.parentId !== null){
    var par = pool[0]; // use first item's parent for label if needed
    bc += '<span class="bc-arr">›</span><span class="bc-seg cur">Підрозділ</span>';
  }
  bc += '</div>';

  var items = page.map(function(d){
    var isExp = S.board.expandedId === d.id;
    var ico = d.has_kids ? '📁' : (d.drivers > 0 ? '🚗' : '📍');
    var icoClass = d.has_kids ? 'di-icon' : (d.drivers > 0 ? 'di-icon g' : 'di-icon b');
    var shutter = '';
    if(!d.has_kids){
      shutter = '<div class="shutter'+(isExp?' open':'')+'"><div class="shutter-body">'
        +'<div class="sh-divider"></div>'
        +'<div class="sh-stats">'
        +'<div class="sh-stat"><div class="sh-label">Мандрівники</div><div class="sh-val g">'+d.drivers+'</div></div>'
        +'<div class="sh-stat"><div class="sh-label">Попутники</div><div class="sh-val b">'+d.passengers+'</div></div>'
        +'</div>'
        +'<div class="sh-btn-row">'
        +(S.role==='driver'
          ?'<div class="sh-btn sh-btn-p" onclick="event.stopPropagation();toast(\'✅ Підписку оновлено\',\'ok\')">✅ Я їду сюди</div>'
          :'<div class="sh-btn sh-btn-b" onclick="event.stopPropagation();toast(\'✅ Підписку оновлено\',\'ok\')">✅ Підписатись</div>')
        +(S.role==='passenger' && d.drivers>0 ? '<div class="sh-btn sh-btn-g" onclick="event.stopPropagation();toast(\'👋 Запит надіслано\',\'ok\')">👋 Попроситись</div>' : '')
        +'</div></div></div>';
    } else {
      shutter = '<div class="shutter'+(isExp?' open':'')+'"><div class="shutter-body">'
        +'<div class="sh-divider"></div>'
        +'<div class="sh-btn-row"><div class="sh-btn sh-btn-b" onclick="event.stopPropagation();drillIn('+d.id+')">↳ Відкрити підрозділи</div></div>'
        +'</div></div>';
    }
    return '<div class="dir-item'+(isExp?' expanded':'')+'"><div class="dir-row" onclick="expand('+d.id+')">'
      +'<div class="'+icoClass+'">'+ico+'</div>'
      +'<div class="di-body"><div class="di-name">'+esc(d.title)+'</div>'
      +'<div class="di-meta">'+d.drivers+'🚗&nbsp;'+d.passengers+'👤'+(d.has_kids?' · 📁 підрозділи':'')+'</div>'
      +'</div><div class="di-chevron">▾</div></div>'+shutter+'</div>';
  }).join('');

  var pagHtml = (hasPrev||hasNext) ? '<div class="pag-row">'
    +'<button class="pag-btn" onclick="changePage(-1)"'+(hasPrev?'':' disabled')+'>← Назад</button>'
    +'<span class="pag-info">'+Math.ceil((off+1)/LIMIT)+' / '+Math.ceil(pool.length/LIMIT)+'</span>'
    +'<button class="pag-btn" onclick="changePage(1)"'+(hasNext?'':' disabled')+'>Далі →</button>'
    +'</div>' : '';

  var isEmpty = page.length === 0 ? empty('Маршрутів поки немає. Додайте перший!') : '';

  return '<div class="hero" style="padding-bottom:12px"><span class="h-em">'+(S.board.parentId!==null?'📁':'🌐')+'</span>'
    +'<div class="h-ttl">Глобальна дошка</div>'
    +'<div class="h-sub">'+pool.length+' напрямків</div></div>'
    +'<div class="body">'+bc+'<div class="dir-list">'+items+'</div>'+isEmpty+pagHtml+'</div>'
    +'<div class="acts">'
    +'<div class="btn btn-g" onclick="_os(\'shNewDir\')">+ Запропонувати маршрут</div>'
    +(S.board.parentId!==null ? '<div class="btn btn-g" onclick="drillBack()">← Назад</div>' : '<div class="btn btn-g" onclick="go(\'bm\')">← Режим дошки</div>')
    +'</div>';
}};

SCENES.bgg = { label:'Групи', flow:'board', stage:2, total:3, render:function(){
  if(S.loading) return '<div class="hero"><div class="h-ttl">Групи</div></div><div class="body">'+spinner()+'</div>';
  var items = S.groups.map(function(g){
    return '<div class="grp-card">'

SCENES.mt = { label:'Мої поїздки', flow:'trips', stage:1, total:1, render:function(){
  if(S.loading) return '<div class="hero"><div class="h-ttl">Мої поїздки</div></div><div class="body">'+spinner()+'</div>';
  var items = S.history.map(function(h){

    +'<div class="acts"><div class="btn btn-p" onclick="openBoard()">🌍&nbsp; До дошки маршрутів</div></div>';

// ── Navigation engine ─────────────────────────────────────────────────────
var curScene = 'role';

function go(id, dir){
  if(!SCENES[id]) return;
  dir = dir || 'right';
  var area = document.getElementById('ca');
  var old  = area.querySelector('.card');
  var card = document.createElement('div');
  card.className = 'card ' + (dir==='right' ? 'er' : 'el');
  card.innerHTML = SCENES[id].render();
  area.appendChild(card);
  if(old){ old.classList.add(dir==='right' ? 'xl' : 'xr'); setTimeout(function(){if(old.parentNode)old.parentNode.removeChild(old);}, 420); }
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.classList.remove('er','el'); card.classList.add('in'); }); });
  curScene = id;
  updateSbar(); updateNav();
}

function renderCurrent(){
  var area = document.getElementById('ca');
  var card = area.querySelector('.card');
  if(card && SCENES[curScene]) card.innerHTML = SCENES[curScene].render();
}

function updateSbar(){
  var sc = SCENES[curScene];
  document.getElementById('slbl').textContent = sc.label;
  var h = '';
  for(var i=1; i<=sc.total; i++){
    if(i < sc.stage) h += '<div class="sd d"></div>';
    else if(i === sc.stage) h += '<div class="sd a"></div>';
    else h += '<div class="sd t"></div>';
  }
  document.getElementById('sdots').innerHTML = h;
}

function updateNav(){
  var fm = {home:0, board:1, crew:2, trips:3};
  var idx = fm[SCENES[curScene].flow] || 0;
  document.querySelectorAll('.nv').forEach(function(n,i){ n.classList.toggle('on', i===idx); });
}

function navTo(i){
  var m = {0:'role', 1:'bm', 2:'role', 3:'mt'};
  if(S.role) m[0] = (S.role==='driver'?'rd':'rp');
  go(m[i]);
  if(i===1){ S.board.parentId=null; loadBoard(); }
  if(i===3) loadHistory();
}

// ── Board actions ─────────────────────────────────────────────────────────
function openBoard(){ S.board.parentId=null; go('bm'); }
function boardGlobal(){ S.board.parentId=null; go('bg'); loadBoard(); }
function boardGroups(){ go('bgg'); loadGroups(); }
function goHome(){ go(S.role ? (S.role==='driver'?'rd':'rp') : 'role'); }
function pickRole(r){ S.role=r; go('r'+r[0]); } // rd or rp

function drillIn(id){ S.board.parentId=id; go('bg'); loadBoard(); }
function drillBack(){
  S.board.parentId = null;
  go('bg', 'left');
  loadBoard();
}

function expand(id){
  S.board.expandedId = S.board.expandedId === id ? null : id;
  renderCurrent();
}

function changePage(d){
  S.board.page = Math.max(0, S.board.page + d);
  renderCurrent();
}

async function createDir(){
  var v = (document.getElementById('ndInput').value || '').trim();
  if(v.length < 3){ toast('Мінімум 3 символи','err'); return; }
  var res = await apiFetch('/api/v3/board', {}, {
    method: 'POST',
    body: JSON.stringify({ title: v, parent_id: S.board.parentId, user_id: S.user.id })
  });
  if(res && res.status === 'ok'){
    _cs('shNewDir');
    document.getElementById('ndInput').value = '';
    toast('✅ Маршрут додано!','ok');
    loadBoard();
  } else {
    toast('❌ Помилка збереження','err');
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _os(id){ document.getElementById(id).classList.add('open'); }
function _cs(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.sheet-ov').forEach(function(el){
  el.addEventListener('click', function(e){ if(e.target===el) el.classList.remove('open'); });
});
var _tt;
function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m; el.className='show '+(t||'');
  clearTimeout(_tt); _tt=setTimeout(function(){el.className='';},2600);
}

// ── Init ──────────────────────────────────────────────────────────────────
function init(){
  var n = S.user.name || 'Користувач';
  document.getElementById('hdAv').textContent = n[0] ? n[0].toUpperCase() : '?';
  document.getElementById('hdName').textContent = n.split(' ')[0];
  if(tg && tg.MainButton){
    tg.MainButton.setText('🌍 Дошка маршрутів');
    tg.MainButton.show();
    tg.MainButton.onClick(function(){ navTo(1); });
  }
  updateApiDot();
  if(API_URL) checkApiHealth();
  go('role');
}
init();
</script>
