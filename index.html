<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>WayTandem</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN TOKENS ══ */
:root{
  --bg:#07090E;--card:#0D1017;--card2:#131720;--card3:#1A2030;--card4:#1f2638;
  --border:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.18);
  --lime:#C9FF47;--sky:#4DCFFF;--gold:#FFB830;--rose:#FF6B8A;--red:#FF4D4D;--green:#4DFF9B;
  --white:#F0F3FF;--muted:#7A82A0;--dim:#353D55;
  --r:18px;--r2:12px;--r3:8px;
  --safe:env(safe-area-inset-bottom,0px);--hdr:56px;--nav:68px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── HEADER ── */
.hdr{height:var(--hdr);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:rgba(7,9,14,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:20}
.logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:14px;
  background:linear-gradient(120deg,var(--lime),var(--sky));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.hdr-center{display:flex;align-items:center;gap:6px;position:absolute;left:50%;transform:translateX(-50%)}
.hdr-back{display:none;align-items:center;gap:6px;cursor:pointer;padding:6px 8px;border-radius:8px;
  transition:background .15s;font-size:13px;font-weight:600;color:var(--sky)}
.hdr-back:active{background:rgba(77,207,255,.1)}
.hdr-back svg{width:16px;height:16px;stroke:var(--sky)}
.hdr-title{font-size:13px;font-weight:700;color:var(--white);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:8px}
.av-btn{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--lime),var(--sky));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#07090E;cursor:pointer;flex-shrink:0}

/* ── SCREENS ── */
#screen{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(100%);opacity:0;pointer-events:none;
  transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .22s;will-change:transform}
.screen.active{transform:translateX(0);opacity:1;pointer-events:auto}
.screen.out{transform:translateX(-30%);opacity:0;pointer-events:none}
.s-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.s-body::-webkit-scrollbar{display:none}
.s-pad{padding:14px 16px 32px}

/* ── BOTTOM NAV ── */
.nav{height:var(--nav);display:flex;align-items:center;justify-content:space-around;
  background:rgba(7,9,14,.96);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);flex-shrink:0;
  padding-bottom:var(--safe)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 16px;border-radius:12px;cursor:pointer;
  transition:all .15s;flex:1;min-width:0}
.nav-btn svg{width:22px;height:22px;stroke:var(--muted);stroke-width:1.8;fill:none;transition:stroke .15s}
.nav-btn span{font-size:10px;font-weight:600;color:var(--muted);transition:color .15s;white-space:nowrap}
.nav-btn.active svg{stroke:var(--lime)}
.nav-btn.active span{color:var(--lime)}
.nav-btn:active{background:rgba(255,255,255,.04)}

/* ── STATUS DOT ── */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-online{background:var(--lime)}
.dot-offline{background:var(--muted)}
.dot-pending{background:var(--gold);animation:pulse-dot 1.2s ease-in-out infinite}
.dot-active{background:var(--green);animation:pulse-dot 1.2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.card:active{border-color:var(--b2)}
.card-pressable{cursor:pointer}
.card-pressable:active{transform:scale(.99);background:var(--card2)}

/* ── SECTION HEADERS ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:11px;
  color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.sec-count{font-size:11px;font-weight:600;color:var(--dim);
  background:rgba(255,255,255,.04);padding:2px 8px;border-radius:20px}

/* ── INTEREST CARDS (Level 0) ── */
.int-card{padding:14px 16px;border-radius:var(--r);background:var(--card);
  border:1px solid var(--border);margin-bottom:8px;cursor:pointer;
  transition:all .18s;position:relative;overflow:hidden}
.int-card:active{transform:scale(.99);border-color:var(--b2);background:var(--card2)}
.int-card.subscribed{border-color:rgba(201,255,71,.2);background:rgba(201,255,71,.04)}
.int-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.int-emoji{font-size:26px;line-height:1;flex-shrink:0}
.int-info{flex:1;min-width:0}
.int-title{font-weight:700;font-size:15px;color:var(--white);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.int-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.int-badge{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--muted)}
.int-badge svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}
.int-badge.lime{color:var(--lime)}
.int-badge.sky{color:var(--sky)}
.int-badge.gold{color:var(--gold)}
.int-arrow{width:20px;height:20px;stroke:var(--dim);stroke-width:2;fill:none;flex-shrink:0;margin-top:2px}
.int-sub-pill{display:inline-flex;align-items:center;gap:4px;margin-top:8px;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  background:rgba(201,255,71,.12);color:var(--lime);border:1px solid rgba(201,255,71,.2)}

/* ── ORGANIZER CARDS (Level 1) ── */
.org-card{padding:14px 16px;border-radius:var(--r);background:var(--card);
  border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .18s}
.org-card:active{transform:scale(.99);border-color:var(--b2);background:var(--card2)}
.org-top{display:flex;align-items:center;gap:12px}
.org-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--card3),var(--card4));
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:15px;color:var(--sky)}
.org-main{flex:1;min-width:0}
.org-name{font-weight:700;font-size:14px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.org-car{font-size:12px;color:var(--muted);margin-top:2px}
.org-status{display:flex;align-items:center;gap:5px;margin-top:6px}
.org-seats{display:flex;gap:4px;margin-top:10px;align-items:center}
.seat{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seat-driver{background:rgba(77,207,255,.18);border:1px solid rgba(77,207,255,.3)}
.seat-taken{background:rgba(255,107,138,.12);border:1px solid rgba(255,107,138,.2)}
.seat-free{background:rgba(201,255,71,.08);border:1px solid rgba(201,255,71,.15)}
.seat svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.2;fill:none}
.seat-driver svg{stroke:var(--sky)}
.seat-taken svg{stroke:var(--rose)}
.seat-free svg{stroke:var(--lime)}
.org-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.org-rating{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700}
.org-trips{font-size:11px;color:var(--muted)}
.org-arrow{width:18px;height:18px;stroke:var(--dim);stroke-width:2;fill:none}
.org-group-tag{display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  background:rgba(255,184,48,.1);color:var(--gold);border:1px solid rgba(255,184,48,.2);margin-top:8px}

/* ── CREW CARDS (Level 2) ── */
.crew-card{padding:14px 16px;border-radius:var(--r);background:var(--card);
  border:1px solid var(--border);margin-bottom:10px;transition:all .18s}
.crew-card.joined{border-color:rgba(77,255,155,.25);background:rgba(77,255,155,.04)}
.crew-card.open{border-color:rgba(201,255,71,.15)}
.crew-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.crew-num{font-family:'Unbounded',sans-serif;font-weight:900;font-size:11px;
  color:var(--muted);letter-spacing:.5px}
.crew-status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge-open{background:rgba(201,255,71,.12);color:var(--lime);border:1px solid rgba(201,255,71,.2)}
.badge-active{background:rgba(77,255,155,.12);color:var(--green);border:1px solid rgba(77,255,155,.2)}
.badge-pending{background:rgba(255,184,48,.1);color:var(--gold);border:1px solid rgba(255,184,48,.2)}
.badge-joined{background:rgba(77,207,255,.1);color:var(--sky);border:1px solid rgba(77,207,255,.2)}
.crew-members{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.crew-member{display:flex;align-items:center;gap:8px}
.member-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#07090E}
.member-av.driver{background:linear-gradient(135deg,var(--sky),#2ab8f5)}
.member-av.passenger{background:linear-gradient(135deg,var(--lime),#a8e032)}
.member-av.empty{background:var(--card3);color:var(--dim);border:1px dashed var(--dim)}
.member-name{font-size:13px;font-weight:600;color:var(--white);flex:1}
.member-role{font-size:10px;font-weight:700;color:var(--muted)}
.crew-join-btn{width:100%;padding:11px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;
  background:linear-gradient(120deg,var(--lime),#a8e032);color:#07090E;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.crew-join-btn:active{transform:scale(.98);opacity:.9}
.crew-join-btn:disabled{opacity:.4;pointer-events:none}
.crew-joined-info{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px;border-radius:12px;background:rgba(77,255,155,.08);
  border:1px solid rgba(77,255,155,.2);font-size:13px;font-weight:700;color:var(--green)}

/* ── TRIP CARD (Active) ── */
.trip-card{padding:16px;border-radius:var(--r);margin-bottom:12px}
.trip-card.status-active{background:rgba(77,255,155,.05);border:1px solid rgba(77,255,155,.2)}
.trip-card.status-pending{background:rgba(255,184,48,.05);border:1px solid rgba(255,184,48,.2)}
.trip-card.status-pending_confirm{background:rgba(77,207,255,.05);border:1px solid rgba(77,207,255,.2)}
.trip-card.status-cancelled{background:rgba(255,77,77,.05);border:1px solid rgba(255,77,77,.15)}
.trip-card.status-completed{background:rgba(201,255,71,.05);border:1px solid rgba(201,255,71,.15)}
.trip-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.trip-id{font-family:'Unbounded',sans-serif;font-weight:900;font-size:11px;color:var(--muted)}
.trip-dir{font-size:13px;font-weight:700;color:var(--white)}
.trip-crew-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.trip-member{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--card3);border-radius:10px}
.trip-member-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#07090E}
.trip-member-av.driver{background:linear-gradient(135deg,var(--sky),#2ab8f5)}
.trip-member-av.me{background:linear-gradient(135deg,var(--lime),#a8e032)}
.trip-member-av.other{background:linear-gradient(135deg,var(--rose),#e03060)}
.trip-member-info{flex:1}
.trip-member-name{font-size:13px;font-weight:700;color:var(--white)}
.trip-member-role{font-size:11px;color:var(--muted)}
.trip-done-check{width:20px;height:20px;border-radius:50%;
  background:rgba(77,255,155,.2);border:1px solid rgba(77,255,155,.4);
  display:flex;align-items:center;justify-content:center}
.trip-done-check svg{width:11px;height:11px;stroke:var(--green);stroke-width:2.5}
.trip-actions{display:flex;gap:8px}
.btn{padding:11px 16px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-primary{background:linear-gradient(120deg,var(--lime),#a8e032);color:#07090E}
.btn-danger{background:rgba(255,77,77,.12);color:var(--red);border:1px solid rgba(255,77,77,.2)}
.btn-sky{background:rgba(77,207,255,.1);color:var(--sky);border:1px solid rgba(77,207,255,.2)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.btn-gold{background:rgba(255,184,48,.1);color:var(--gold);border:1px solid rgba(255,184,48,.2)}
.btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}

/* ── RATING SCREEN ── */
.rating-stars{display:flex;justify-content:center;gap:12px;margin:16px 0}
.r-star{width:44px;height:44px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:var(--card3);border:2px solid var(--border);transition:all .15s}
.r-star.pos{background:rgba(77,255,155,.12);border-color:rgba(77,255,155,.3)}
.r-star.neg{background:rgba(255,77,77,.1);border-color:rgba(255,77,77,.2)}
.r-star.neu{background:rgba(255,184,48,.08);border-color:rgba(255,184,48,.2)}
.r-star:active{transform:scale(.92)}

/* ── MATCH / INVITE ── */
.match-card{padding:16px;border-radius:var(--r);background:var(--card);
  border:1px solid var(--b2);margin-bottom:10px}
.match-from{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.match-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),#e09020);
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#07090E}
.match-name{font-size:14px;font-weight:700;color:var(--white)}
.match-dir{font-size:12px;color:var(--muted);margin-top:2px}
.match-btns{display:flex;gap:8px}

/* ── PROFILE ── */
.profile-hero{padding:24px 16px 20px;text-align:center}
.profile-av{width:72px;height:72px;border-radius:50%;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--lime),var(--sky));
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:24px;color:#07090E}
.profile-name{font-family:'Unbounded',sans-serif;font-weight:700;font-size:16px;color:var(--white)}
.profile-role{font-size:12px;color:var(--muted);margin-top:4px}
.profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 16px}
.stat-box{background:var(--card2);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--border)}
.stat-val{font-family:'Unbounded',sans-serif;font-weight:900;font-size:18px;color:var(--lime)}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.profile-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.profile-row:active{background:rgba(255,255,255,.03)}
.profile-row-l{display:flex;align-items:center;gap:10px}
.profile-row-l svg{width:18px;height:18px;stroke:var(--muted);stroke-width:1.8;fill:none}
.profile-row-lbl{font-size:14px;font-weight:600;color:var(--white)}
.profile-row-val{font-size:13px;color:var(--muted)}

/* ── EMPTY / LOADING ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;text-align:center;gap:12px}
.empty-icon{font-size:48px;opacity:.5}
.empty-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:14px;color:var(--muted)}
.empty-sub{font-size:13px;color:var(--dim);max-width:240px;line-height:1.5}
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,var(--card3) 50%,var(--card2) 75%);
  background-size:200% 100%;border-radius:8px;animation:shimmer 1.4s ease-in-out infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:82px;border-radius:var(--r);margin-bottom:8px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--nav) + 12px + var(--safe));left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(25,30,45,.95);backdrop-filter:blur(20px);
  border:1px solid var(--b2);border-radius:12px;
  padding:10px 16px;font-size:13px;font-weight:600;color:var(--white);
  white-space:nowrap;z-index:999;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-ok{border-color:rgba(201,255,71,.3);color:var(--lime)}
#toast.toast-err{border-color:rgba(255,77,77,.3);color:var(--red)}
#toast.toast-info{border-color:rgba(77,207,255,.3);color:var(--sky)}

/* ── API BADGE ── */
#api-badge{display:none;position:fixed;top:calc(var(--hdr) + 6px);right:8px;z-index:30;
  font-size:9px;font-weight:700;padding:3px 7px;border-radius:8px;letter-spacing:.4px}
.api-ok{background:rgba(201,255,71,.15);color:var(--lime);border:1px solid rgba(201,255,71,.25)}
.api-err{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}

/* ── CRUMB BAR ── */
.crumb-bar{display:flex;align-items:center;gap:6px;padding:10px 16px 0;flex-shrink:0}
.crumb{font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;white-space:nowrap;
  max-width:100px;overflow:hidden;text-overflow:ellipsis}
.crumb:hover{color:var(--muted)}
.crumb-sep{font-size:11px;color:var(--dim)}
.crumb.active{color:var(--white)}

/* ── SUMMARY CHIPS ── */
.summary-chips{display:flex;gap:8px;padding:10px 16px 4px;flex-wrap:wrap;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  font-size:11px;font-weight:700;background:var(--card2);border:1px solid var(--border)}
.chip-lime{background:rgba(201,255,71,.08);border-color:rgba(201,255,71,.2);color:var(--lime)}
.chip-sky{background:rgba(77,207,255,.08);border-color:rgba(77,207,255,.2);color:var(--sky)}
.chip-gold{background:rgba(255,184,48,.08);border-color:rgba(255,184,48,.2);color:var(--gold)}
.chip svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.2;fill:none}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:4px 0}

/* ── PENDING HANDSHAKES banner ── */
.hs-banner{margin:0 16px 10px;padding:12px 14px;border-radius:var(--r2);
  background:rgba(255,184,48,.07);border:1px solid rgba(255,184,48,.2);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.hs-banner-txt{font-size:13px;font-weight:600;color:var(--gold)}
.hs-banner-sub{font-size:11px;color:var(--muted);margin-top:2px}
.hs-badge{background:var(--gold);color:#07090E;font-size:11px;font-weight:800;
  min-width:22px;height:22px;border-radius:11px;padding:0 6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── CANCEL CONFIRM ── */
.cancel-overlay{position:fixed;inset:0;background:rgba(7,9,14,.85);
  backdrop-filter:blur(10px);z-index:100;display:none;
  align-items:flex-end;justify-content:center;padding-bottom:calc(var(--safe) + 16px)}
.cancel-overlay.show{display:flex}
.cancel-sheet{background:var(--card);border:1px solid var(--b2);
  border-radius:var(--r) var(--r) 14px 14px;padding:20px 16px 8px;
  width:100%;max-width:440px}
.cancel-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:14px;
  color:var(--white);margin-bottom:6px}
.cancel-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.cancel-btns{display:flex;flex-direction:column;gap:8px}

/* ── SCROLL TOP FIX ── */
.s-body{-webkit-overflow-scrolling:touch}

/* ── RATING MODAL ── */
.rating-overlay{position:fixed;inset:0;background:rgba(7,9,14,.9);
  backdrop-filter:blur(12px);z-index:110;display:none;
  align-items:center;justify-content:center;padding:16px}
.rating-overlay.show{display:flex}
.rating-sheet{background:var(--card);border:1px solid var(--b2);
  border-radius:var(--r);padding:24px 20px;width:100%;max-width:360px;text-align:center}
.rating-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:15px;color:var(--white);margin-bottom:6px}
.rating-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.rating-person{display:flex;align-items:center;gap:10px;margin:0 auto 16px;
  background:var(--card2);border-radius:12px;padding:10px 14px;text-align:left}
.rating-person-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#07090E;
  background:linear-gradient(135deg,var(--lime),var(--sky))}
.rating-person-name{font-size:13px;font-weight:700;color:var(--white)}
.rating-person-role{font-size:11px;color:var(--muted)}
.rating-choices{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
.rc{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.rc-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:24px;transition:all .15s;border:2px solid var(--border);background:var(--card2)}
.rc-circle:active{transform:scale(.9)}
.rc.selected .rc-circle{transform:scale(1.1)}
.rc-pos.selected .rc-circle{background:rgba(77,255,155,.15);border-color:rgba(77,255,155,.4)}
.rc-neg.selected .rc-circle{background:rgba(255,77,77,.1);border-color:rgba(255,77,77,.3)}
.rc-neu.selected .rc-circle{background:rgba(255,184,48,.08);border-color:rgba(255,184,48,.3)}
.rc-label{font-size:11px;font-weight:600;color:var(--muted)}
</style>
</head>
<body>
<div id="root">

  <!-- HEADER -->
  <header class="hdr">
    <span class="logo">WAYTANDEM</span>
    <div class="hdr-center" id="hdrCenter">
      <div class="hdr-back" id="hdrBack" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="hdrBackLabel">Назад</span>
      </div>
      <span class="hdr-title" id="hdrTitle" style="display:none"></span>
    </div>
    <div class="hdr-right">
      <div class="av-btn" id="avBtn" onclick="showTab('profile')">?</div>
    </div>
  </header>

  <div id="api-badge"></div>

  <!-- SCREENS -->
  <div id="screen">

    <!-- ══ TAB: BOARD (fractal navigation) ══ -->
    <div class="screen active" id="tab-board">
      <div class="s-body">
        <!-- Level 0: Board -->
        <div id="view-board">
          <div class="s-pad" id="boardWrap">
            <div class="sec-hdr">
              <span class="sec-title">Напрямки</span>
              <span class="sec-count" id="boardCount">—</span>
            </div>
            <div id="boardList">
              <div class="skeleton skel-card"></div>
              <div class="skeleton skel-card"></div>
              <div class="skeleton skel-card"></div>
            </div>
          </div>
        </div>

        <!-- Level 1: Organizers -->
        <div id="view-orgs" style="display:none">
          <div class="crumb-bar" id="orgsCrumb"></div>
          <div class="summary-chips" id="orgsSummary"></div>
          <div class="s-pad" style="padding-top:10px">
            <div class="sec-hdr">
              <span class="sec-title" id="orgsSectionTitle">Організатори</span>
              <span class="sec-count" id="orgsCount">—</span>
            </div>
            <div id="orgsList">
              <div class="skeleton skel-card"></div>
              <div class="skeleton skel-card"></div>
            </div>
          </div>
        </div>

        <!-- Level 2: Crews -->
        <div id="view-crews" style="display:none">
          <div class="crumb-bar" id="crewsCrumb"></div>
          <div class="summary-chips" id="crewsSummary"></div>
          <div class="s-pad" style="padding-top:10px">
            <div class="sec-hdr">
              <span class="sec-title">Екіпажі</span>
              <span class="sec-count" id="crewsCount">—</span>
            </div>
            <div id="crewsList">
              <div class="skeleton skel-card"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ TAB: TRIP ══ -->
    <div class="screen" id="tab-trip">
      <div class="s-body">
        <div class="s-pad" id="tripWrap">
          <div id="tripContent">
            <div class="skeleton skel-card" style="height:200px"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ TAB: PROFILE ══ -->
    <div class="screen" id="tab-profile">
      <div class="s-body">
        <div class="profile-hero">
          <div class="profile-av" id="profileAv">?</div>
          <div class="profile-name" id="profileName">Завантаження…</div>
          <div class="profile-role" id="profileRole"></div>
        </div>
        <div class="profile-stats" id="profileStats"></div>
        <div class="divider"></div>
        <div id="profileRows"></div>
      </div>
    </div>

  </div><!-- /screen -->

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <div class="nav-btn active" id="nav-board" onclick="showTab('board')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Дошка</span>
    </div>
    <div class="nav-btn" id="nav-trip" onclick="showTab('trip')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      <span>Поїздка</span>
    </div>
    <div class="nav-btn" id="nav-profile" onclick="showTab('profile')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Профіль</span>
    </div>
  </nav>

</div><!-- /root -->

<!-- CANCEL CONFIRM SHEET -->
<div class="cancel-overlay" id="cancelOverlay">
  <div class="cancel-sheet">
    <div class="cancel-title" id="cancelTitle">Скасувати поїздку?</div>
    <div class="cancel-sub" id="cancelSub">Інша сторона отримає запит на підтвердження.</div>
    <div class="cancel-btns">
      <button class="btn btn-danger" id="cancelConfirmBtn" onclick="doCancelTrip()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
        Скасувати поїздку
      </button>
      <button class="btn btn-ghost" onclick="hideCancelSheet()">Залишити</button>
    </div>
  </div>
</div>

<!-- RATING MODAL -->
<div class="rating-overlay" id="ratingOverlay">
  <div class="rating-sheet">
    <div class="rating-title">Оцініть партнера</div>
    <div class="rating-sub">Ваша оцінка допомагає іншим</div>
    <div class="rating-person" id="ratingPerson"></div>
    <div class="rating-choices">
      <div class="rc rc-pos" onclick="selectRating(1)">
        <div class="rc-circle">👍</div>
        <div class="rc-label">Добре</div>
      </div>
      <div class="rc rc-neu" onclick="selectRating(0)">
        <div class="rc-circle">😐</div>
        <div class="rc-label">Нейтрально</div>
      </div>
      <div class="rc rc-neg" onclick="selectRating(-1)">
        <div class="rc-circle">👎</div>
        <div class="rc-label">Погано</div>
      </div>
    </div>
    <button class="btn btn-primary" id="ratingSubmitBtn" onclick="submitRating()" disabled>
      Надіслати оцінку
    </button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="skipRating()">Пропустити</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════════════════════
var tg = window.Telegram && window.Telegram.WebApp;
if(tg){ tg.expand(); tg.ready(); }

var API_URL = '';
var USER_ID = null;
var USER_NAME = '';
var USER_ROLE = 'client';
var USER_LANG = 'uk';

// Fractal navigation state
var FX = {
  level: 0,            // 0=board, 1=orgs, 2=crews
  dirId: null,
  dirTitle: '',
  orgId: null,
  orgName: ''
};

// Active trip state
var TRIP = null;
var TRIP_POLL = null;

// Rating state
var RATING_STATE = { reqId: null, toUserId: null, toName: null, toRole: null, score: null };

// Cancel state
var CANCEL_REQ_ID = null;

// Pending handshakes (invites)
var PENDING_HS = [];

// Init from Telegram
(function initFromTG(){
  if(tg && tg.initDataUnsafe){
    var u = tg.initDataUnsafe.user;
    if(u){
      USER_ID = u.id;
      USER_NAME = (u.first_name||'') + (u.last_name ? ' '+u.last_name : '');
      USER_LANG = u.language_code || 'uk';
    }
  }
  // Fallback: URL params
  var p = new URLSearchParams(location.search);
  if(!USER_ID && p.get('user_id')) USER_ID = parseInt(p.get('user_id'));
  if(p.get('api')) API_URL = p.get('api').replace(/\/$/, '');

  // From env comment in .env style param
  if(!API_URL){
    var apiMeta = document.querySelector('meta[name="api-url"]');
    if(apiMeta) API_URL = apiMeta.content;
  }
})();

// ══════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════
function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function initials(name){
  return (name||'?').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?';
}
function numWord(n, one, few, many){
  n = Math.abs(n) % 100;
  var n1 = n % 10;
  if(n > 10 && n < 20) return many;
  if(n1 > 1 && n1 < 5) return few;
  if(n1 === 1) return one;
  return many;
}
function kindEmoji(kind, title){
  if(kind === 'city') return '🏙';
  if(kind === 'highway' || kind === 'inter_city') return '🛣';
  if(kind === 'daily') return '📍';
  if(kind === 'event') return '🎯';
  if(kind === 'airport') return '✈️';
  var t = (title||'').toLowerCase();
  if(t.includes('аеро') || t.includes('airport')) return '✈️';
  if(t.includes('вокзал') || t.includes('залізн')) return '🚉';
  if(t.includes('море') || t.includes('пляж')) return '🏖';
  if(t.includes('гір') || t.includes('карпат')) return '⛰';
  return '🗺';
}
function statusLabel(s){
  var map = {
    'pending':'Очікує',
    'pending_confirm':'Підтвердження',
    'active':'Активна',
    'pickup':'Зустріч',
    'driving':'В дорозі',
    'completed':'Завершена',
    'cancelled':'Скасована',
    'cancelled_by_system':'Скасована системою',
    'open':'Відкрито',
    'offline':'Офлайн',
    'online':'Онлайн'
  };
  return map[s] || s;
}
function statusBadgeClass(s){
  if(s === 'open' || s === 'pending') return 'badge-pending';
  if(s === 'active' || s === 'online') return 'badge-active';
  if(s === 'pending_confirm') return 'badge-pending';
  if(s === 'completed') return 'badge-joined';
  return 'badge-open';
}

// ══════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════
async function api(path, opts){
  if(!API_URL) return null;
  try{
    var r = await fetch(API_URL + path, opts || {});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
async function post(path, body){
  if(!API_URL) return null;
  try{
    var r = await fetch(API_URL + path, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    return await r.json();
  }catch(e){ return null; }
}
async function del(path, body){
  if(!API_URL) return null;
  try{
    var r = await fetch(API_URL + path, {
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    return await r.json();
  }catch(e){ return null; }
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
var _toastTimer = null;
function toast(msg, type){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' toast-'+type : '');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.className = ''; }, 2400);
}

// ══════════════════════════════════════════════════════════
// TAB NAVIGATION
// ══════════════════════════════════════════════════════════
var _curTab = 'board';
function showTab(name){
  if(_curTab === name) return;
  var prev = document.getElementById('tab-'+_curTab);
  var next = document.getElementById('tab-'+name);
  if(!next) return;
  prev.classList.remove('active'); prev.classList.add('out');
  next.classList.add('active'); next.classList.remove('out');
  setTimeout(function(){ prev.classList.remove('out'); }, 300);

  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var nb = document.getElementById('nav-'+name);
  if(nb) nb.classList.add('active');

  _curTab = name;
  updateHeader();

  if(name === 'trip') loadTrip();
  if(name === 'profile') loadProfile();
  if(name === 'board' && FX.level === 0) loadBoard();
}

// ══════════════════════════════════════════════════════════
// HEADER
// ══════════════════════════════════════════════════════════
function updateHeader(){
  var back = document.getElementById('hdrBack');
  var title = document.getElementById('hdrTitle');
  var logo = document.querySelector('.logo');

  if(_curTab === 'board' && FX.level > 0){
    logo.style.display = 'none';
    back.style.display = 'flex';
    title.style.display = 'block';
    if(FX.level === 1){
      document.getElementById('hdrBackLabel').textContent = 'Дошка';
      title.textContent = FX.dirTitle;
    } else if(FX.level === 2){
      document.getElementById('hdrBackLabel').textContent = FX.dirTitle;
      title.textContent = FX.orgName;
    }
  } else {
    logo.style.display = '';
    back.style.display = 'none';
    title.style.display = 'none';
  }
}
function goBack(){
  if(FX.level === 2){
    showLevel(1);
  } else if(FX.level === 1){
    showLevel(0);
  }
}
function showLevel(lvl){
  document.getElementById('view-board').style.display = lvl===0 ? '' : 'none';
  document.getElementById('view-orgs').style.display  = lvl===1 ? '' : 'none';
  document.getElementById('view-crews').style.display = lvl===2 ? '' : 'none';
  FX.level = lvl;
  updateHeader();
}

// ══════════════════════════════════════════════════════════
// LEVEL 0: BOARD
// ══════════════════════════════════════════════════════════
async function loadBoard(){
  var list = document.getElementById('boardList');
  var uid_param = USER_ID ? '&user_id='+USER_ID : '';
  var data = await api('/api/v3/fractal?lang='+USER_LANG + uid_param);

  if(!data || !data.interests){
    // fallback
    var fb = await api('/api/v3/board?lang='+USER_LANG+(USER_ID?'&user_id='+USER_ID:''));
    if(fb && fb.interests) renderBoardFallback(fb.interests, []);
    else list.innerHTML = emptyState('🗺','Немає напрямків','Поки що немає активних напрямків');
    return;
  }

  var subs = (data.user_status && data.user_status.subscriptions) || [];
  var subMap = {};
  subs.forEach(function(s){ subMap[s.direction_id] = s.role; });

  document.getElementById('boardCount').textContent = data.interests.length + ' ' + numWord(data.interests.length,'напрямок','напрямки','напрямків');

  renderBoardFallback(data.interests, subMap);
}

function renderBoardFallback(items, subMap){
  var list = document.getElementById('boardList');
  if(!items || !items.length){
    list.innerHTML = emptyState('🗺','Немає напрямків','Поки що немає активних напрямків');
    return;
  }
  list.innerHTML = items.map(function(it){
    var isSub = subMap && (subMap[it.id] !== undefined);
    var role = subMap && subMap[it.id];
    var emoji = kindEmoji(it.kind, it.title);
    var subPill = isSub ? '<div class="int-sub-pill">✓ '+(role==='driver'?'Водій':'Пасажир')+'</div>' : '';
    return '<div class="int-card'+(isSub?' subscribed':'')+'" onclick="goToOrgs('+it.id+',\''+escHtml(it.title)+'\',\''+emoji+'\')">'+
      '<div class="int-card-top">'+
        '<span class="int-emoji">'+emoji+'</span>'+
        '<div class="int-info">'+
          '<div class="int-title">'+escHtml(it.title)+'</div>'+
          '<div class="int-meta">'+
            '<span class="int-badge sky"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'+it.drivers+' вод.</span>'+
            '<span class="int-badge"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'+it.passengers+' пас.</span>'+
            (it.free_seats > 0 ? '<span class="int-badge lime"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'+it.free_seats+' місць</span>' : '')+
          '</div>'+
          subPill+
        '</div>'+
        '<svg class="int-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ══════════════════════════════════════════════════════════
// LEVEL 1: ORGANIZERS
// ══════════════════════════════════════════════════════════
async function goToOrgs(dirId, dirTitle, emoji){
  FX.dirId = dirId;
  FX.dirTitle = dirTitle;
  FX.level = 1;

  showLevel(1);
  updateHeader();

  // Crumb
  document.getElementById('orgsCrumb').innerHTML =
    '<span class="crumb" onclick="showLevel(0)">Дошка</span>'+
    '<span class="crumb-sep">›</span>'+
    '<span class="crumb active">'+(emoji+' ')+escHtml(dirTitle)+'</span>';

  // Summary placeholder
  document.getElementById('orgsSummary').innerHTML = '';
  document.getElementById('orgsList').innerHTML = '<div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>';

  var uid_p = USER_ID ? '&user_id='+USER_ID : '';
  var data = await api('/api/v3/fractal/organizers?direction_id='+dirId+'&lang='+USER_LANG+uid_p);

  if(!data || !data.organizers){
    document.getElementById('orgsList').innerHTML = emptyState('🚗','Немає організаторів','Для цього напрямку поки що немає водіїв');
    return;
  }

  var dir = data.direction || {};
  document.getElementById('orgsCount').textContent = data.organizers.length + ' ' + numWord(data.organizers.length,'організатор','організатори','організаторів');

  // Summary chips
  document.getElementById('orgsSummary').innerHTML =
    '<span class="chip chip-sky"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'+dir.drivers+' водіїв</span>'+
    '<span class="chip chip-lime"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'+dir.passengers+' пасажирів</span>'+
    (data.user_status && data.user_status.subscribed ?
      '<span class="chip chip-gold">✓ Підписаний ('+data.user_status.role+')</span>' :
      '<span class="chip" onclick="doSubscribe('+dirId+')" style="cursor:pointer">+ Приєднатись</span>');

  renderOrgs(data.organizers, data.user_status);
}

function renderOrgs(orgs, userStatus){
  var list = document.getElementById('orgsList');
  if(!orgs.length){
    list.innerHTML = emptyState('🚗','Немає організаторів','Для цього напрямку поки що немає водіїв');
    return;
  }
  list.innerHTML = orgs.map(function(o){
    var av = initials(o.name);
    var stars = o.rating ? '⭐'+o.rating.toFixed(1) : '';
    var onlineClass = o.drv_status === 'online' ? 'dot-online' : 'dot-offline';

function renderCrews(crews, userStatus){
  var list = document.getElementById('crewsList');
  var joinedCrewId = userStatus && userStatus.joined_crew_id;

  list.innerHTML = crews.map(function(c, idx){
    var isJoined = joinedCrewId && (c.crew_id == joinedCrewId);
    var cardClass = isJoined ? 'joined' : (c.status === 'open' ? 'open' : '');
    var badgeClass = isJoined ? 'badge-joined' : statusBadgeClass(c.status);
    var badgeLabel = isJoined ? '✓ Ви тут' : statusLabel(c.status);

    // Members
    var membersHtml = (c.members||[]).map(function(m){
      var avClass = m.role === 'driver' ? 'driver' : 'passenger';
      var isMe = USER_ID && m.user_id == USER_ID;
      if(isMe) avClass = 'me';
      return '<div class="crew-member">'+
        '<div class="member-av '+avClass+'">'+escHtml(initials(m.name))+'</div>'+
        '<div class="member-name">'+escHtml(m.name)+(isMe ? ' <span style="font-size:10px;color:var(--muted)">(ви)</span>':'')+
          (m.status ? '<span style="font-size:10px;color:var(--dim);margin-left:6px">'+statusLabel(m.status)+'</span>':'')+'</div>'+
        '<div class="member-role">'+(m.role==='driver'?'🚗 Водій':'👤 Пасажир')+'</div>'+
      '</div>';
    }).join('');

    // Empty seats
    var freeCount = c.seats_free || 0;
    for(var i=0; i<Math.min(freeCount,3); i++){
      membersHtml += '<div class="crew-member">'+
        '<div class="member-av empty">+</div>'+
        '<div class="member-name" style="color:var(--dim)">Вільне місце</div>'+
      '</div>';
    }
    if(freeCount > 3) membersHtml += '<div style="font-size:11px;color:var(--dim);padding:4px 0 0 36px">+ ще '+( freeCount-3)+' місць</div>';

    // Action button
    var actionBtn = '';
    if(isJoined){
      actionBtn = '<div class="crew-joined-info"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Ви в цьому екіпажі</div>'+
        '<button class="btn btn-danger" style="margin-top:8px;font-size:12px" onclick="leaveCrewBtn(\''+c.crew_id+'\','+userStatus.request_id+')">Вийти з екіпажу</button>';
    } else if(freeCount > 0 && !joinedCrewId){
      actionBtn = '<button class="crew-join-btn" onclick="joinCrewAction('+c.crew_id+','+FX.orgId+','+FX.dirId+','+(idx+1)+',this)">'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'+
        'Приєднатись · '+freeCount+' '+numWord(freeCount,'місце','місця','місць')+'</button>';
    } else if(freeCount === 0){
      actionBtn = '<div style="text-align:center;font-size:12px;color:var(--dim);padding:8px">Місць немає</div>';
    } else if(joinedCrewId && !isJoined){
      actionBtn = '<div style="text-align:center;font-size:12px;color:var(--dim);padding:8px">Ви вже в іншому екіпажі</div>';
    }

    return '<div class="crew-card '+cardClass+'" id="crewCard_'+c.crew_id+'">'+
      '<div class="crew-hdr">'+
        '<span class="crew-num">ЕКІПАЖ #'+(idx+1)+'</span>'+
        '<span class="crew-status-badge '+badgeClass+'">'+badgeLabel+'</span>'+
      '</div>'+
      (c.pickup ? '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">📍 '+escHtml(c.pickup)+'</div>' : '')+
      '<div class="crew-members">'+membersHtml+'</div>'+
      actionBtn+
    '</div>';
  }).join('');
}

async function joinCrewAction(crewId, driverId, directionId, num, btn){
  if(!USER_ID){ toast('Потрібно авторизуватись','err'); return; }
  if(btn){ btn.disabled = true; btn.textContent = '…'; }

  // Use match/invite — mutual handshake logic
  var r = await post('/api/v3/match/invite', {
    user_id: USER_ID,
    target_id: driverId,
    direction_id: directionId
  });

  if(!r){ 
    if(btn){ btn.disabled=false; btn.innerHTML='Спробувати ще'; }
    toast('Помилка з\'єднання','err'); return;
  }

  if(r.status === 'ok' && r.mutual){
    toast('🎉 Взаємна згода! Екіпаж #'+r.trip_id,'ok');
    // Reload crews after join
    setTimeout(function(){ goToCrews(driverId, FX.orgName); }, 800);
    // Also refresh trip tab
    TRIP = null;
  } else if(r.status === 'ok'){
    toast('✅ Запит надіслано водію','info');
    if(btn){ btn.textContent = 'Очікуємо відповіді…'; btn.style.background = 'rgba(255,184,48,.2)'; btn.style.color = 'var(--gold)'; }
  } else {
    if(btn){ btn.disabled=false; btn.innerHTML='Приєднатись'; }
    toast('Не вдалось','err');
  }
}

  var wrap = document.getElementById('tripContent');

  if(!USER_ID){ wrap.innerHTML = emptyState('🔐','Не авторизовано','Відкрийте через Telegram'); return; }

  // Check active trip
  var tripData = await api('/api/v3/trip/active?user_id='+USER_ID);

  // Also check pending matches
  var pendingData = await api('/api/v3/match/pending?user_id='+USER_ID);

  if(pendingData && pendingData.length){
    PENDING_HS = pendingData;
  } else {

function renderTrip(t){
  var wrap = document.getElementById('tripContent');
  var statusClass = 'status-' + (t.status||'active');

  // My role
  var isDriver = (USER_ID == t.driver_id);
  var myRole = isDriver ? 'driver' : 'passenger';

  // Partner info (simplified — ideally load full crew)
  var partnerHtml = '';
  var cancelHtml = '';

  // Status
  var statusBadge = '<span class="crew-status-badge '+statusBadgeClass(t.status)+'">'+statusLabel(t.status)+'</span>';

  // Action buttons
  var actions = '';
  var s = t.status;

  if(s === 'active' || s === 'pickup' || s === 'driving'){
    if(isDriver && !t.driver_done){
      actions += '<button class="btn btn-primary" onclick="markDone('+t.id+',this)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Завершив поїздку</button>';
    } else if(!isDriver && !t.client_done){
      actions += '<button class="btn btn-primary" onclick="markDone('+t.id+',this)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Завершив поїздку</button>';
    }

    if(t.cancel_by){
      if(t.cancel_by != USER_ID){
        actions += '<button class="btn btn-danger" onclick="doConfirmCancel('+t.id+',this)">Підтвердити скасування</button>';
        actions += '<button class="btn btn-ghost" onclick="doRejectCancel('+t.id+',this)">Відхилити скасування</button>';
      } else {
        actions += '<div style="text-align:center;font-size:12px;color:var(--muted);padding:8px">Очікуємо підтвердження від партнера…</div>';
      }
    } else {
      actions += '<button class="btn btn-danger" style="font-size:12px" onclick="showCancelSheet('+t.id+',\'Скасувати поїздку?\',\'Партнер отримає запит на підтвердження.\')">'+
        '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>Скасувати</button>';
    }
  } else if(s === 'pending' || s === 'pending_confirm'){
    actions += '<div style="text-align:center;padding:12px;font-size:13px;color:var(--gold)">⏳ '+statusLabel(s)+'…</div>';
    actions += '<button class="btn btn-danger" style="font-size:12px" onclick="showCancelSheet('+t.id+',\'Скасувати запит?\',\'Ваш запит буде відхилено.\')">Скасувати</button>';
  } else if(s === 'completed'){
    actions += '<div style="text-align:center;padding:12px;font-size:14px;color:var(--green);font-weight:700">✅ Поїздку завершено!</div>';
    // Trigger rating if not done
    checkShowRating(t);
  } else if(s === 'cancelled' || s === 'cancelled_by_system'){
    actions += '<div style="text-align:center;padding:12px;font-size:13px;color:var(--red)">❌ '+statusLabel(s)</div>';
  }

  // Done status indicators
  var doneRow = '';
  if(s === 'active' || s === 'completed'){
    doneRow = '<div style="display:flex;gap:8px;margin-bottom:12px">'+
      '<div style="flex:1;padding:8px 10px;border-radius:10px;background:var(--card3);font-size:11px;font-weight:700;text-align:center;'+(t.driver_done?'color:var(--green)':'color:var(--dim)')+'">'+
        (t.driver_done?'✓ ':'○ ')+'Водій'+(t.driver_done?' готовий':'')+
      '</div>'+
      '<div style="flex:1;padding:8px 10px;border-radius:10px;background:var(--card3);font-size:11px;font-weight:700;text-align:center;'+(t.client_done?'color:var(--green)':'color:var(--dim)')+'">'+
        (t.client_done?'✓ ':'○ ')+'Пасажир'+(t.client_done?' готовий':'')+
      '</div>'+
    '</div>';
  }

  wrap.innerHTML =
    (PENDING_HS.length ? renderPendingHSBanner() : '')+
    '<div class="trip-card '+statusClass+'">'+
      '<div class="trip-header">'+
        '<div>'+
          '<div class="trip-id">ПОЇЗДКА #'+t.id+'</div>'+
          '<div class="trip-dir">'+escHtml(t.pickup||'—')+'</div>'+
        '</div>'+
        statusBadge+
      '</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'+
        'Роль: '+(isDriver?'🚗 Водій':'👤 Пасажир')+' · crew #'+(t.crew_id||t.id)+
      '</div>'+
      doneRow+
      '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px" id="tripCrewList">'+
        loadTripCrew(t)+
      '</div>'+
      '<div style="display:flex;flex-direction:column;gap:8px" id="tripActions">'+actions+'</div>'+
    '</div>';

  // Load full crew list async
  loadFullCrew(t);
}

// Trip polling
function startTripPoll(){
  stopTripPoll();
  TRIP_POLL = setInterval(async function(){
    if(_curTab !== 'trip') return;
    var s = await api('/api/v3/trip/status?request_id='+(TRIP&&TRIP.id));
    if(!s || !s.found){ stopTripPoll(); loadTrip(); return; }
    // Update done flags
    if(TRIP){
      TRIP.driver_done = s.driver_done;
      TRIP.client_done = s.client_done;
      TRIP.cancel_by = s.cancel_by;
      if(s.status !== TRIP.status){ TRIP.status = s.status; renderTrip(TRIP); }
      else { updateDoneUI(s); }
    }
    if(s.status === 'completed' || s.status === 'cancelled' || s.status === 'cancelled_by_system'){
      stopTripPoll(); renderTrip(TRIP);
    }
  }, 5000);
}
function stopTripPoll(){ if(TRIP_POLL){ clearInterval(TRIP_POLL); TRIP_POLL=null; } }
function updateDoneUI(s){
  // minimal update without full re-render
}

async function markDone(reqId, btn){
  if(!USER_ID) return;
  if(btn){ btn.disabled = true; btn.textContent = '…'; }
  var r = await post('/api/v3/trip/done', {request_id:reqId, user_id:USER_ID});
  if(r && r.status==='ok'){
    if(r.completed){ toast('✅ Поїздка завершена!','ok'); stopTripPoll(); loadTrip(); }
    else { toast('✓ Відмічено. Очікуємо партнера…','info'); }
  } else {
    if(btn){ btn.disabled=false; btn.textContent='Завершив поїздку'; }
    toast('Помилка','err');
  }
}

function showCancelSheet(reqId, title, sub){
  CANCEL_REQ_ID = reqId;
  document.getElementById('cancelTitle').textContent = title || 'Скасувати?';
  document.getElementById('cancelSub').textContent = sub || '';
  document.getElementById('cancelOverlay').classList.add('show');
}
function hideCancelSheet(){
  document.getElementById('cancelOverlay').classList.remove('show');
  CANCEL_REQ_ID = null;
}
async function doCancelTrip(){
  if(!CANCEL_REQ_ID || !USER_ID) return;
  hideCancelSheet();
  var r = await post('/api/v3/trip/cancel', {request_id:CANCEL_REQ_ID, user_id:USER_ID});
  if(r && r.status==='ok'){
    toast('Запит на скасування надіслано','info');
    loadTrip();
  } else if(r && r.status==='cancel_already_requested'){
    toast('Запит вже надіслано','info');
  } else {
    toast('Помилка скасування','err');
  }
}
async function doConfirmCancel(reqId, btn){
  if(!USER_ID) return;
  if(btn){ btn.disabled=true; btn.textContent='…'; }
  var r = await post('/api/v3/trip/confirm-cancel', {request_id:reqId, user_id:USER_ID});
  if(r && r.status==='ok'){
    toast('Поїздку скасовано','info');
    stopTripPoll(); loadTrip();
  } else {
    if(btn){ btn.disabled=false; btn.textContent='Підтвердити скасування'; }
    toast('Помилка','err');
  }
}
async function doRejectCancel(reqId, btn){
  if(btn){ btn.disabled=true; }
  var r = await post('/api/v3/trip/reject-cancel', {request_id:reqId});
  if(r && r.status==='ok'){
    toast('Відхилено. Поїздка продовжується','ok');
    loadTrip();
  }
}

// ══════════════════════════════════════════════════════════
// MATCH RESPOND
// ══════════════════════════════════════════════════════════
async function respondMatch(targetId, dirId, accept, btn){
  if(!USER_ID) return;
  if(btn){ btn.disabled=true; btn.textContent='…'; }
  var r = await post('/api/v3/match/respond', {
    user_id: USER_ID,
    target_id: targetId,
    direction_id: dirId,
    accept: accept
  });
  if(r && r.status==='ok'){
    if(accept && r.mutual){
      toast('🎉 Взаємна згода! Починаємо поїздку','ok');
      loadTrip(); showTab('trip');
    } else if(accept){
      toast('✅ Прийнято. Очікуємо взаємного підтвердження','info');
    } else {
      toast('Відхилено','info');
    }
    loadTrip();
  } else {
    toast('Помилка','err');
    if(btn){ btn.disabled=false; }
  }
}

// ══════════════════════════════════════════════════════════
// RATING
// ══════════════════════════════════════════════════════════
async function checkShowRating(t){
  if(!USER_ID || !t) return;
  // Check if already rated
  var partnerId = (USER_ID == t.driver_id) ? t.client_id : t.driver_id;
  var partnerRole = (USER_ID == t.driver_id) ? 'passenger' : 'driver';
  // Simple: show rating modal if trip just completed
  if(t.status === 'completed'){
    var partnerProfile = await api('/api/v3/user/profile?user_id='+partnerId);
    var partnerName = partnerProfile ? (partnerProfile.name||'Партнер') : 'Партнер';
    showRatingModal(t.id, partnerId, partnerName, partnerRole);
  }
}

function showRatingModal(reqId, toUserId, toName, toRole){
  RATING_STATE = {reqId:reqId, toUserId:toUserId, toName:toName, toRole:toRole, score:null};
  document.getElementById('ratingPerson').innerHTML =
    '<div class="rating-person-av">'+escHtml(initials(toName))+'</div>'+
    '<div><div class="rating-person-name">'+escHtml(toName)+'</div>'+
    '<div class="rating-person-role">'+(toRole==='driver'?'🚗 Водій':'👤 Пасажир')+'</div></div>';
  document.querySelectorAll('.rc').forEach(function(el){ el.classList.remove('selected'); });
  document.getElementById('ratingSubmitBtn').disabled = true;
  document.getElementById('ratingOverlay').classList.add('show');
}

function selectRating(score){
  RATING_STATE.score = score;
  document.querySelectorAll('.rc').forEach(function(el){ el.classList.remove('selected'); });
  if(score === 1) document.querySelector('.rc-pos').classList.add('selected');
  else if(score === 0) document.querySelector('.rc-neu').classList.add('selected');
  else if(score === -1) document.querySelector('.rc-neg').classList.add('selected');
  document.getElementById('ratingSubmitBtn').disabled = false;
}

async function submitRating(){
  var s = RATING_STATE;
  if(s.score === null || !s.reqId || !s.toUserId) return;
  var r = await post('/api/v3/rating', {
    from_user_id: USER_ID,
    to_user_id: s.toUserId,
    request_id: s.reqId,
    score: s.score
  });
  document.getElementById('ratingOverlay').classList.remove('show');
  if(r && (r.status==='ok'||r.status==='already_rated')){
    toast('Дякуємо за оцінку!','ok');
  } else {
    toast('Помилка збереження оцінки','err');
  }
}

function skipRating(){
  document.getElementById('ratingOverlay').classList.remove('show');
}

// ══════════════════════════════════════════════════════════
// PROFILE
// ══════════════════════════════════════════════════════════
async function loadProfile(){
  if(!USER_ID){ return; }
  var profile = await api('/api/v3/user/profile?user_id='+USER_ID);
  var rating = await api('/api/v3/rating?user_id='+USER_ID);

  if(profile){
    USER_ROLE = profile.role || 'client';
    USER_NAME = profile.name || USER_NAME;

    document.getElementById('profileAv').textContent = initials(profile.name||USER_NAME);
    document.getElementById('profileName').textContent = profile.name || USER_NAME || 'Користувач';
    document.getElementById('profileRole').textContent = profile.role === 'driver' ? '🚗 Водій' : '👤 Пасажир';
    document.getElementById('avBtn').textContent = initials(profile.name||USER_NAME||'?');
  }

  document.getElementById('profileStats').innerHTML =
    '<div class="stat-box"><div class="stat-val">'+(rating&&rating.count||0)+'</div><div class="stat-lbl">Поїздок</div></div>'+
    '<div class="stat-box"><div class="stat-val">'+(rating&&rating.avg?rating.avg.toFixed(1):'—')+'</div><div class="stat-lbl">Рейтинг</div></div>'+
    '<div class="stat-box"><div class="stat-val">'+(rating&&rating.positive||0)+'</div><div class="stat-lbl">👍 Оцінок</div></div>';

  // Profile rows
  var subs = await api('/api/v3/user/subscriptions?user_id='+USER_ID);
  var subCount = subs ? subs.length : 0;

  document.getElementById('profileRows').innerHTML =
    '<div class="profile-row" onclick="showTab(\'board\')">'+
      '<div class="profile-row-l"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'+
      '<span class="profile-row-lbl">Мої напрямки</span></div>'+
      '<span class="profile-row-val">'+subCount+'</span>'+
    '</div>'+
    '<div class="profile-row">'+
      '<div class="profile-row-l"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>'+
      '<span class="profile-row-lbl">ID: '+USER_ID+'</span></div>'+
      '<span class="profile-row-val">'+escHtml(USER_LANG)+'</span>'+
    '</div>'+
    (profile && profile.role === 'driver' && profile.driver ?
      '<div class="profile-row">'+
        '<div class="profile-row-l"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'+
        '<span class="profile-row-lbl">'+escHtml(profile.driver.car_model||'Авто')+'</span></div>'+
        '<span class="profile-row-val">'+escHtml(profile.driver.plate_number||'')+'</span>'+
      '</div>' : '');
}

// ══════════════════════════════════════════════════════════
// EMPTY STATE HELPER
// ══════════════════════════════════════════════════════════
function emptyState(icon, title, sub){
  return '<div class="empty-state">'+
    '<div class="empty-icon">'+icon+'</div>'+
    '<div class="empty-title">'+escHtml(title)+'</div>'+
    '<div class="empty-sub">'+escHtml(sub)+'</div>'+
  '</div>';
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init(){
  if(!API_URL){
    document.getElementById('api-badge').style.display='block';
    document.getElementById('api-badge').className='api-err';
    document.getElementById('api-badge').textContent='NO API';
    document.getElementById('boardList').innerHTML = emptyState('📡','Немає API','Відкрийте через Telegram з правильним URL');
    return;
  }

  var health = await api('/api/health');
  if(health){
    document.getElementById('api-badge').style.display='block';
    document.getElementById('api-badge').className='api-ok';
    document.getElementById('api-badge').textContent='LIVE';
    setTimeout(function(){ document.getElementById('api-badge').style.display='none'; }, 3000);
  } else {
    document.getElementById('api-badge').style.display='block';
    document.getElementById('api-badge').className='api-err';
    document.getElementById('api-badge').textContent='OFFLINE';
  }

  // Register user if not exists
  if(USER_ID && USER_NAME){
    await post('/api/v3/user/register', {user_id:USER_ID, name:USER_NAME, lang:USER_LANG});
    document.getElementById('avBtn').textContent = initials(USER_NAME);
  }

  await loadBoard();
}

window.addEventListener('DOMContentLoaded', init);
</script>
