        };

        function getErrorMessage(res, fallback = 'Помилка') {
            if (!res) return 'Немає відповіді від серверу — перевірте з\'єднання';
            const detail = res.detail;
            const reason = res.reason || (detail && typeof detail === 'object' ? detail.reason : detail) || '';
            return ERROR_MESSAGES[reason] || (reason ? `${fallback}: ${reason}` : fallback);
        }

        function getOutgoingForDirection(dirId) {
            return (S.pendingMatches || []).find(m => {
                if (m.scope !== 'outgoing') return false;
                return String(m.direction_id) === String(dirId);
            });
        }

        async function confirmOutgoingSwitchIfNeeded(orgId, dirId) {
            const current = getOutgoingForDirection(dirId);
            if (!current) return true;
            const currentTarget = current.target_id || current.partner_id;
            if (String(currentTarget) === String(orgId)) return true;

            const currentName = current.target_name || current.partner_name || `#${currentTarget}`;
            return await new Promise(resolve => {
                openSheet(`
                    <div class="sheet-title">Перемкнути запит?</div>
                    <div class="sheet-sub">Ви вже запросились до "${escapeHtml(String(currentName))}".<br>Перейти до іншого екіпажу?<br><br>Попередній запит буде скасовано.</div>
                    <div class="sheet-actions">
                        <button class="btn btn-primary" id="confirm-request-switch-yes">✓ Так, перемкнути</button>
                        <button class="btn btn-ghost" id="confirm-request-switch-no">Скасувати</button>
                    </div>
                `);
                document.getElementById('confirm-request-switch-yes').onclick = () => { closeSheet(); resolve(true); };
                document.getElementById('confirm-request-switch-no').onclick = () => { closeSheet(); resolve(false); };
            });
        }

        function getMatchPartnerId(m) {
            const raw = m?.scope === 'incoming'
                ? (m.partner_id ?? m.sender_id ?? m.user_id ?? m.target_id)
                : (m.target_id ?? m.partner_id ?? m.sender_id ?? m.user_id);
            const id = parseInt(raw, 10);
            return Number.isFinite(id) ? id : 0;
        }

        function removePendingMatchByPair(partnerId, dirId) {
            const safePartnerId = parseInt(partnerId, 10) || 0;
            const safeDirId = parseInt(dirId, 10) || 0;
            if (!safePartnerId || !safeDirId) return;
            S.pendingMatches = (S.pendingMatches || []).filter(m => {
                const matchPartnerId = getMatchPartnerId(m);
                const matchDirId = parseInt(m?.direction_id, 10) || 0;
                return !(matchPartnerId === safePartnerId && matchDirId === safeDirId);
            });
        }

        function matchKey(m) {
            const ts = Number(m?.created_at || 0);
            const stamp = Number.isFinite(ts) ? Math.round(ts * 1000) : 0;
            return `${m?.scope || 'incoming'}:${getMatchPartnerId(m)}:${parseInt(m?.direction_id, 10) || 0}:${stamp}`;
        }

        function isSheetOpen() {
            return document.getElementById('sheet')?.classList.contains('open');
        }

        function maybeOpenMatchSheet() {
            if (S.matchSheetOpen || S.activeTrip || S.roleGateOpen || isAppInBackground) return;
            const match = (S.pendingMatches || []).find(m => m?.scope === 'incoming' && !S.seenMatchIds.has(matchKey(m)));
            if (!match) return;
            if (isSheetOpen() || S.currentScreen !== 'trips') {
                notifyPendingMatch(match);
                return;
            }
            openMatchSheet(match);
        }

        function notifyPendingMatch(match) {
            const key = matchKey(match);
            if (!S.notifiedMatchIds.has(key)) {
                S.notifiedMatchIds.add(key);
                notifyCriticalEvent('match_received', key);
                showToast('📩 Новий запит. Відкрийте Поїздки', '');
            }
            updateBadges();
            renderSubBar();
        }

        function openMatchSheet(match) {
            const partnerId = getMatchPartnerId(match);
            const dirId = parseInt(match?.direction_id, 10) || 0;
            if (!partnerId || !dirId) return;
            const key = matchKey(match);
            S.seenMatchIds.add(key);
            notifyCriticalEvent('match_received', key);
            S.matchSheetOpen = true;
            S.activeMatchKey = key;

            const isDriver = _isDriverRole(S.userRole);
            const partnerName = match.partner_name || match.sender_name || match.target_name || `#${partnerId}`;
            const direction = match.direction || match.direction_title || 'Напрямок';
            const title = isDriver ? 'Хтось хоче до екіпажу' : 'Водій знайдений';
            const subtitle = isDriver
                ? `${escapeHtml(partnerName)} хоче приєднатися до вашого екіпажу.`
                : `${escapeHtml(partnerName)} запрошує вас у поїздку.`;
            const acceptText = isDriver ? '✅ Взяти в екіпаж' : '✅ Прийняти запрошення';
            const declineText = isDriver ? '❌ Пропустити' : '❌ Цей варіант не підходить';

            openSheet(`
                <div class="sheet-title">${title}</div>
                <div class="sheet-sub">${subtitle}</div>
                <div style="display:flex;align-items:center;gap:12px;margin:16px 0;padding:12px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.04);">
                    ${renderAvatarInline(partnerName, match.partner_photo_url || match.sender_photo_url || match.target_photo_url || '', 44)}
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:800;font-size:15px;">${escapeHtml(partnerName)}</div>
                        <div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">🎯 ${escapeHtml(direction)}</div>
                    </div>
                </div>
                <div class="sheet-actions">
                    <button class="btn btn-primary" onclick="respondFromMatchSheet(${partnerId}, ${dirId}, true)">${acceptText}</button>
                    <button class="btn btn-danger" onclick="respondFromMatchSheet(${partnerId}, ${dirId}, false)">${declineText}</button>
                    <button class="btn btn-secondary" onclick="stopSearchFromMatchSheet(${partnerId}, ${dirId})">⏹️ Зупинити пошук</button>
                </div>
            `);
        }

        async function respondFromMatchSheet(partnerId, dirId, accept) {
            const ok = await respondHandshake(partnerId, dirId, accept);
            if (ok) closeSheet();
        }

        async function stopSearchFromMatchSheet(partnerId, dirId) {
            const ok = await stopSearchFromHandshake(partnerId, dirId);
            if (ok) closeSheet();
        }

        function openMapRequestJoinResultSheet(dirId, res = {}) {
            const ctx = mapInviteContext(dirId);
            const safeDirId = ctx.safeDirId || (parseInt(dirId) || 0);
            const mutual = !!res?.mutual;
            const switched = Array.isArray(res?.switched_from) && res.switched_from.length > 0;
            const title = mutual ? 'Екіпаж готовий' : (switched ? 'Запит перемкнено' : 'Запит надіслано');
            const statusLine = mutual
                ? 'Ви вже в екіпажі. Перейдіть до екрана екіпажу, щоб узгодити деталі.'
                : 'Чекаємо підтвердження водія. Карта лишається відкритою, а статус оновиться автоматично.';
            const tertiary = mutual
                ? `<button class="btn btn-ghost" onclick="openStartDirectionInvite(${safeDirId}, { source: 'map', sheetMaxHeight: '65vh', fullInvite: true })">Деталі</button>`
                : `<button class="btn btn-danger" onclick="unsubscribeDir(${safeDirId})">Зупинити пошук</button>`;
            openSheet(`
                ${ctx.safeDirId ? renderMapInviteContextHeader(ctx) : ''}
                <div class="sheet-title">${escapeHtml(title)}</div>
                <div class="sheet-sub">${escapeHtml(statusLine)}</div>
                <div class="sheet-actions" data-map-command-count="3">
                    <button class="btn btn-primary" onclick="switchScreen('trips')">Екіпаж</button>
                    <button class="btn btn-secondary" onclick="closeSheet()">Зрозуміло</button>
                    ${tertiary}
                </div>
            `, { maxHeight: '65vh' });
        }

        async function requestJoin(orgId, dirId, opts = {}) {
            if (!requireRoleForAction('запроситись до екіпажу', () => requestJoin(orgId, dirId, opts))) return;
            if (_isDriverRole(S.userRole)) { showToast('Запроситись може тільки попутник', 'error'); return; }
            const confirmed = await confirmOutgoingSwitchIfNeeded(orgId, dirId);
            if (!confirmed) return;
            const fromMap = opts?.source === 'map' || !!opts?.keepMapContext;
            if (!beginOp('request_join')) return;
            try {
                const res = await api('/api/v3/match/invite', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: S.userId, target_id: orgId, direction_id: dirId, replace_existing: true })
                });
                if (res?.status === 'ok') {
                    if (!fromMap) {
                        if (res.mutual) { showToast('✓ Ваш екіпаж готовий!', 'success'); }
                        else if (Array.isArray(res.switched_from) && res.switched_from.length) { showToast('↪ Запит перемкнено', 'success'); }
                        else { showToast('⏳ Запит надіслано', 'success'); }
                    }
                    persistCriticalState();
                    await hydrate();
                    if (fromMap) {
                        if (S.map?.closePopup) S.map.closePopup();
                        switchScreen('explore');
                        renderNewsStrip();
                        await refreshMap();
                        focusActiveMapContext();
                        openMapRequestJoinResultSheet(dirId, res);
                        return true;
                    }
                    closeSheet();
                    switchScreen('trips');
                    return true;
                } else {
                    showToast(getErrorMessage(res, 'Не вдалось надіслати запит'), 'error');
                    return false;
                }
            } catch (e) {
                showToast('Немає з\'єднання — спробуйте ще раз', 'error');
                return false;
            } finally { endOp('request_join'); }
        }

        // ─── NEWS ───
        function classifyNewsItem(n) {
            const explicit = String(n?.category || n?.root_category || n?.category_key || '').toLowerCase();
            if (['theocracy', 'leisure', 'work'].includes(explicit)) return explicit;
            const txt = `${n?.root_title || ''} ${n?.direction_title || ''} ${n?.dir_title || ''} ${n?.text || ''}`.toLowerCase();
            if (txt.includes('теократ')) return 'theocracy';
            if (txt.includes('відпоч') || txt.includes('відпуст') || txt.includes('подорож') || txt.includes('релакс') || txt.includes('тур') || txt.includes('travel') || txt.includes('vacation')) return 'leisure';
            if (txt.includes('робот') || txt.includes('навчан') || txt.includes('work') || txt.includes('study') || txt.includes('career')) return 'work';
            return 'other';
        }

        function isDiscoveryNewsItem(n) {
            if (!n || n?.is_active === false) return false;
            return String(n?.kind || '').toLowerCase() !== 'trip_done';
        }

        function formatNewsTime(ts) {
            if (!ts) return '—';
            try { return new Date(Number(ts) * 1000).toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); }
            catch (_) { return '—'; }
        }

        function formatIdeaDate(value) {
            if (!value) return '';
            const raw = String(value);
            const dt = new Date(raw);
            if (Number.isNaN(dt.getTime())) return raw.replace('T', ' ');
            return dt.toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function dateTimeLocalValue(value) {
            return String(value || '').trim().slice(0, 16);
        }

        function buildDirectionInviteText(dir) {
            const title = String(dir?.title || dir?.name || 'Ідея WayTandem').trim();
            const meeting = String(dir?.meeting_point || '').trim();
            const startAt = String(dir?.start_date || '').trim();
            const endAt = String(dir?.end_date || '').trim();
            const desc = String(dir?.description || '').trim();
            const drivers = Number(dir?.drivers || dir?.drivers_count || 0);
            const passengers = Number(dir?.passengers || dir?.passengers_count || 0);
            const isOwnDirection = String(dir?.creator_id || dir?.user_id || '') === String(S.userId || '');
            const creatorName = String(dir?.creator_name || dir?.organizer_name || (isOwnDirection ? S.userName : '') || '').trim();
            const creatorUsername = sanitizeBotUsername(dir?.creator_username || dir?.telegram_username || (isOwnDirection ? S.userUsername : '') || '');
            const organizerLabel = creatorName || (creatorUsername ? 'Організатор' : '');
            const organizerLine = organizerLabel
                ? `👤 Організатор: ${organizerLabel}${creatorUsername ? ` (@${creatorUsername})` : ''}`
                : '';
            const whenText = startAt && endAt ? `${formatIdeaDate(startAt)} — ${formatIdeaDate(endAt)}` : (formatIdeaDate(startAt) || formatIdeaDate(endAt));
            const lines = [
                '🌿 Запрошення до ідеї WayTandem',
                '',
                `📍 ${title}`,
                organizerLine,
                meeting ? `📌 Місце: ${meeting}` : '',
                whenText ? `🗓 Коли: ${whenText}` : '',
                `👥 Водії: ${drivers} · Попутники: ${passengers}`,
                desc ? '' : '',
                desc ? desc.slice(0, 700) : '',
                '',
                'Приєднуйся як водій або попутник.'
            ].filter(line => line !== '');
            return lines.join('\n');
        }

        async function ensureBotUsernameForShare(dirId) {
            if (S.botUsername) return S.botUsername;
            await hydrateAppConfig();
            if (S.botUsername) return S.botUsername;
            openSheet(`
                <div class="sheet-title">Username бота</div>
                <div class="sheet-sub">Щоб створити посилання-запрошення, потрібен username Telegram-бота без @. Це збережеться тільки у цьому браузері.</div>
                <input class="board-search" id="bot-username-input" placeholder="Наприклад: WayTandemBot" maxlength="32" style="margin:12px 0;">
                <button class="btn btn-primary" onclick="saveBotUsernameAndShare(${parseInt(dirId) || 0})">Зберегти і запросити</button>
                <button class="btn btn-ghost" style="margin-top:8px;" onclick="closeSheet()">Скасувати</button>
            `);
            setTimeout(() => document.getElementById('bot-username-input')?.focus(), 250);
            return '';
        }

        async function saveBotUsernameAndShare(dirId) {
            const username = sanitizeBotUsername(document.getElementById('bot-username-input')?.value || '');
            if (!username) { showToast('Вкажіть username бота без @', 'error'); return; }
            S.botUsername = username;
            localStorage.setItem('wt_bot_username', username);
            closeSheet();
            await shareDirectionInvite(dirId);
        }

        function buildDirectionInviteLink(botUsername, dirId) {
            const safeDirId = parseInt(dirId) || 0;
            // Share invites must not expose the raw Mini App hosting URL. Bot /start
            // is the stable entry point because it can show a controlled card and role gate.
            return `https://t.me/${botUsername}?start=dir_${safeDirId}`;
        }

        async function shareDirectionInvite(dirId) {
            const safeDirId = parseInt(dirId) || 0;
            if (!safeDirId) { showToast('Ідею не знайдено', 'error'); return; }
            const botUsername = await ensureBotUsernameForShare(safeDirId);
            if (!botUsername) return;
            const data = S.apiBase
                ? await api(`/api/v3/fractal/organizers?direction_id=${safeDirId}&lang=${S.lang}&user_id=${S.userId || ''}`, { silent: true })
                : null;
            const localDir = (S.myDirections || []).find(d => String(d.id) === String(safeDirId))
                || allDirections.find(d => String(d.id) === String(safeDirId))
                || {};
            const dir = { ...localDir, ...(data?.direction || {}) };
            const inviteLink = buildDirectionInviteLink(botUsername, safeDirId);
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=${encodeURIComponent(buildDirectionInviteText(dir))}`;
            const tg = window.Telegram?.WebApp;
            if (tg?.openTelegramLink) tg.openTelegramLink(shareUrl);
            else window.open(shareUrl, '_blank', 'noopener');
        }

        function openStartDirectionLoadingSheet(dirId) {
            const title = escapeHtml(cachedDirectionTitle(dirId));
            openSheet(`
                <div class="sheet-title">Відкриваю запрошення</div>
                <div class="sheet-sub">${title}</div>
                <div style="text-align:center;padding:18px 0 8px;">
                    <div class="pulse-dot" style="margin:0 auto 12px;"></div>
                    <div style="font-size:13px;color:var(--text-muted);">Завантажуємо подію й організатора...</div>
                </div>
            `);
        }

        function directionInviteSocialProof(dir, organizers = []) {
            const orgs = Array.isArray(organizers) ? organizers : [];
            const drivers = safeCount(dir?.drivers ?? dir?.drivers_count);
            const passengers = safeCount(dir?.passengers ?? dir?.passengers_count);
            const driverOrgs = orgs.filter(o => normalizeRole(o?.role || 'driver') === 'driver');
            const openSeats = orgs.reduce((sum, o) => sum + safeCount(o?.seats_free), 0);
            const driverCount = drivers || driverOrgs.length;
            const total = drivers + passengers || orgs.length;
            const participantLine = total > 0
                ? `${total} ${pluralUk(total, 'людина вже цікавиться', 'людини вже цікавляться', 'людей вже цікавляться')}`
                : 'Будьте серед перших учасників';
            const driverLine = driverCount > 0
                ? `${driverCount} ${pluralUk(driverCount, 'водій', 'водії', 'водіїв')}${openSeats > 0 ? ` • ${openSeats} ${pluralUk(openSeats, 'вільне місце', 'вільні місця', 'вільних місць')}` : ''}`
                : 'Водії ще збираються';
            return { participantLine, driverLine, total, driverCount, openSeats };
        }

        function mapInviteContext(dirId) {
            const safeDirId = parseInt(dirId) || 0;
            const cached = S.directionDetailsCache?.[safeDirId] || {};
            const localDir = allDirections.find(d => String(d.id) === String(safeDirId)) || {};
            const dir = { ...localDir, ...(cached.direction || {}), id: safeDirId };
            const orgs = Array.isArray(cached.organizers) ? cached.organizers : [];
            const creatorId = dir.creator_id || dir.user_id || '';
            const isMyDir = creatorId && String(creatorId) === String(S.userId);
            const creatorName = dir.creator_name || (isMyDir ? S.userName : '') || '';
            const creatorUsername = sanitizeBotUsername(dir.creator_username || (isMyDir ? S.userUsername : '') || '');
            const creatorDisplay = creatorName || (creatorUsername ? '@' + creatorUsername : 'організатор');
            return {
                safeDirId,
                dir,
                orgs,
                title: dir.title || dir.name || `Подія #${safeDirId}`,
                creatorDisplay,
                proof: directionInviteSocialProof(dir, orgs)
            };
        }

            const safeDirId = parseInt(dirId) || 0;
            const normalizedRole = normalizeRole(role);
            if (!safeDirId || !normalizedRole) return false;
            S.pendingRoleAction = null;
            const roleOk = await setRole(normalizedRole, { keepSheetOpen: true, silentToast: true, skipPendingAction: true });

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px;">

                        <div style="font-size:13px;font-weight:800;color:var(--text-primary);margin-top:3px;">${escapeHtml(proof.participantLine)}</div>

                        <div style="font-size:13px;font-weight:800;color:var(--text-primary);margin-top:3px;">${escapeHtml(proof.driverLine)}</div>
                    </div>
                </div>

                    ${whenText ? `<div style="font-size:12px;color:var(--text-secondary);">🗓 ${escapeHtml(whenText)}</div>` : ''}

                </div>
