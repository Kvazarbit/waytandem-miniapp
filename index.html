<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Поездки (MiniApp)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        .screen { display: none; width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1, h2 { margin: 10px 0; text-align: center; color: #333; }
        input[type="text"] { padding: 10px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; background-color: #4CAF50; color: #fff; font-size: 1em; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #role-buttons { display: flex; gap: 10px; }
        .mission { background: #fff; padding: 10px; margin: 10px 0; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .mission h3 { margin: 5px 0; font-size: 1em; }
        .mission p { margin: 5px 0; font-size: 0.9em; }
        .crew-list { list-style: none; padding: 0; }
        .crew-list li { background: #fff; padding: 8px; margin: 5px 0; border-radius: 5px; }
        #finish-trip { background-color: #d9534f; }
        #finish-trip:hover { background-color: #c9302c; }
        #logout-button { background-color: #888; }
        #logout-button:hover { background-color: #666; }
        .star { font-size: 2em; color: #ccc; cursor: pointer; }
        .star.selected { color: gold; }
        #thankyou { font-size: 1.2em; color: #4CAF50; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="screen">
    <h1>Каршеринг MiniApp</h1>
    <input type="text" id="username" placeholder="Ваше имя" />
    <div id="role-buttons">
        <button id="role-driver">Водитель</button>
        <button id="role-passenger">Пассажир</button>
    </div>
</div>

<div id="board-screen" class="screen">
    <h2 id="board-title"></h2>
    <div id="mission-list"></div>
    <button id="logout-button">Выйти</button>
</div>

<div id="crew-screen" class="screen">
    <h2>Экипаж</h2>
    <ul id="crew-members" class="crew-list"></ul>
    <button id="start-trip">🚀 Поехали!</button>
    <button id="finish-trip" style="display:none">🏁 Финиш</button>
</div>

<div id="rating-screen" class="screen">
    <h2>Оцените поездку</h2>
    <div id="stars">
        <span class="star" data-value="1">&#9733;</span>
        <span class="star" data-value="2">&#9733;</span>
        <span class="star" data-value="3">&#9733;</span>
        <span class="star" data-value="4">&#9733;</span>
        <span class="star" data-value="5">&#9733;</span>
    </div>
    <button id="submit-rating">Оценить</button>
    <p id="thankyou" style="display:none">Спасибо!</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginScreen = document.getElementById('login-screen');
    const boardScreen = document.getElementById('board-screen');
    const crewScreen = document.getElementById('crew-screen');
    const ratingScreen = document.getElementById('rating-screen');
    const usernameInput = document.getElementById('username');
    const roleDriverBtn = document.getElementById('role-driver');
    const rolePassengerBtn = document.getElementById('role-passenger');
    const boardTitle = document.getElementById('board-title');
    const missionList = document.getElementById('mission-list');
    const crewMembersList = document.getElementById('crew-members');
    const startTripBtn = document.getElementById('start-trip');
    const finishTripBtn = document.getElementById('finish-trip');
    const stars = document.querySelectorAll('.star');
    const submitRatingBtn = document.getElementById('submit-rating');
    const thankyouText = document.getElementById('thankyou');
    const logoutBtn = document.getElementById('logout-button');

    let currentUser = localStorage.getItem('username') || '';
    let currentRole = localStorage.getItem('role') || '';
    let currentCrew = null;
    let selectedRating = 0;

    function showScreen(screen) {
        [loginScreen, boardScreen, crewScreen, ratingScreen].forEach(s => s.style.display = 'none');
        screen.style.display = 'block';
    }

    function init() {
        if (currentUser && currentRole) {
            showBoardScreen();
        } else {
            showScreen(loginScreen);
        }
    }

    function showBoardScreen() {
        currentCrew = null;
        boardTitle.textContent = 'Привет, ' + currentUser + '! Вы ' + (currentRole === 'driver' ? 'водитель' : 'пассажир') + '.';
        missionList.innerHTML = '';
        showScreen(boardScreen);
        if (currentRole === 'passenger') {
            loadMissions();
        } else if (currentRole === 'driver') {
            loadRequests();
        }
    }

    function loadMissions() {
        // Fetch missions from API
        fetch('/api/v3/missions')
        .then(response => response.json())
        .then(data => {
            populateMissions(data);
        })
        .catch(error => {
            console.error('Ошибка загрузки миссий, использую тестовые данные.', error);
            // Test data if API fails
            const dummyMissions = [
                { id: 1, driver: 'Иван', route: 'Москва → Тула', seats: 3 },
                { id: 2, driver: 'Пётр', route: 'Санкт-Петербург → Москва', seats: 2 }
            ];
            populateMissions(dummyMissions);
        });
    }

    function populateMissions(missions) {
        missions.forEach(mission => {
            const div = document.createElement('div');
            div.className = 'mission';
            const title = document.createElement('h3');
            title.textContent = mission.route;
            const info = document.createElement('p');
            info.textContent = 'Водитель: ' + mission.driver + ' | Мест: ' + mission.seats;
            const btn = document.createElement('button');
            btn.textContent = '✋ Подать заявку';
            btn.onclick = function() {
                joinMission(mission);
            };
            div.appendChild(title);
            div.appendChild(info);
            div.appendChild(btn);
            missionList.appendChild(div);
        });
    }

    function joinMission(mission) {
        // Send join request to API
        fetch('/api/v3/mission/' + mission.id + '/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ passenger: currentUser })
        }).then(response => {
            currentCrew = { id: mission.id, driver: mission.driver, passengers: [currentUser] };
            showCrewScreen();
        }).catch(error => {
            console.error('Ошибка при подаче заявки.', error);
            // Fallback: simulate acceptance
            currentCrew = { id: mission.id, driver: mission.driver, passengers: [currentUser] };
            showCrewScreen();
        });
    }

    function loadRequests() {
        // Fetch requests for this driver's missions
        fetch('/api/v3/requests?driver=' + encodeURIComponent(currentUser))
        .then(response => response.json())
        .then(data => {
            populateRequests(data);
        })
        .catch(error => {
            console.error('Ошибка загрузки заявок, использую тестовые данные.', error);
            const dummyRequests = [
                { id: 1, passenger: 'Ольга', missionId: 1 },
                { id: 2, passenger: 'Михаил', missionId: 1 }
            ];
            populateRequests(dummyRequests);
        });
    }

    function populateRequests(requests) {
        missionList.innerHTML = '';
        if (requests.length === 0) {
            missionList.textContent = 'Нет новых заявок.';
            return;
        }
        requests.forEach(req => {
            const div = document.createElement('div');
            div.className = 'mission';
            const info = document.createElement('p');
            info.textContent = 'Пассажир: ' + req.passenger + ' хочет присоединиться к вашей поездке.';
            const btn = document.createElement('button');
            btn.textContent = 'Принять';
            btn.onclick = function() {
                acceptRequest(req);
            };
            div.appendChild(info);
            div.appendChild(btn);
            missionList.appendChild(div);
        });
    }

    function acceptRequest(req) {
        // Accept request via API and create crew
        fetch('/api/v3/crew', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ missionId: req.missionId, passenger: req.passenger })
        }).then(response => {
            currentCrew = { id: req.missionId, driver: currentUser, passengers: [req.passenger] };
            showCrewScreen();
        }).catch(error => {
            console.error('Ошибка при принятии заявки.', error);
            currentCrew = { id: req.missionId, driver: currentUser, passengers: [req.passenger] };
            showCrewScreen();
        });
    }

    function showCrewScreen() {
        crewMembersList.innerHTML = '';
        if (currentCrew) {
            // Add driver
            const liDriver = document.createElement('li');
            liDriver.textContent = currentCrew.driver + ' (водитель)';
            crewMembersList.appendChild(liDriver);
            // Add passengers
            currentCrew.passengers.forEach(p => {
                const li = document.createElement('li');
                li.textContent = p + ' (пассажир)';
                crewMembersList.appendChild(li);
            });
        }
        startTripBtn.style.display = 'inline-block';
        finishTripBtn.style.display = 'none';
        showScreen(crewScreen);
    }

    startTripBtn.onclick = function() {
        // Notify server that trip started (optional)
        fetch('/api/v3/crew/start', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ crewId: currentCrew.id })
        }).catch(e => {});
        startTripBtn.style.display = 'none';
        finishTripBtn.style.display = 'inline-block';
    };

    finishTripBtn.onclick = function() {
        // Notify server trip finished (optional)
        fetch('/api/v3/crew/finish', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ crewId: currentCrew.id })
        }).catch(e => {});
        showScreen(ratingScreen);
    };

    stars.forEach(star => {
        star.addEventListener('click', function() {
            selectedRating = parseInt(this.getAttribute('data-value'));
            stars.forEach(s => {
                s.classList.toggle('selected', parseInt(s.getAttribute('data-value')) <= selectedRating);
            });
        });
    });

    submitRatingBtn.onclick = function() {
        if (selectedRating > 0) {
            // Send rating to server
            fetch('/api/v3/crew/rate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ crewId: currentCrew.id, rating: selectedRating })
            }).catch(e => {});
            submitRatingBtn.style.display = 'none';
            document.getElementById('stars').style.display = 'none';
            thankyouText.style.display = 'block';
        }
    };

    roleDriverBtn.onclick = function() {
        const name = usernameInput.value.trim();
        if (!name) { alert('Пожалуйста, введите имя.'); return; }
        currentUser = name;
        currentRole = 'driver';
        localStorage.setItem('username', currentUser);
        localStorage.setItem('role', currentRole);
        showBoardScreen();
    };

    rolePassengerBtn.onclick = function() {
        const name = usernameInput.value.trim();
        if (!name) { alert('Пожалуйста, введите имя.'); return; }
        currentUser = name;
        currentRole = 'passenger';
        localStorage.setItem('username', currentUser);
        localStorage.setItem('role', currentRole);
        showBoardScreen();
    };

    logoutBtn.onclick = function() {
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        currentUser = '';
        currentRole = '';
        currentCrew = null;
        showScreen(loginScreen);
    };

    init();
});
</script>

</body>
</html>
