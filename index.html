<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,
        viewport-fit=cover">
    <title>WayTandem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ═══════ DESIGN TOKENS ═══════ */
        :root {
            --bg: #0a0e17;
            --bg-elevated: #111827;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-glass: rgba(17, 24, 39, 0.72);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.16);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #a3e635;
            --accent-dim: rgba(163, 230, 53, 0.15);
            --accent-glow: rgba(163, 230, 53, 0.4);
            --blue: #38bdf8;
            --blue-dim: rgba(56, 189, 248, 0.15);
            --amber: #fbbf24;
            --amber-dim: rgba(251, 191, 36, 0.15);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.15);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.15);
            --purple: #a78bfa;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --nav-height: 72px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --header-height: 52px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ═══════ LAYOUT SHELL ═══════ */
        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .header {
            flex-shrink: 0;
            height: var(--header-height);
            padding: 0 16px;
            padding-top: var(--safe-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .header-title .accent {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .role-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-pill.driver {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(163, 230, 53, 0.25);
        }

        .role-pill.passenger {
            background: var(--blue-dim);
            color: var(--blue);
            border: 1px solid rgba(56, 189, 248, 0.25);
        }

        .role-pill.none {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .avatar-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .avatar-inline {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            overflow: hidden;
            color: #fff;
            flex-shrink: 0;
        }

        /* ═══ SUBSCRIPTION BAR ═══ */
        .sub-bar {
            flex-shrink: 0;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(163, 230, 53, 0.08), rgba(163, 230, 53, 0.03));
            border-bottom: 1px solid rgba(163, 230, 53, 0.15);
            z-index: 99;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .sub-bar::-webkit-scrollbar {
            display: none;
        }

        .sub-bar:empty {
            display: none;
            padding: 0;
            border: none;
            height: 0;
        }

        .sub-bar-chip {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 14px;
            background: rgba(163, 230, 53, 0.12);
            border: 1px solid rgba(163, 230, 53, 0.2);
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sub-bar-chip:active {
            background: rgba(163, 230, 53, 0.2);
            transform: scale(0.96);
        }

        .sub-bar-pending {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 14px;
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.2);
            font-size: 11px;
            font-weight: 700;
            color: var(--amber);
            cursor: pointer;
        }

        .sub-bar-crew {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 14px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            cursor: pointer;
        }

        .sub-bar-text {
            flex: 1;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ═══ OPEN CREW BUTTON ═══ */
        .open-crew-btn {
            margin: 12px 16px;
            padding: 16px 20px;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(99, 102, 241, 0.1));
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .open-crew-btn:active {
            transform: scale(0.98);
            border-color: var(--blue);
        }

        .open-crew-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .open-crew-info {
            flex: 1;
        }

        .open-crew-title {
            font-weight: 800;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .open-crew-sub {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .open-crew-arrow {
            color: var(--blue);
            font-size: 20px;
        }

        .req-pending-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--amber-dim);
            color: var(--amber);
            font-size: 10px;
            font-weight: 800;
            animation: pulse-amber 2s infinite;
        }

        @keyframes pulse-amber {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .screen {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .screen::-webkit-scrollbar {
            display: none;
        }

        .nav {
            flex-shrink: 0;
            height: calc(var(--nav-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav.board-deep {
            justify-content: center;
        }

        .nav.board-deep .nav-item[data-tab="board"] {
            flex-direction: row;
            gap: 8px;
            min-width: 176px;
            padding: 10px 18px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .nav.board-deep .nav-item[data-tab="board"] span {
            font-size: 12px;
            font-weight: 800;
        }

        .nav-badge {
            position: absolute;
            top: 2px;
            right: 6px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            background: var(--red);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .badge-pulse {
            animation: badge-pulse 0.5s ease 3;
        }
        @keyframes badge-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* ═══════ REUSABLE COMPONENTS ═══════ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin: 0 16px 12px;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s;
        }

        .card:active {
            border-color: var(--border-active);
        }

        .card-title {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .hero {
            margin: 12px 16px;
            border-radius: var(--radius-xl);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .hero.reservation {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.12) 0%, rgba(17, 24, 39, 0.9) 100%);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .hero.driving {
            background: linear-gradient(135deg, rgba(163, 230, 53, 0.12) 0%, rgba(17, 24, 39, 0.9) 100%);
            border: 1px solid rgba(163, 230, 53, 0.3);
        }

        .hero-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-title {
            font-weight: 900;
            font-size: 22px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .hero-sub {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .lifecycle-progress {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 14px;
            padding: 0 4px;
        }
        .lifecycle-step {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .lifecycle-step.active { color: var(--accent); font-weight: 600; }
        .lifecycle-step.done { color: var(--green); }
        .lifecycle-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }
        .lifecycle-step.active .lifecycle-dot { background: var(--accent); }
        .lifecycle-step.done .lifecycle-dot { background: var(--green); }
        .lifecycle-arrow {
            flex: 1;
            height: 2px;
            background: var(--border);
            min-width: 8px;
        }
        .lifecycle-step.done + .lifecycle-arrow,
        .lifecycle-step.done ~ .lifecycle-arrow { background: var(--green); }

        .crew-tree {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .crew-member {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 14px;
            color: var(--text-primary);
        }
        .crew-member.is-self { color: var(--accent); font-weight: 600; }
        .crew-member .crew-icon { font-size: 16px; flex-shrink: 0; }
        .crew-member .crew-connector {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 12px;
            margin-right: 2px;
        }
        .crew-member .crew-role {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }
        .crew-empty {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 800;
            font-size: 13px;
            text-align: center;
            line-height: 1.2;
            white-space: normal;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            min-height: 48px;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .btn-success {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            padding: 10px 16px;
            min-height: 40px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin: 12px 16px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 16px 16px 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .tag-accent {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tag-amber {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .tag-blue {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .tag-red {
            background: var(--red-dim);
            color: var(--red);
        }

        .tag-green {
            background: var(--green-dim);
            color: var(--green);
        }

        .seats-row {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-top: 8px;
        }

        .seat-dot {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .seat-dot.taken {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .seat-dot.free {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px dashed rgba(163, 230, 53, 0.3);
        }

        .seat-dot.driver-seat {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 32px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-title {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .empty-sub {
            font-size: 13px;
            color: var(--text-muted);
            max-width: 240px;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ═══════ BOTTOM SHEET ═══════ */
        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 9000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .sheet-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            z-index: 9001;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: none;
        }

        .sheet.open {
            transform: translateY(0);
            pointer-events: auto;
        }

        .sheet-card {
            margin: 0 8px;
            margin-bottom: max(8px, var(--safe-bottom));
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
        }

        .sheet-handle {
            display: flex;
            justify-content: center;
            padding: 16px 0 12px;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }

        .sheet-handle-bar {
            width: 44px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
            transition: background 0.15s ease, width 0.15s ease;
        }

        .sheet-handle:active .sheet-handle-bar {
            background: rgba(255, 255, 255, 0.45);
            width: 48px;
        }

        .sheet-body {
            padding: 0 20px 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .sheet-title {
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .sheet-sub {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .sheet-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        /* ═══════ SCREEN: EXPLORE ═══════ */
        #screen-explore {
            display: flex;
            flex-direction: column;
        }

        #map-container {
            flex: 1;
            min-height: 200px;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-overlay-cards {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(transparent, var(--bg) 30%);
            z-index: 500;
            pointer-events: none;
            display: none;
        }

        .map-overlay-cards>* {
            pointer-events: auto;
        }

        .crew-mini-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .crew-mini-card:active {
            border-color: var(--accent);
        }

        .crew-mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;

    <div id="app">
        <!-- SKELETON OVERLAY -->
        <div id="skeleton-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9998;padding-top:60px;">

                <div class="skeleton" style="height:48px;margin-bottom:12px;border-radius:8px;"></div>
                <div class="skeleton" style="height:32px;width:60%;margin-bottom:24px;border-radius:6px;"></div>
                <div class="skeleton" style="height:120px;margin-bottom:12px;border-radius:12px;"></div>
                <div class="skeleton" style="height:120px;margin-bottom:12px;border-radius:12px;"></div>
                <div class="skeleton" style="height:120px;border-radius:12px;"></div>
            </div>
        </div>

        <div class="header">
            <div class="header-title"><span class="accent">Way</span>Tandem</div>
            <div class="header-right">
                <div class="role-pill none" id="role-pill" onclick="openRoleSelector()"></div>
                <div class="avatar-btn" id="avatar-btn" onclick="switchScreen('profile')"></div>
            </div>
        </div>

        <!-- SUBSCRIPTION BAR -->
        <div class="sub-bar" id="sub-bar"></div>

        <!-- MAIN SCREENS -->
        <div class="main">
            <!-- EXPLORE -->
            <div class="screen active" id="screen-explore">
                <div class="news-strip" id="news-strip" style="display:none;"></div>
                <div id="map-container">
                    <div id="map"></div>
                    <div class="map-overlay-cards" id="map-overlay-cards"></div>
                </div>
            </div>

            <!-- BOARD -->
            <div class="screen" id="screen-board">
                <div style="display:flex;padding:12px 16px 0;">
                    <input class="board-search" id="board-search" placeholder="🔍 Пошук напрямку..."
                        oninput="filterBoard(this.value)" style="flex:1;margin:0;width:100%;">
                </div>
                <div class="board-breadcrumb" id="board-breadcrumb"></div>
                <div id="board-list"></div>
            </div>

        /* ══════════════════════════════════════════════════════════════════
           WAYTANDEM v3.1 — E2E Complete
           ══════════════════════════════════════════════════════════════════ */

        const S = {
            userId: 0, userName: '', userPhoto: '', userRole: '', car: '', seats: 4, lang: 'uk',
            apiBase: localStorage.getItem('wt_api') || '',
            botUsername: localStorage.getItem('wt_bot_username') || '',
            miniAppShortName: localStorage.getItem('wt_mini_app_short_name') || '',
            pendingStartDirectionId: null,
            startDirectionHandled: false,
            activeTrip: null, pendingMatches: [], directions: [], news: [], mapCrews: [],
            map: null, mapMarkers: [], currentScreen: 'explore',
            chatRequestId: null, chatPartnerId: null, busy: false,
            boardParentId: null, boardStack: [], boardSubSet: new Set(),
            newsFilter: 'all', mapNewsFilter: 'all', newsMarkers: [],
            subscriptions: [],
            myCrew: null,
            matchSheetOpen: false,
            activeMatchKey: null,
            seenMatchIds: new Set(),
            notifiedMatchIds: new Set(),
            tripStartNotifiedIds: new Set(),
            partnerFinishNotifiedIds: new Set(),
            partnerFinishSheetShownIds: new Set(),
            myDirections: [],
            roleGateOpen: false,
            pendingRoleAction: null,
            homeCity: { lat: 52.2297, lng: 21.0122, name: 'Warsaw' },
            pickupCoords: null,
            _pickupMarker: null,
            _ratingScore: null,
            _ratingContext: null,
            lastHydrateAt: 0,
            lastMapSyncAt: 0,
        };
        let boardNavDefaults = null;
        let waitingForPartner = false;
        let lastKnownTripForRating = null;
        const pendingOps = new Set();
        const POLL_INTERVAL_MS = 8000;
        let pollInFlight = false;
        let pollTimer = null;
        let searchTimer = null;
        let isAppInBackground = false;

        // ═══ STATE PERSISTENCE — survive Telegram WebApp reloads on mobile ═══
        function _stateKey(key) { return `wt_state_${S.userId}_${key}`; }

        function persistCriticalState() {
            try {
                if (waitingForPartner) localStorage.setItem(_stateKey('wfp'), '1');
                else localStorage.removeItem(_stateKey('wfp'));
                if (lastKnownTripForRating) localStorage.setItem(_stateKey('ltr'), JSON.stringify(lastKnownTripForRating));
                else localStorage.removeItem(_stateKey('ltr'));
            } catch (_) { }
        }

        function restoreCriticalState() {
            try {
                waitingForPartner = localStorage.getItem(_stateKey('wfp')) === '1';
                const ltr = localStorage.getItem(_stateKey('ltr'));
                if (ltr) lastKnownTripForRating = JSON.parse(ltr);
            } catch (_) { waitingForPartner = false; lastKnownTripForRating = null; }
        }

        function clearCriticalState() {
            try { localStorage.removeItem(_stateKey('wfp')); } catch (_) { }
            waitingForPartner = false;
            // Keep lastKnownTripForRating — renderTrips needs it to show rating sheet
        }

        function clearLiveLocationConsent() {
            try { localStorage.removeItem(_stateKey('live_location_consent')); } catch (_) { }
        }

        // ═══ LOADING INDICATOR — visual feedback for busy state ═══
        function updateBusyUI() {
            document.getElementById('app').classList.toggle('app-busy', S.busy);
        }

        function beginOp(opKey) {
            if (pendingOps.has(opKey)) return false;
            pendingOps.add(opKey);
            S.busy = pendingOps.size > 0;
            updateBusyUI();
            return true;
        }

        function endOp(opKey) {
            pendingOps.delete(opKey);
            S.busy = pendingOps.size > 0;
            updateBusyUI();
        }

        // ═══ BACKGROUND DETECTION — pause polling when app is backgrounded ═══
        document.addEventListener('visibilitychange', () => {
            isAppInBackground = document.hidden;
            if (document.hidden) {
                // App is backgrounded — polling will skip on next tick
                console.log('[WT] App backgrounded — polling paused');
            } else {
                // App is foregrounded — immediate refresh + resume polling
                console.log('[WT] App foregrounded — refreshing state');
                if (S.apiBase && S.userId) {
                    hydrate();
                }
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            restoreCriticalState(); // Restore state before anything else
            resolveUser();
            await hydrateAppConfig();
            initRolePill();
            initMap();
            await syncUserIdentityToServer();
            await hydrate();
            setTimeout(() => openStartDirectionIfNeeded(), 250);
            startPolling();
            initKeyboardHandler(); // Mobile keyboard handling
            initWelcome(); // Welcome page for new users
        });

        // ═══ KEYBOARD HANDLER — keeps input visible above virtual keyboard ═══
        function initKeyboardHandler() {
            if (!window.visualViewport) return;
            const vv = window.visualViewport;
            let lastHeight = vv.height;

            function adjustForKeyboard() {
                const chatBar = document.querySelector('.chat-input-bar.keyboard-shifted');
                if (!chatBar) return;

                const heightDiff = lastHeight - vv.height;
                if (heightDiff > 100) {
                    // Keyboard is visible — position input above it
                    chatBar.style.bottom = `${heightDiff}px`;
                } else {
                    // Keyboard hidden — reset
                    chatBar.style.bottom = '0px';
                }
                lastHeight = vv.height;
            }

            vv.addEventListener('resize', adjustForKeyboard);
            vv.addEventListener('scroll', adjustForKeyboard);

            // Also handle focus/blur on input fields
            document.addEventListener('focusin', (e) => {
                if (e.target.matches('.chat-input, input[type="text"], textarea')) {
                    const bar = e.target.closest('.chat-input-bar, .sheet-card');
                    if (bar && !bar.classList.contains('keyboard-shifted')) {
                        bar.classList.add('keyboard-shifted');
                        setTimeout(() => adjustForKeyboard(), 100);
                    }
                }
            });
            document.addEventListener('focusout', (e) => {
                if (e.target.matches('.chat-input, input[type="text"], textarea')) {
                    document.querySelectorAll('.keyboard-shifted').forEach(el => {
                        el.classList.remove('keyboard-shifted');
                        el.style.bottom = '';
                    });
                }
            });
        }

        // ─── WELCOME INIT ───
        function initWelcome() {
            // Attach click handler to logo
            const logo = document.querySelector('.header-title');
            if (logo) {
                logo.style.cursor = 'pointer';
                logo.addEventListener('click', () => {
                    showWelcomeSheet();
                });
            }
            // Auto-show welcome for new users (if not seen before)
            if (!localStorage.getItem('wt_welcome_seen') && S.apiBase && S.userId && !S.pendingStartDirectionId && !S.startDirectionHandled) {
                setTimeout(() => {
                    if (!S.pendingStartDirectionId && !S.startDirectionHandled && !isSheetOpen()) showWelcomeSheet();
                }, 1000);
            }
        }

        // ─── USER RESOLUTION ───
        function _pickTelegramName(tgUser, fallbackName = '') {
            const user = tgUser || {};
            const username = String(user.username || '').trim();
            if (username) return username;
            const first = String(user.first_name || '').trim();
            const last = String(user.last_name || '').trim();
            const full = `${first} ${last}`.trim();
            if (full) return full;
            return String(fallbackName || '').trim();
        }

        function _parseInitDataUser(initDataRaw) {
            const raw = String(initDataRaw || '').trim();
            if (!raw) return null;
            try {
                const params = new URLSearchParams(raw);
                const userRaw = params.get('user');
                if (!userRaw) return null;
                return JSON.parse(decodeURIComponent(userRaw));
            } catch (_) {
                return null;
            }
        }

        function normalizeApiBase(rawApi) {
            let base = String(rawApi || '').trim();
            if (!base) return '';
            try { base = decodeURIComponent(base); } catch (_) { }
            base = base.replace(/^['"]+|['"]+$/g, '').trim();
            if (base && !/^https?:\/\//i.test(base)) base = 'https://' + base;
            base = base.split('#')[0].split('?')[0].trim();
            base = base.replace(/(https?:\/\/[^\/?#=]+)=\d+(?=\/|$)/i, '$1');
            base = base.replace(/\/+$/, '');
            try {
                const u = new URL(base);
                if (!u.hostname || u.hostname.includes('=')) return '';
                const p = (u.pathname || '').replace(/\/+$/, '');
                return `${u.protocol}//${u.host}${p === '/' ? '' : p}`;
            } catch (_) {
                return '';
            }
        }

        function sanitizeBotUsername(raw) {
            const username = String(raw || '').trim().replace(/^@+/, '');
            return /^[A-Za-z0-9_]{5,32}$/.test(username) ? username : '';
        }

        function sanitizeMiniAppShortName(raw) {
            const shortName = String(raw || '').trim().replace(/^\/+/, '');
            return /^[A-Za-z0-9_]{3,64}$/.test(shortName) ? shortName : '';
        }

        function parseStartDirectionId(raw) {
            const value = String(raw || '').trim();
            const m = /^dir_(\d+)$/.exec(value);
            return m ? parseInt(m[1]) : null;
        }

        function sanitizeAvatarUrl(raw) {
            const value = String(raw || '').trim();
            if (!value) return '';
            try {
                const u = new URL(value, location.origin);
                if (u.protocol !== 'https:' && u.protocol !== 'http:') return '';
                return u.toString();
            } catch (_) {
                return '';
            }
        }

        function _avatarGradient(seedRaw) {
            const seed = String(seedRaw || '?');
            const palette = [
                ['#6366f1', '#8b5cf6'],
                ['#0ea5e9', '#0284c7'],
                ['#10b981', '#059669'],
                ['#f59e0b', '#f97316'],
                ['#ec4899', '#db2777'],
                ['#22c55e', '#16a34a']
            ];
            let hash = 0;
            for (let i = 0; i < seed.length; i++) hash = ((hash << 5) - hash) + seed.charCodeAt(i);
            const idx = Math.abs(hash) % palette.length;
            const [a, b] = palette[idx];
            return `linear-gradient(135deg, ${a}, ${b})`;
        }

        function applyAvatarElement(el, name, photoUrl) {
            if (!el) return;
            const displayName = String(name || '').trim();
            const firstChar = (displayName || '?')[0].toUpperCase();
            const safePhoto = sanitizeAvatarUrl(photoUrl);
            el.innerHTML = '';
            el.style.background = _avatarGradient(displayName || firstChar);
            if (safePhoto) {
                const img = document.createElement('img');
                img.className = 'avatar-photo';
                img.src = safePhoto;
                img.alt = '';
                img.loading = 'lazy';
                img.referrerPolicy = 'no-referrer';
                el.appendChild(img);
            } else {
                el.textContent = firstChar;
            }
        }

        function renderAvatarInline(name, photoUrl, size = 40, extraClass = '') {
            const displayName = String(name || '').trim();
            const firstChar = (displayName || '?')[0].toUpperCase();
            const safePhoto = sanitizeAvatarUrl(photoUrl);
            const classes = `avatar-inline ${extraClass || ''}`.trim();
            if (safePhoto) {
                return `<div class="${classes}" style="width:${size}px;height:${size}px;"><img class="avatar-photo" src="${escapeAttr(safePhoto)}" alt=""></div>`;
            }
            const bg = _avatarGradient(displayName || firstChar);
            return `<div class="${classes}" style="width:${size}px;height:${size}px;background:${bg};">${escapeHtml(firstChar)}</div>`;
        }

        function syncIdentityUI() {
            const displayName = String(S.userName || '').trim();
            applyAvatarElement(document.getElementById('profile-avatar'), displayName, S.userPhoto);
            document.getElementById('profile-name').textContent = displayName || 'Користувач';
            document.getElementById('profile-id').textContent = displayName ? `Telegram: ${displayName}` : 'Telegram: —';
            applyAvatarElement(document.getElementById('avatar-btn'), displayName, S.userPhoto);
        }

        function resolveUser() {
            const tg = window.Telegram?.WebApp;
            const qp = new URLSearchParams(location.search);
            const storedApi = normalizeApiBase(S.apiBase);
            S.apiBase = storedApi;
            if (storedApi) localStorage.setItem('wt_api', storedApi);
            const urlApi = qp.get('api');
            if (urlApi) {
                const base = normalizeApiBase(urlApi);
                if (base) {
                    S.apiBase = base;
                    localStorage.setItem('wt_api', S.apiBase);
                } else {
                    console.warn('Invalid api base query param:', urlApi);
                }
            }
            const urlBot = sanitizeBotUsername(qp.get('bot') || qp.get('bot_username') || '');
            const globalBot = sanitizeBotUsername(window.WAYTANDEM_BOT_USERNAME || '');
            const storedBot = sanitizeBotUsername(S.botUsername || localStorage.getItem('wt_bot_username') || '');
            S.botUsername = urlBot || globalBot || storedBot;
            if (S.botUsername) localStorage.setItem('wt_bot_username', S.botUsername);
            const urlMiniApp = sanitizeMiniAppShortName(qp.get('miniapp') || qp.get('mini_app') || qp.get('mini_app_short_name') || '');
            const globalMiniApp = sanitizeMiniAppShortName(window.WAYTANDEM_MINI_APP_SHORT_NAME || '');
            const storedMiniApp = sanitizeMiniAppShortName(S.miniAppShortName || localStorage.getItem('wt_mini_app_short_name') || '');
            S.miniAppShortName = urlMiniApp || globalMiniApp || storedMiniApp;
            if (S.miniAppShortName) localStorage.setItem('wt_mini_app_short_name', S.miniAppShortName);
            let initStartParam = '';
            try { initStartParam = new URLSearchParams(tg?.initData || '').get('start_param') || ''; } catch (_) { }
            const startParam = tg?.initDataUnsafe?.start_param || initStartParam || qp.get('tgWebAppStartParam') || qp.get('startapp') || qp.get('start_param') || '';
            S.pendingStartDirectionId = parseStartDirectionId(startParam);
            const initDataUser = _parseInitDataUser(tg?.initData || '');
            const tgUser = tg?.initDataUnsafe?.user || initDataUser;
            if (tgUser?.id) {
                S.userId = tgUser.id;
                S.userName = _pickTelegramName(tgUser, qp.get('name') || '');
                S.userPhoto = sanitizeAvatarUrl(tgUser.photo_url || '');
            } else {
                S.userId = parseInt(qp.get('user_id') || '0');
                S.userName = String(qp.get('name') || '').trim();
                S.userPhoto = sanitizeAvatarUrl(qp.get('avatar') || '');
            }
            if (tg) { tg.ready(); tg.expand(); }
            if (!String(S.userName || '').trim() && S.userId) {
                const cachedName = String(localStorage.getItem('wt_name_' + S.userId) || '').trim();
                if (cachedName) S.userName = cachedName;
            }
            if (!S.userPhoto && S.userId) {
                const cachedPhoto = sanitizeAvatarUrl(localStorage.getItem('wt_photo_' + S.userId) || '');
                if (cachedPhoto) S.userPhoto = cachedPhoto;
            }
            syncIdentityUI();
            if (S.userId && String(S.userName || '').trim()) {
                localStorage.setItem('wt_name_' + S.userId, String(S.userName || '').trim());
            }
            if (S.userId && S.userPhoto) {
                localStorage.setItem('wt_photo_' + S.userId, S.userPhoto);
            }
            try {
                const saved = JSON.parse(localStorage.getItem('wt_profile_' + S.userId) || '{}');
                if (typeof saved.role === 'string') S.userRole = normalizeRole(saved.role);
                if (saved.car) S.car = saved.car;
                if (saved.seats) S.seats = saved.seats;
                if (saved.lang) S.lang = saved.lang;
            } catch (_) { }
            updateRolePill();
        }

        function saveProfile() {
            localStorage.setItem('wt_profile_' + S.userId, JSON.stringify({
                role: S.userRole, car: S.car, seats: S.seats, lang: S.lang
            }));
        }

        // ─── API ───
        // Centralized API wrapper (I-FRONT-2, I-FRONT-3)
        async function apiWithStatus(path, opts = {}) {
            if (!S.apiBase) return { ok: false, status: 0, data: null };

            // Handle busy state if not silent
            const opKey = opts.opKey || path;
            if (!opts.silent) beginOp(opKey);

            const headers = { 'Content-Type': 'application/json' };
            const initData = window.Telegram?.WebApp?.initData || '';
            if (initData) headers['Authorization'] = 'tma ' + initData;

            try {
                const r = await fetch(S.apiBase + path, { ...opts, headers: { ...headers, ...opts.headers } });
                let payload = null;
                try {
                    payload = await r.json();
                } catch (_) { /* payload remains null */ }

                if (!r.ok) {
                    if (!opts.silent) {
                        showToast(payload?.detail || `Помилка ${r.status}`, 'error');
                    }
                    return { ok: false, status: r.status, data: payload };
                }

                return { ok: true, status: r.status, data: payload };
            } catch (e) {
                if (!opts.silent) {
                    showToast('Помилка з’єднання', 'error');
                    console.error('API Error:', path, e);
                }
                return { ok: false, status: 0, data: null };
            } finally {
                if (!opts.silent) endOp(opKey);
            }
        }

        async function api(path, opts = {}) {
            const resp = await apiWithStatus(path, opts);
            return resp.ok ? resp.data : null;
        }

        async function hydrateAppConfig() {
            if (!S.apiBase || (S.botUsername && S.miniAppShortName)) return;
            const cfg = await api('/api/v3/app/config', { silent: true });
            const username = sanitizeBotUsername(cfg?.bot_username || '');
            if (username) {
                S.botUsername = username;
                localStorage.setItem('wt_bot_username', username);
            }
            const miniAppShortName = sanitizeMiniAppShortName(cfg?.mini_app_short_name || '');
            if (miniAppShortName) {
                S.miniAppShortName = miniAppShortName;
                localStorage.setItem('wt_mini_app_short_name', miniAppShortName);
            }
        }

        async function syncUserIdentityToServer() {
            if (!S.apiBase || !S.userId || !String(S.userName || '').trim()) return;
            try {
                const p = await api(`/api/v3/user/profile?user_id=${S.userId}`);
                const role = normalizeRole(p?.role || S.userRole || 'client');
                await apiWithStatus('/api/v3/user/register', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: S.userId, name: S.userName, role })
                });
            } catch (_) { }
        }

        function normalizeRole(role) {
            const r = String(role ?? '').trim();
            if (!r) return '';
            if (r === 'passenger') return 'client';
            return r;
        }

        function resolveActiveTripPayload(payload) {
            if (!payload || typeof payload !== 'object') return null;
            if (payload.active_trip && typeof payload.active_trip === 'object') return payload.active_trip;
            if (payload.trip && typeof payload.trip === 'object') return payload.trip;
            if (payload.found === true && (payload.crew_id || payload.id || payload.request_id)) return payload;
            if (payload.active === true && (payload.crew_id || payload.id || payload.request_id)) return payload;
            return null;
        }

        function resolvePendingMatchesPayload(payload) {
            if (Array.isArray(payload)) return payload;
            if (!payload || typeof payload !== 'object') return [];
            if (Array.isArray(payload.matches)) return payload.matches;
            const incoming = Array.isArray(payload.incoming) ? payload.incoming.map(m => ({ ...m, scope: m?.scope || 'incoming' })) : [];
            const outgoing = Array.isArray(payload.outgoing) ? payload.outgoing.map(m => ({ ...m, scope: m?.scope || 'outgoing' })) : [];
            return [...incoming, ...outgoing];
        }

        // ─── SKELETON ───
        let _skeletonShown = false;
        function showSkeleton() {
            const overlay = document.getElementById('skeleton-overlay');
            if (overlay) overlay.style.display = 'block';
            _skeletonShown = true;
        }
        function hideSkeleton() {
            const overlay = document.getElementById('skeleton-overlay');
            if (overlay) overlay.style.display = 'none';
            _skeletonShown = false;
        }

        // ─── HYDRATE ───
        async function hydrate() {
            if (!S.apiBase || !S.userId) { renderNews(); renderBoard(); renderTrips(); renderSubBar(); return; }
            showSkeleton();
            const data = await api(`/api/v3/hydrate?user_id=${S.userId}&include_outgoing=1`);
            if (!data) { hideSkeleton(); return; }
            if (data.profile) {
                if (Object.prototype.hasOwnProperty.call(data.profile, 'role')) {
                    S.userRole = normalizeRole(data.profile.role);
                }
                if (!String(S.userName || '').trim()) S.userName = data.profile.name || S.userName;
                if (!S.userPhoto) S.userPhoto = sanitizeAvatarUrl(data.profile.photo_url || '');
            }
            if (!String(S.userName || '').trim()) {
                const prof = await api(`/api/v3/user/profile?user_id=${S.userId}`);
                if (prof?.found && String(prof.name || '').trim()) {
                    S.userName = String(prof.name || '').trim();
                }
                if (!S.userPhoto && prof?.found) {
                    S.userPhoto = sanitizeAvatarUrl(prof.photo_url || '');
                }
            }
            if (S.userId && String(S.userName || '').trim()) {
                localStorage.setItem('wt_name_' + S.userId, String(S.userName || '').trim());
            }
            if (S.userId && S.userPhoto) {
                localStorage.setItem('wt_photo_' + S.userId, S.userPhoto);
            }
            const previousTrip = S.activeTrip ? { ...S.activeTrip } : null;
            S.lastHydrateAt = Date.now();
            S.activeTrip = resolveActiveTripPayload(data);
            notifyLifecycleTransitions(previousTrip, S.activeTrip);
            if (S.activeTrip) lastKnownTripForRating = { ...S.activeTrip };
            S.pendingMatches = resolvePendingMatchesPayload(data);
            syncIdentityUI();
            updateRolePill(); updateBadges(); renderBoard(); renderTrips(); renderSubBar(); refreshMap();
            if (S.currentScreen === 'news' || S.currentScreen === 'explore') renderNews();
            const subs = await api(`/api/v3/user/subscriptions?user_id=${S.userId}`);
            S.subscriptions = subs?.subscriptions || [];
            S.boardSubSet = new Set(S.subscriptions.map(s => String(s.direction_id)));
            // Check handshake panel logic after hydration
            verifyHandshakePanelState();
            maybeOpenMatchSheet();
            hideSkeleton();
        }

        function startPolling() {
            if (!S.apiBase || !S.userId) return;
            setInterval(async () => {
                if (!S.apiBase || !S.userId || pollInFlight) return;
                pollInFlight = true;
                try {
                    const data = await api(`/api/v3/hydrate?user_id=${S.userId}&include_outgoing=1`, { silent: true });
                    if (!data) return;

                    const oldPendingRaw = JSON.stringify(S.pendingMatches);
                    const previousTrip = S.activeTrip ? { ...S.activeTrip } : null;
                    const oldTripId = S.activeTrip ? S.activeTrip.id : null;
                    const oldStatus = S.activeTrip ? S.activeTrip.status : null;
                    const wasStarted = S.activeTrip ? S.activeTrip.is_started : 0;

                    S.lastHydrateAt = Date.now();
                    S.activeTrip = resolveActiveTripPayload(data);
                    notifyLifecycleTransitions(previousTrip, S.activeTrip);
                    if (S.activeTrip) lastKnownTripForRating = { ...S.activeTrip };
                    // If waiting for partner and trip is gone — partner finished, show rating
                    if (waitingForPartner && !S.activeTrip && lastKnownTripForRating) {
                        waitingForPartner = false;
                    }
                    S.pendingMatches = resolvePendingMatchesPayload(data);

                    syncIdentityUI();
                    verifyHandshakePanelState();

                    const newPendingRaw = JSON.stringify(S.pendingMatches);
                    if (oldPendingRaw !== newPendingRaw) updateBadges();
                    let _pendingRefreshMap = false;
                    if (oldTripId !== (S.activeTrip ? S.activeTrip.id : null) ||
                        oldStatus !== (S.activeTrip ? S.activeTrip.status : null) ||
                        wasStarted !== (S.activeTrip ? S.activeTrip.is_started : 0)) {
                        _pendingRefreshMap = true;
                    }

                    updateRolePill();
                    renderSubBar();
                    if (S.currentScreen === 'trips') renderTrips();
                    if (S.currentScreen === 'news') renderNewsScreen();
                    maybeOpenMatchSheet();
                    if (S.chatRequestId) loadChatMessages();

                    if (_pendingRefreshMap) refreshMap();
                    else if (shouldRenderCrewMembersOnMap(S.activeTrip)) renderCrewMembersOnMap();
                    persistCriticalState(); // Persist after each successful poll
                } finally {
                    pollInFlight = false;
                }
            }, POLL_INTERVAL_MS);
        }

        function updateBadges() {
            const badge = document.getElementById('nav-trips-badge');
            const count = S.pendingMatches.length;
            if (count > 0) {
                const prev = parseInt(badge.textContent || '0');
                badge.style.display = 'flex';
                badge.textContent = count;
                if (count > prev) {
                    badge.classList.remove('badge-pulse');
                    void badge.offsetWidth; // reflow to restart animation
                    badge.classList.add('badge-pulse');
                }
            } else {
                badge.style.display = 'none';
                badge.classList.remove('badge-pulse');
            }
        }

        // ─── ROLE ───
        function initRolePill() { updateRolePill(); }
        function _isDriverRole(role) { return String(role || '') === 'driver'; }
        function _isPassengerRole(role) { const r = String(role || ''); return r === 'passenger' || r === 'client'; }
        function hasChosenRole() { return _isDriverRole(S.userRole) || _isPassengerRole(S.userRole); }

        function requireRoleForAction(actionLabel, retryFn) {
            if (hasChosenRole()) return true;
            S.pendingRoleAction = typeof retryFn === 'function' ? retryFn : null;
            openRoleSelector(true, actionLabel || 'продовжити');
            return false;
        }

        function syncProfileSettingsByRole() {
            const carRow = document.getElementById('settings-row-car');
            const seatsRow = document.getElementById('settings-row-seats');
            const isDriver = _isDriverRole(S.userRole);
            if (carRow) carRow.style.display = isDriver ? '' : 'none';
            if (seatsRow) seatsRow.style.display = isDriver ? '' : 'none';
        }

        function updateRolePill() {
            const pill = document.getElementById('role-pill');
            const sr = document.getElementById('settings-role');
            if (_isDriverRole(S.userRole)) { pill.className = 'role-pill driver'; pill.textContent = '🚗 Водій'; sr.textContent = 'Водій'; }
            else if (_isPassengerRole(S.userRole)) { pill.className = 'role-pill passenger'; pill.textContent = '👤 Попутник'; sr.textContent = 'Попутник'; }
            else { pill.className = 'role-pill none'; pill.textContent = 'Обрати роль'; sr.textContent = 'Не обрано'; }
            document.getElementById('settings-car').textContent = S.car || '—';
            document.getElementById('settings-seats').textContent = S.seats;
            syncProfileSettingsByRole();
        }

        function openRoleSelector(required = false, actionLabel = '') {
            const isDriver = S.userRole === 'driver';
            const isClient = S.userRole === 'client';
            S.roleGateOpen = !!required;
            openSheet(`
                <div class="sheet-title">${required ? 'Хто ти зараз?' : 'Оберіть роль'}</div>
                <div class="sheet-sub">${required ? `Щоб ${escapeHtml(actionLabel || 'продовжити')}, спочатку оберіть роль. Роль можна змінити пізніше, якщо немає активних домовленостей.` : 'Створювати напрямки можуть обидві ролі. Далі дії залежать від ролі.'}</div>
                <div class="sheet-actions">
                    <button class="btn ${isDriver ? 'btn-primary' : 'btn-secondary'}" onclick="setRole('driver')">🚗 Я везу людей</button>
                    <button class="btn ${isClient ? 'btn-primary' : 'btn-secondary'}" onclick="setRole('client')">👤 Мені потрібно місце</button>
                    ${required ? '' : '<button class="btn btn-ghost" onclick="closeSheet()">Скасувати</button>'}
                </div>
            `);
        }

        async function setRole(role) {
            const normalizedRole = normalizeRole(role);
            if (!normalizedRole) return;
            if (normalizedRole === S.userRole) { closeSheet(); return; }

            if (S.apiBase) {
                const resp = await apiWithStatus('/api/v3/user/role', {
                    method: 'POST',
                    silent: true,
                    body: JSON.stringify({ user_id: S.userId, role: normalizedRole })
                });
                if (!resp.ok) {
                    const detail = resp?.data?.detail;
                    const reason = (detail && typeof detail === 'object') ? detail.reason : String(detail || '');
                    if (reason === 'role_change_blocked_by_opposite_interest') {
                        showToast('Спочатку відпишіться: є зацікавлені з протилежної ролі', 'error');
                    } else if (reason === 'role_change_blocked_active_trip' || reason === 'cannot_change_role_active_trip') {
                        showToast('Неможливо змінити роль під час активної поїздки', 'error');
                    } else {
                        showToast('Не вдалося змінити роль', 'error');
                    }
                    return;
                }
            }

            S.userRole = normalizedRole;
            saveProfile();
            updateRolePill();
            closeSheet();
            showToast(normalizedRole === 'driver' ? '🚗 Ви водій!' : '👤 Ви попутник!', 'success');
            if (S.currentScreen === 'explore') refreshMap();
            renderSubBar();
            if (S.apiBase) await hydrate();
            const pendingAction = S.pendingRoleAction;
            S.pendingRoleAction = null;
            if (pendingAction) setTimeout(() => pendingAction(), 0);
        }

        // ─── SUBSCRIPTION BAR ───
        function renderSubBar() {
            const bar = document.getElementById('sub-bar');
            if (!bar) return;
            const parts = [];
            if (S.activeTrip) {
                const t = S.activeTrip;
                const isDriver = t.viewer_role === 'driver';
                const partnerDone = tripPartnerFinished(t);
                const myDone = tripViewerFinished(t);
                if (partnerDone && !myDone) {
                    parts.push(`<div class="sub-bar-pending" onclick="switchScreen('trips')">🏁 Партнер чекає фініш</div>`);
                }
                const phase = t.is_started ? '🚀 В дорозі' : '⏳ Резервація';
                parts.push(`<div class="sub-bar-crew" onclick="switchScreen('trips')">${isDriver ? '🚗' : '👤'} ${phase} · ${escapeHtml(t.direction_title || 'Поїздка')} #${t.crew_id || '—'}</div>`);
            }
            if (waitingForPartner) {
                parts.push(`<div class="sub-bar-pending" onclick="switchScreen('trips')">⏳ Очікування партнера</div>`);
            }
            const incoming = S.pendingMatches.filter(m => m.scope === 'incoming');
            if (incoming.length > 0) parts.push(`<div class="sub-bar-pending" onclick="switchScreen('trips')">📩 ${incoming.length} запит${incoming.length > 1 ? 'ів' : ''}</div>`);
            const outgoing = S.pendingMatches.filter(m => m.scope === 'outgoing');
            if (outgoing.length > 0) parts.push(`<div class="sub-bar-pending" onclick="switchScreen('trips')">⏳ ${outgoing.length} очікує</div>`);
            if (S.myCrew) parts.push(`<div class="sub-bar-crew" onclick="switchScreen('trips')">🚗 Екіпаж #${S.myCrew.crew_id || '—'}</div>`);
            const subs = S.subscriptions || [];
            if (subs.length > 0 && !S.activeTrip) {
                subs.slice(0, 3).forEach(s => {
                    const title = s.direction_title || s.title || `#${s.direction_id}`;
                    parts.push(`<div class="sub-bar-chip" onclick="openDirection(${s.direction_id})">🧭 ${escapeHtml(title.substring(0, 20))}</div>`);
                });
                if (subs.length > 3) parts.push(`<div class="sub-bar-text">+${subs.length - 3} ще</div>`);
            }
            if (parts.length === 0) parts.push(`<div class="sub-bar-text" onclick="switchScreen('board')">📌 Оберіть напрямок, щоб почати</div>`);
            bar.innerHTML = parts.join('');
        }

        // ─── OPEN CREW ───
        async function openMyCrew() {
            if (!requireRoleForAction('відкрити місця', () => openMyCrew())) return;
            if (!_isDriverRole(S.userRole)) { showToast('Відкрити місця може тільки водій', 'error'); openRoleSelector(); return; }
            if (!beginOp('open_crew_sheet')) return;
            try {
                const dirs = S.subscriptions.length > 0 ? S.subscriptions : (await api(`/api/v3/board?lang=${S.lang}`))?.directions || [];
                if (!dirs.length) { endOp('open_crew_sheet'); showToast('Спочатку підпишіться на напрямок', 'error'); switchScreen('board'); return; }
                if (dirs.length === 1) { await doOpenCrew(dirs[0].direction_id || dirs[0].id); return; }
                openSheet(`
                <div class="sheet-title">Я водій: відкрити місця</div>
                <div class="sheet-sub">Оберіть напрямок, де готові взяти попутників.</div>
                <div class="sheet-actions">
                    ${dirs.map(d => {
                    const did = d.direction_id || d.id;
                    const title = d.direction_title || d.title || `#${did}`;
                    return `<button class="btn btn-secondary" onclick="doOpenCrew(${did});closeSheet();">${escapeHtml(title)}</button>`;
                }).join('')}
                    <button class="btn btn-ghost" onclick="closeSheet()">Скасувати</button>
                </div>
            `);
            } finally {
                endOp('open_crew_sheet');
            }
        }

        async function doOpenCrew(dirId) {
            if (!requireRoleForAction('відкрити місця', () => doOpenCrew(dirId))) return;
            if (!_isDriverRole(S.userRole)) { showToast('Відкрити місця може тільки водій', 'error'); openRoleSelector(); return; }
            if (!beginOp('open_crew_submit')) return;
            try {
                const payload = { user_id: S.userId, direction_id: dirId, pickup: 'WEB', seats: S.seats };
                if (S.pickupCoords?.lat && S.pickupCoords?.lng) {
                    payload.pickup = `${S.pickupCoords.lat.toFixed(5)}, ${S.pickupCoords.lng.toFixed(5)}`;
                    payload.pickup_lat = S.pickupCoords.lat;
                    payload.pickup_lng = S.pickupCoords.lng;
                }
                const res = await api('/api/v3/crews/open', { method: 'POST', body: JSON.stringify(payload) });
                if (res?.status === 'ok' || res?.crew_id) {
                    S.myCrew = { crew_id: res.crew_id, direction_id: dirId };
                    showToast('🚗 Екіпаж відкрито! Очікуйте попутників', 'success');
                    await hydrate();
                    closeSheet();
                    switchScreen('trips');
                } else { showToast('Помилка: ' + (res?.reason || 'невідома'), 'error'); }
            } catch (e) { showToast('Помилка створення екіпажу', 'error'); }
            finally { endOp('open_crew_submit'); }
        }

        // ─── NAVIGATION ───
        function switchScreen(name) {
            S.currentScreen = name;
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('screen-' + name).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
            // Clear handshake panel padding when leaving trips screen
            if (name !== 'trips') { document.body.style.paddingBottom = ''; }
            if (name === 'profile') updateRolePill();
            if (name === 'explore') refreshMap();
            if (name === 'board') renderBoard();
            if (name === 'news') renderNewsScreen();
            if (name === 'trips') { renderTrips(); setTimeout(() => maybeOpenMatchSheet(), 0); }
            updateBottomNavForBoardDepth();
        }

        function updateBottomNavForBoardDepth() {
            const nav = document.querySelector('.nav');
            const boardItem = document.querySelector('.nav-item[data-tab="board"]');
            if (!nav || !boardItem) return;
            const boardLabel = boardItem.querySelector('span');
            const boardIcon = boardItem.querySelector('svg');
            if (!boardNavDefaults) boardNavDefaults = { label: boardLabel?.textContent || 'Каталог', icon: boardIcon?.innerHTML || '' };
            const deepInBoard = S.currentScreen === 'board' && S.boardStack.length > 0;
            const navItems = Array.from(nav.querySelectorAll('.nav-item'));
            nav.classList.toggle('board-deep', deepInBoard);
            navItems.forEach(item => { if (item === boardItem) return; item.style.display = deepInBoard ? 'none' : ''; });
            if (deepInBoard) {
                if (boardLabel) boardLabel.textContent = 'Назад';
                if (boardIcon) boardIcon.innerHTML = '<polyline points="15 18 9 12 15 6"></polyline><line x1="9" y1="12" x2="21" y2="12"></line>';
                boardItem.onclick = (e) => { e?.preventDefault?.(); boardGoUp(); };
                boardItem.classList.add('active'); return;
            }
            if (boardLabel) boardLabel.textContent = boardNavDefaults.label || 'Каталог';
            if (boardIcon && boardNavDefaults.icon) boardIcon.innerHTML = boardNavDefaults.icon;
            boardItem.onclick = () => switchScreen('board');
            navItems.forEach(item => item.style.display = '');
            navItems.forEach(item => item.classList.toggle('active', item.dataset.tab === S.currentScreen));
        }

        // ─── MAP ───
        function initMap() {
            S.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([S.homeCity.lat, S.homeCity.lng], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(S.map);
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => S.map.flyTo([p.coords.latitude, p.coords.longitude], 13, { duration: 1.2 }),
                    () => { }
                );
            }
            const locBtn = document.createElement('div');
            locBtn.style.cssText = 'position:absolute;bottom:120px;right:16px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;backdrop-filter:blur(10px);';
            locBtn.textContent = '📍';
            locBtn.onclick = () => { if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => S.map.flyTo([p.coords.latitude, p.coords.longitude], 14, { duration: 1 })); };
            document.getElementById('map-container').appendChild(locBtn);
            const homeBtn = document.createElement('div');
            homeBtn.style.cssText = 'position:absolute;bottom:120px;right:70px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;backdrop-filter:blur(10px);';
            homeBtn.textContent = '🏠'; homeBtn.title = S.homeCity.name;
            homeBtn.onclick = () => S.map.flyTo([S.homeCity.lat, S.homeCity.lng], 12, { duration: 1 });
            document.getElementById('map-container').appendChild(homeBtn);
        }

        async function refreshMap() {
            if (!S.apiBase) return;
            const crews = await api('/api/v3/map/crews');
            if (!crews) return;
            S.mapCrews = crews || [];
            S.lastMapSyncAt = Date.now();
            S.mapMarkers.forEach(m => S.map.removeLayer(m));
            S.mapMarkers = [];
            S.newsMarkers.forEach(m => S.map.removeLayer(m));
            S.newsMarkers = [];
            const visibleCrews = (crews || []).filter(c => S.mapNewsFilter === 'all' || classifyNewsItem(c) === S.mapNewsFilter);
            visibleCrews.forEach(c => {
                if (!c.lat || !c.lng) return;
                // Highlight crews going to the same direction as active trip
                const isSameDirection = S.activeTrip && c.direction_id && String(c.direction_id) === String(S.activeTrip.direction_id);
                const bgColor = isSameDirection ? '#fbbf24' : 'var(--accent)';
                const glow = isSameDirection ? '0 2px 12px rgba(251,191,36,0.5)' : '0 2px 12px var(--accent-glow)';
                const emoji = isSameDirection ? '🎯' : '🚗';
                const marker = L.marker([c.lat, c.lng], {
                    icon: L.divIcon({ className: '', html: `<div style="width:32px;height:32px;border-radius:50%;background:${bgColor};display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:${glow};border:2px solid rgba(0,0,0,0.3);">${emoji}</div>`, iconSize: [32, 32], iconAnchor: [16, 16] })
                }).addTo(S.map);
                const canRequest = S.userId && String(S.userId) !== String(c.organizer_id) && S.userRole !== 'driver';
                const safeOrganizerId = Number.isFinite(Number(c.organizer_id)) ? Number(c.organizer_id) : 0;
                const safeDirectionId = Number.isFinite(Number(c.direction_id)) ? Number(c.direction_id) : 0;
                const popupName = escapeHtml(c.driver_name || c.organizer_name || 'Екіпаж');
                const popupDirection = escapeHtml(c.direction_title || '');
                const requestBtn = canRequest
                    ? '<button onclick="requestJoin(' + safeOrganizerId + ', ' + safeDirectionId + ')" style="flex:1;padding:8px;border-radius:10px;background:rgba(163,230,53,0.15);color:#a3e635;border:1px solid rgba(163,230,53,0.3);font-weight:700;font-size:12px;cursor:pointer;">✓ Запроситись</button>'
                    : '';
                const openBtn = '<button onclick="openDirectionFromMap(' + safeDirectionId + ')" style="flex:1;padding:8px;border-radius:10px;background:rgba(56,189,248,0.14);color:#38bdf8;border:1px solid rgba(56,189,248,0.3);font-weight:700;font-size:12px;cursor:pointer;">→ Напрямок</button>';
                marker.bindPopup('<div style="text-align:center;min-width:180px;"><div style="font-weight:800;font-size:14px;margin-bottom:4px;">' + popupName + '</div><div style="font-size:11px;color:#94a3b8;margin-bottom:8px;">' + popupDirection + '</div><div style="display:flex;gap:8px;">' + requestBtn + openBtn + '</div></div>');
                S.mapMarkers.push(marker);
            });
            // Re-draw pickup marker if exists
            if (S.pickupCoords && S._pickupMarker) { S._pickupMarker.addTo(S.map); }
            // Show live crew member markers during reservation pickup + Phase 2
            renderCrewMembersOnMap();
            renderNewsPointsOnMap(visibleCrews);
            renderMapOverlay([]);
            renderNewsStrip();

        function _newsMarkerPalette(kind) {
            if (kind === 'theocracy') return { emoji: '⛪', color: '#a78bfa', glow: 'rgba(167,139,250,0.45)' };
            if (kind === 'leisure') return { emoji: '🏖️', color: '#34d399', glow: 'rgba(52,211,153,0.45)' };
            if (kind === 'work') return { emoji: '💼', color: '#38bdf8', glow: 'rgba(56,189,248,0.45)' };
            return { emoji: '🧭', color: '#fbbf24', glow: 'rgba(251,191,36,0.45)' };
        }

        function renderNewsPointsOnMap(crews) {
            if (!S.map) return;
            const items = Array.isArray(S.news) ? S.news.filter(isDiscoveryNewsItem) : [];
            if (!items.length) return;
            const byDirection = new Map();
            (crews || []).forEach(c => {
                if (!c || c.direction_id == null || c.lat == null || c.lng == null) return;
                const key = String(c.direction_id);
                if (!byDirection.has(key)) byDirection.set(key, { lat: Number(c.lat), lng: Number(c.lng), dirTitle: c.direction_title || '' });
            });
            items.forEach(n => {
                if (!n || n.direction_id == null || n.lat == null || n.lng == null) return;
                const key = String(n.direction_id);
                if (!byDirection.has(key)) byDirection.set(key, { lat: Number(n.lat), lng: Number(n.lng), dirTitle: n.dir_title || '' });
            });
            const uniqueNews = [];
            const seenDir = new Set();
            for (const n of items) {
                const dId = Number(n?.direction_id || 0);
                if (!dId) continue;
                const kind = classifyNewsItem(n);
                if (S.mapNewsFilter !== 'all' && kind !== S.mapNewsFilter) continue;
                const key = String(dId);
                if (!byDirection.has(key)) continue;
                if (seenDir.has(key)) continue;
                seenDir.add(key);
                uniqueNews.push(n);
            }
            uniqueNews.slice(0, 80).forEach(n => {
                const dId = Number(n?.direction_id || 0);
                const key = String(dId);
                const geo = byDirection.get(key);
                if (!geo) return;
                const kind = classifyNewsItem(n);
                const pal = _newsMarkerPalette(kind);
                const icon = L.divIcon({ className: '', html: `<div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${pal.color};color:#081018;font-size:14px;font-weight:900;border:2px solid rgba(0,0,0,0.35);box-shadow:0 0 16px ${pal.glow};">${pal.emoji}</div>`, iconSize: [28, 28], iconAnchor: [14, 14] });
                const marker = L.marker([geo.lat, geo.lng], { icon }).addTo(S.map);
                const safeNewsDirectionId = Number.isFinite(dId) ? dId : 0;
                const newsTitle = escapeHtml(n?.dir_title || geo.dirTitle || 'Новина');
                const newsText = escapeHtml(n?.text || '');
                marker.bindPopup('<div style="min-width:190px;"><div style="font-weight:800;font-size:13px;margin-bottom:6px;">' + newsTitle + '</div><div style="font-size:12px;color:#94a3b8;line-height:1.35;margin-bottom:8px;">' + newsText + '</div><div style="display:flex;gap:8px;"><button onclick="subscribeFromNewsMap(' + safeNewsDirectionId + ')" style="flex:1;padding:7px 9px;border-radius:9px;border:1px solid rgba(163,230,53,0.35);background:rgba(163,230,53,0.14);color:#a3e635;font-weight:800;font-size:11px;cursor:pointer;">✓ В чергу</button><button onclick="openDirectionFromNewsMap(' + safeNewsDirectionId + ')" style="flex:1;padding:7px 9px;border-radius:9px;border:1px solid rgba(56,189,248,0.35);background:rgba(56,189,248,0.14);color:#38bdf8;font-weight:800;font-size:11px;cursor:pointer;">→ Відкрити</button></div></div>');
                S.newsMarkers.push(marker);
            });
        }

        async function openDirectionFromMap(dirId) { switchScreen('board'); setTimeout(() => openDirection(dirId), 120); }

            'direction_closed': 'Напрямок зараз недоступний',
