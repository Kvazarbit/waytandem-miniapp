            'expired': 'Термін запиту минув — надішліть новий',
            'handshake_not_found': 'Запит не знайдено',

        function getErrorMessage(res, fallback = 'Помилка') {
            if (!res) return 'Немає відповіді від серверу — перевірте з\'єднання';
            const detail = res.detail;
            const reason = res.reason || (detail && typeof detail === 'object' ? detail.reason : detail) || '';
            return ERROR_MESSAGES[reason] || (reason ? `${fallback}: ${reason}` : fallback);
        }

        function getOutgoingForDirection(dirId) {
            return (S.pendingMatches || []).find(m => {
                if (m.scope !== 'outgoing') return false;
                return String(m.direction_id) === String(dirId);
            });
        }

        async function confirmOutgoingSwitchIfNeeded(orgId, dirId) {
            const current = getOutgoingForDirection(dirId);
            if (!current) return true;
            const currentTarget = current.target_id || current.partner_id;
            if (String(currentTarget) === String(orgId)) return true;

            const currentName = current.target_name || current.partner_name || `#${currentTarget}`;
            return await new Promise(resolve => {
                openSheet(`
                    <div class="sheet-title">Перемкнути запит?</div>
                    <div class="sheet-sub">Ви вже запросились до "${escapeHtml(String(currentName))}".<br>Перейти до іншого екіпажу?<br><br>Попередній запит буде скасовано.</div>
                    <div class="sheet-actions">
                        <button class="btn btn-primary" id="confirm-request-switch-yes">✓ Так, перемкнути</button>
                        <button class="btn btn-ghost" id="confirm-request-switch-no">Скасувати</button>
                    </div>
                `);
                document.getElementById('confirm-request-switch-yes').onclick = () => { closeSheet(); resolve(true); };
                document.getElementById('confirm-request-switch-no').onclick = () => { closeSheet(); resolve(false); };
            });
        }

        function getMatchPartnerId(m) {
            const raw = m?.scope === 'incoming'
                ? (m.partner_id ?? m.sender_id ?? m.user_id ?? m.target_id)
                : (m.target_id ?? m.partner_id ?? m.sender_id ?? m.user_id);
            const id = parseInt(raw, 10);
            return Number.isFinite(id) ? id : 0;
        }

        function removePendingMatchByPair(partnerId, dirId) {
            const safePartnerId = parseInt(partnerId, 10) || 0;
            const safeDirId = parseInt(dirId, 10) || 0;
            if (!safePartnerId || !safeDirId) return;
            S.pendingMatches = (S.pendingMatches || []).filter(m => {
                const matchPartnerId = getMatchPartnerId(m);
                const matchDirId = parseInt(m?.direction_id, 10) || 0;
                return !(matchPartnerId === safePartnerId && matchDirId === safeDirId);
            });
        }

        function matchKey(m) {
            const ts = Number(m?.created_at || 0);
            const stamp = Number.isFinite(ts) ? Math.round(ts * 1000) : 0;
            return `${m?.scope || 'incoming'}:${getMatchPartnerId(m)}:${parseInt(m?.direction_id, 10) || 0}:${stamp}`;
        }

        function isSheetOpen() {
            return document.getElementById('sheet')?.classList.contains('open');
        }

        function maybeOpenMatchSheet() {
            if (S.matchSheetOpen || S.activeTrip || S.roleGateOpen || isAppInBackground) return;
            const match = (S.pendingMatches || []).find(m => m?.scope === 'incoming' && !S.seenMatchIds.has(matchKey(m)));
            if (!match) return;
            if (isSheetOpen() || S.currentScreen !== 'trips') {
                notifyPendingMatch(match);
                return;
            }
            openMatchSheet(match);
        }

        function notifyPendingMatch(match) {
            const key = matchKey(match);
            if (!S.notifiedMatchIds.has(key)) {
                S.notifiedMatchIds.add(key);
                showToast('📩 Новий запит. Відкрийте Поїздки', '');
            }
            updateBadges();
            renderSubBar();
        }

        function openMatchSheet(match) {
            const partnerId = getMatchPartnerId(match);
            const dirId = parseInt(match?.direction_id, 10) || 0;
            if (!partnerId || !dirId) return;
            const key = matchKey(match);
            S.seenMatchIds.add(key);
            S.matchSheetOpen = true;
            S.activeMatchKey = key;

            const isDriver = _isDriverRole(S.userRole);
            const partnerName = match.partner_name || match.sender_name || match.target_name || `#${partnerId}`;
            const direction = match.direction || match.direction_title || 'Напрямок';
            const title = isDriver ? 'Хтось хоче до екіпажу' : 'Водій знайдений';
            const subtitle = isDriver
                ? `${escapeHtml(partnerName)} хоче приєднатися до вашого екіпажу.`
                : `${escapeHtml(partnerName)} запрошує вас у поїздку.`;
            const acceptText = isDriver ? '✅ Взяти в екіпаж' : '✅ Прийняти запрошення';
            const declineText = isDriver ? '❌ Пропустити' : '❌ Цей варіант не підходить';

            openSheet(`
                <div class="sheet-title">${title}</div>
                <div class="sheet-sub">${subtitle}</div>
                <div style="display:flex;align-items:center;gap:12px;margin:16px 0;padding:12px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.04);">
                    ${renderAvatarInline(partnerName, match.partner_photo_url || match.sender_photo_url || match.target_photo_url || '', 44)}
                    <div style="flex:1;min-width:0;">
                        <div style="font-weight:800;font-size:15px;">${escapeHtml(partnerName)}</div>
                        <div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">🎯 ${escapeHtml(direction)}</div>
                    </div>
                </div>
                <div class="sheet-actions">
                    <button class="btn btn-primary" onclick="respondFromMatchSheet(${partnerId}, ${dirId}, true)">${acceptText}</button>
                    <button class="btn btn-danger" onclick="respondFromMatchSheet(${partnerId}, ${dirId}, false)">${declineText}</button>
                    <button class="btn btn-secondary" onclick="stopSearchFromMatchSheet(${partnerId}, ${dirId})">⏹️ Зупинити пошук</button>
                </div>
            `);
        }

        async function respondFromMatchSheet(partnerId, dirId, accept) {
            const ok = await respondHandshake(partnerId, dirId, accept);
            if (ok) closeSheet();
        }

        async function stopSearchFromMatchSheet(partnerId, dirId) {
            const ok = await stopSearchFromHandshake(partnerId, dirId);
            if (ok) closeSheet();
        }

        async function requestJoin(orgId, dirId, opts = {}) {
            if (!requireRoleForAction('запроситись до екіпажу', () => requestJoin(orgId, dirId, opts))) return;
            if (_isDriverRole(S.userRole)) { showToast('Запроситись може тільки попутник', 'error'); return; }
            const confirmed = await confirmOutgoingSwitchIfNeeded(orgId, dirId);
            if (!confirmed) return;
            if (!beginOp('request_join')) return;
            try {
                const res = await api('/api/v3/match/invite', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: S.userId, target_id: orgId, direction_id: dirId, replace_existing: true })
                });
                if (res?.status === 'ok') {
                    if (res.mutual) { showToast('✓ Ваш екіпаж готовий!', 'success'); }
                    else if (Array.isArray(res.switched_from) && res.switched_from.length) { showToast('↪ Запит перемкнено', 'success'); }
                    else { showToast('⏳ Запит надіслано', 'success'); }
                    persistCriticalState();
                    await hydrate();
                    closeSheet();
                    switchScreen('trips');
                } else {
                    showToast(getErrorMessage(res, 'Не вдалось надіслати запит'), 'error');
                }
            } catch (e) {
                showToast('Немає з\'єднання — спробуйте ще раз', 'error');
            } finally { endOp('request_join'); }
        }

        // ─── NEWS ───
        function classifyNewsItem(n) {
            const explicit = String(n?.category || n?.root_category || n?.category_key || '').toLowerCase();
            if (['theocracy', 'leisure', 'work'].includes(explicit)) return explicit;
            const txt = `${n?.root_title || ''} ${n?.direction_title || ''} ${n?.dir_title || ''} ${n?.text || ''}`.toLowerCase();
            if (txt.includes('теократ')) return 'theocracy';
            if (txt.includes('відпоч') || txt.includes('відпуст') || txt.includes('подорож') || txt.includes('релакс') || txt.includes('тур') || txt.includes('travel') || txt.includes('vacation')) return 'leisure';
            if (txt.includes('робот') || txt.includes('навчан') || txt.includes('work') || txt.includes('study') || txt.includes('career')) return 'work';
            return 'other';
        }

        function isDiscoveryNewsItem(n) {
            if (!n || n?.is_active === false) return false;
            return String(n?.kind || '').toLowerCase() !== 'trip_done';
        }

        function formatNewsTime(ts) {
            if (!ts) return '—';
            try { return new Date(Number(ts) * 1000).toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); }
            catch (_) { return '—'; }
        }

        function formatIdeaDate(value) {
            if (!value) return '';
            const raw = String(value);
            const dt = new Date(raw);
            if (Number.isNaN(dt.getTime())) return raw.replace('T', ' ');
            return dt.toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function dateTimeLocalValue(value) {
            return String(value || '').trim().slice(0, 16);
        }

        function buildDirectionInviteText(dir) {
            const title = String(dir?.title || dir?.name || 'Ідея WayTandem').trim();
            const meeting = String(dir?.meeting_point || '').trim();
            const startAt = String(dir?.start_date || '').trim();
            const endAt = String(dir?.end_date || '').trim();
            const desc = String(dir?.description || '').trim();
            const drivers = Number(dir?.drivers || dir?.drivers_count || 0);
            const passengers = Number(dir?.passengers || dir?.passengers_count || 0);
            const whenText = startAt && endAt ? `${formatIdeaDate(startAt)} — ${formatIdeaDate(endAt)}` : (formatIdeaDate(startAt) || formatIdeaDate(endAt));
            const lines = [
                '🌿 Запрошення до ідеї WayTandem',
                '',
                `📍 ${title}`,
                meeting ? `📌 Місце: ${meeting}` : '',
                whenText ? `🗓 Коли: ${whenText}` : '',
                `👥 Водії: ${drivers} · Попутники: ${passengers}`,
                desc ? '' : '',
                desc ? desc.slice(0, 700) : '',
                '',
                'Приєднуйся як водій або попутник.'
            ].filter(line => line !== '');
            return lines.join('\n');
        }

        async function saveBotUsernameAndShare(dirId) {

        function buildDirectionInviteLink(botUsername, dirId) {
            const safeDirId = parseInt(dirId) || 0;
            const miniAppShortName = sanitizeMiniAppShortName(S.miniAppShortName || '');
            if (miniAppShortName) {
                return `https://t.me/${botUsername}/${miniAppShortName}?startapp=dir_${safeDirId}`;
            }
            return `https://t.me/${botUsername}?start=dir_${safeDirId}`;
        }

        async function shareDirectionInvite(dirId) {
            const safeDirId = parseInt(dirId) || 0;
            if (!safeDirId) { showToast('Ідею не знайдено', 'error'); return; }
            const botUsername = await ensureBotUsernameForShare(safeDirId);
            if (!botUsername) return;
            const data = S.apiBase
                ? await api(`/api/v3/fractal/organizers?direction_id=${safeDirId}&lang=${S.lang}&user_id=${S.userId || ''}`, { silent: true })
                : null;
            const localDir = (S.myDirections || []).find(d => String(d.id) === String(safeDirId))
                || allDirections.find(d => String(d.id) === String(safeDirId))
                || {};
            const dir = { ...localDir, ...(data?.direction || {}) };
            const inviteLink = buildDirectionInviteLink(botUsername, safeDirId);
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=${encodeURIComponent(buildDirectionInviteText(dir))}`;
            const tg = window.Telegram?.WebApp;
            if (tg?.openTelegramLink) tg.openTelegramLink(shareUrl);
            else window.open(shareUrl, '_blank', 'noopener');

            const badge = document.getElementById('nav-news-badge');

        function renderNewsStrip() {
            const strip = document.getElementById('news-strip');
            if (!strip) return;
            const items = Array.isArray(S.news) ? S.news.filter(isDiscoveryNewsItem) : [];
            const buckets = { theocracy: 0, leisure: 0, work: 0 };
            items.forEach(n => {
                if (n?.lat == null || n?.lng == null) return;
                const k = classifyNewsItem(n);
                if (k in buckets) buckets[k] += 1;
            });
            const cards = [
                { key: 'theocracy', title: 'Теократія', color: '#a78bfa', count: buckets.theocracy },
                { key: 'leisure', title: 'Відпочинок', color: '#34d399', count: buckets.leisure },
                { key: 'work', title: 'Робота', color: '#38bdf8', count: buckets.work },
            ];
            strip.style.display = 'grid';
            strip.style.gridTemplateColumns = 'repeat(3, minmax(0, 1fr))';
            strip.innerHTML = cards.map(c => {
                const active = S.mapNewsFilter === c.key;
                const nextFilter = active ? 'all' : c.key;
                return `<div class="news-banner ${active ? 'active' : ''}" onclick="setMapNewsFilter('${nextFilter}')" style="background:${active ? c.color + '22' : 'var(--bg-card)'};border-color:${active ? c.color : 'var(--border)'};">
                    <div class="news-banner-title">${c.title}</div>
                    <div class="news-banner-count">${c.count}</div>
                </div>`;
            }).join('');
        }

            S.mapNewsFilter = filter || 'all';
            renderNewsStrip();
            if (S.currentScreen === 'explore') await refreshMap();
        }

        async function openNewsDirection(dirId) {
            if (!dirId) return;
            // Find the news item to get parent_id
            const newsItem = S.news.find(n => Number(n.direction_id) === Number(dirId));
            const parentId = newsItem?.parent_id;

            // Navigate to board screen first
            switchScreen('board');

            // If news has parent folder, navigate through the tree hierarchy
            if (parentId) {
                // Build path from root to parent by walking up the tree
                const path = [];
                let currentId = parentId;
                const maxDepth = 20; // safety limit
                let depth = 0;
                while (currentId && depth < maxDepth) {
                    const dir = allDirections.find(d => String(d.id) === String(currentId));
                    if (!dir) break;
                    path.unshift({ id: dir.id, title: dir.title || `#${dir.id}` });
                    currentId = dir.parent_id;
                    depth++;
                }
                // Now navigate through the path
                S.boardStack = [];
                S.boardParentId = null;
                for (const folder of path) {
                    S.boardStack.push(folder);
                    S.boardParentId = folder.id;
                }
                // Render the board at the parent folder level, then open the direction
                await renderBoard();
                setTimeout(() => openDirection(dirId), 200);
            } else {
                // No parent — just open the direction detail
                setTimeout(() => openDirection(dirId), 150);
            }
        }

        function renderNewsScreen() {
            const banners = document.getElementById('news-banners');
            const feed = document.getElementById('news-feed');
            if (!banners || !feed) return;
            const allItems = Array.isArray(S.news) ? S.news.filter(isDiscoveryNewsItem) : [];
            const buckets = { theocracy: 0, leisure: 0, work: 0 };
            allItems.forEach(n => { const k = classifyNewsItem(n); if (k in buckets) buckets[k]++; });
            const cards = [
                { key: 'theocracy', title: 'Теократія', color: '#a78bfa', count: buckets.theocracy || 0 },
                { key: 'leisure', title: 'Відпочинок', color: '#34d399', count: buckets.leisure || 0 },
                { key: 'work', title: 'Робота', color: '#38bdf8', count: buckets.work || 0 },
            ];
            banners.innerHTML = cards.map(c => {
                const active = S.newsFilter === c.key;
                return `<div class="news-banner ${active ? 'active' : ''}" onclick="setNewsFilter('${active ? 'all' : c.key}')" style="background:${active ? c.color + '22' : 'var(--bg-card)'};border-color:${active ? c.color : 'var(--border)'};">
                    <div class="news-banner-title">${c.title}</div>
                    <div class="news-banner-count">${c.count}</div>
                </div>`;
            }).join('');
            const items = S.newsFilter === 'all' ? allItems : allItems.filter(n => classifyNewsItem(n) === S.newsFilter);
            if (!items.length) {
                feed.innerHTML = '<div class="empty"><div class="empty-icon">🗞️</div><div class="empty-title">Поки тихо</div><div class="empty-sub">Нові події з\'являться незабаром</div ></div > ';
                return;
            }
            feed.innerHTML = items.slice(0, 60).map(n => {
                const dId = Number(n?.direction_id || 0);
                const clickHandler = dId > 0 ? `onclick="openNewsDirection(${dId})"` : '';
                const cursorStyle = dId > 0 ? 'cursor:pointer;' : '';
                return `
                <div class="news-feed-item" ${clickHandler} style="${cursorStyle}">
                    <div style="font-size:13px;font-weight:700;line-height:1.45;">${escapeHtml(n.text || 'Новина')}</div>
                    <div class="news-feed-meta">${escapeHtml(n.dir_title || 'Без напряму')} • ${formatNewsTime(n.created_at)}</div>
                </div>
            `}).join('');
        }

        function renderNews() {
            if (!S.apiBase) { S.news = []; renderNewsStrip(); renderNewsScreen(); updateNewsBadge(); return; }
            api('/api/v3/home/feed?limit=60&lang=' + encodeURIComponent(S.lang || 'uk')).then(data => {
                S.news = (data?.news || []).filter(isDiscoveryNewsItem);
                renderNewsStrip(); renderNewsScreen(); updateNewsBadge();
                if (S.currentScreen === 'explore') refreshMap();
            });
        }

        // ─── BOARD ───
        let allDirections = [];

        function isFolderNode(d) {
            if (!d || typeof d !== 'object') return false;
            const kind = String(d.kind || '').toLowerCase();
            return !!d.is_folder || !!d.has_kids || kind === 'folder' || kind === 'topic' || kind === 'category';
        }

        function safeCount(value) {
            const n = Number(value);
            return Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
        }

        function pluralUk(n, one, few, many) {
            const mod10 = n % 10;
            const mod100 = n % 100;
            if (mod10 === 1 && mod100 !== 11) return one;
            if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
            return many;
        }

        function buildDirectionCardStats(d) {
            const drivers = safeCount(d?.drivers ?? d?.drivers_count);
            const passengers = safeCount(d?.passengers ?? d?.passengers_count);
            const freeSeats = safeCount(d?.free_seats ?? d?.seats_free ?? d?.available_seats);
            const role = normalizeRole(S.userRole || 'client');
            if (isFolderNode(d)) {
                const total = drivers + passengers;
                return { primary: `${total} учасників нижче`, secondary: 'Відкрити розділ каталогу' };
            }
            if (_isDriverRole(role)) {
                return {
                    primary: `👤 ${passengers} ${pluralUk(passengers, 'попутник чекає', 'попутники чекають', 'попутників чекають')}`,
                    secondary: `🚗 ${drivers} ${pluralUk(drivers, 'водій уже відкрив місця', 'водії вже відкрили місця', 'водіїв вже відкрили місця')}`
                };
            }
            if (_isPassengerRole(role)) {
                const seatText = freeSeats > 0
                    ? ` • 💺 ${freeSeats} ${pluralUk(freeSeats, 'вільне місце', 'вільні місця', 'вільних місць')}`
                    : '';
                return {
                    primary: `🚗 ${drivers} ${pluralUk(drivers, 'водій з місцями', 'водії з місцями', 'водіїв з місцями')}${seatText}`,
                    secondary: `👤 ${passengers} ${pluralUk(passengers, 'попутник у черзі', 'попутники у черзі', 'попутників у черзі')}`
                };
            }
            return {
                primary: `🚗 ${drivers} ${pluralUk(drivers, 'водій', 'водії', 'водіїв')} • 👤 ${passengers} ${pluralUk(passengers, 'попутник', 'попутники', 'попутників')}`,
                secondary: 'Оберіть роль перед дією'
            };
        }

        function renderBoardBreadcrumb() {
            const el = document.getElementById('board-breadcrumb');
            if (!el) return;
            if (!S.boardStack.length) { el.innerHTML = ''; updateBottomNavForBoardDepth(); return; }
            const path = S.boardStack.map(x => x?.title || `#${x?.id || '?'}`);
            el.innerHTML = `<div class="board-crumb-path" onclick="boardGoRoot()" title="До кореня">${path.map(p => escapeHtml(String(p))).join(' / ')}</div>`;
            updateBottomNavForBoardDepth();
        }

        async function boardGoRoot() {
            S.boardStack = []; S.boardParentId = null;
            const search = document.getElementById('board-search');
            if (search) search.value = '';
            await renderBoard();
        }

        async function boardGoUp() {
            if (!S.boardStack.length) return;
            S.boardStack.pop();
            S.boardParentId = S.boardStack.length ? S.boardStack[S.boardStack.length - 1].id : null;
            const search = document.getElementById('board-search');
            if (search) search.value = '';
            await renderBoard();
        }

        async function boardOpenFolder(dirId) {
            const dir = allDirections.find(d => String(d.id) === String(dirId));
            if (!dir || !isFolderNode(dir)) return;
            S.boardParentId = dir.id;
            S.boardStack.push({ id: dir.id, title: dir.title || `#${dir.id}` });
            const search = document.getElementById('board-search');
            if (search) search.value = '';
            await renderBoard();
        }

        async function renderBoard() {
            const list = document.getElementById('board-list');
            list.innerHTML = '<div class="skeleton" style="height:60px;margin:12px 16px;"></div>'.repeat(3);
            if (!S.apiBase) {
                renderBoardBreadcrumb();
                list.innerHTML = '<div class="empty"><div class="empty-icon">🧭</div><div class="empty-title">Підключіть API</div><div class="empty-sub">Вкажіть адресу сервера в налаштуваннях</div></div>';
                return;
            }
            renderBoardBreadcrumb();
            const qp = new URLSearchParams({ lang: S.lang });
            if (S.userId) qp.set('user_id', String(S.userId));
            if (S.boardParentId !== null && S.boardParentId !== undefined) qp.set('parent_id', String(S.boardParentId));
            const [data, subs] = await Promise.all([
                api(`/api/v3/board?${qp.toString()}`),
                S.userId ? api(`/api/v3/user/subscriptions?user_id=${S.userId}`) : Promise.resolve(null),
            ]);
            allDirections = Array.isArray(data) ? data : (data?.directions || []);
            const subSet = new Set(((subs?.subscriptions) || []).map(s => String(s.direction_id)));
            S.boardSubSet = subSet;
            renderBoardList(allDirections, S.boardSubSet);
        }

        function renderBoardList(dirs, subSet) {
            const list = document.getElementById('board-list');
            const createAction = renderBoardIdeaAction(dirs);
            if (!dirs.length) {
                list.innerHTML = `${createAction}<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Немає напрямків</div></div>`;
                return;
            }
            list.innerHTML = createAction + dirs.map(d => {
                const id = String(d.id);
                const isFolder = isFolderNode(d);
                const isSub = !isFolder && subSet?.has(id);
                const stats = buildDirectionCardStats(d);
                const sigil = isFolder
                    ? `<svg viewBox="0 0 24 24"><path d="M12 3l7 4.5v9L12 21l-7-4.5v-9L12 3z"></path><path d="M12 7v10"></path><path d="M8 12h8"></path></svg>`
                    : `<svg viewBox="0 0 24 24"><path d="M12 3l8 9-8 9-8-9 8-9z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>`;
                const click = isFolder ? `boardOpenFolder(${d.id})` : `openDirection(${d.id})`;
                return `<div class="dir-card ${isSub ? 'subscribed' : ''}" onclick="${click}">
                    <div class="dir-card-icon" style="background:${isSub ? 'var(--green-dim)' : 'rgba(255,255,255,0.04)'};color:${isSub ? 'var(--green)' : (isFolder ? 'var(--text-secondary)' : 'var(--accent)')};">${sigil}</div>
                    <div class="dir-card-info">
                        <div class="dir-card-name">${escapeHtml(d.title || 'Напрямок')}</div>
                        <div class="dir-card-stats"><span class="dir-card-total">${escapeHtml(stats.primary)}</span><span class="dir-card-context">${escapeHtml(stats.secondary)}</span></div>
                    </div>
                    <div class="dir-card-arrow">›</div>
                </div>`;
            }).join('');
        }

        function renderBoardIdeaAction(dirs = []) {
            if (!S.boardStack.length || S.boardParentId === null || S.boardParentId === undefined) return '';
            const search = document.getElementById('board-search');
            if (search?.value?.trim()) return '';
            const hasSubfolders = (dirs || []).some(d => isFolderNode(d));
            if (hasSubfolders) return '';
            return `<div class="board-folder-action">
                <button class="btn btn-primary" onclick="openCreateDirection()" title="Запропонувати ідею у поточному каталозі">+ Запропонувати ідею тут</button>
            </div>`;
        }

        function renderQueuePulse(label) {
            return `<div style="margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;">
                <span style="font-size:12px;color:var(--text-secondary);font-weight:700;">${escapeHtml(label)}</span>
                <span class="pulse-dot"></span><span class="pulse-dot" style="animation-delay:.18s;"></span><span class="pulse-dot" style="animation-delay:.36s;"></span>
            </div>`;
        }

        function activeSubscriptionForRadar() {
            return (S.subscriptions || [])[0] || null;
        }

        function directionIdForRadar(sub) {
            const raw = sub?.direction_id ?? sub?.id ?? 0;
            const dirId = Number(raw);
            return Number.isFinite(dirId) && dirId > 0 ? dirId : 0;
        }

        function openCrewCountForRadar(dirId) {
            if (!dirId) return 0;
            return (S.mapCrews || []).filter(c =>
                String(c?.direction_id || '') === String(dirId) &&
                String(c?.organizer_id || '') !== String(S.userId || '') &&
                c?.lat != null &&
                c?.lng != null &&
                Number.isFinite(Number(c?.lat)) &&
                Number.isFinite(Number(c?.lng))
            ).length;
        }

        function formatRadarSyncAge(ts) {
            if (!ts) return 'синхронізація очікується';
            const sec = Math.max(0, Math.round((Date.now() - ts) / 1000));
            if (sec < 10) return 'оновлено щойно';
            if (sec < 60) return `оновлено ${sec} сек тому`;
            return `оновлено ${Math.floor(sec / 60)} хв тому`;
        }

        function renderQueueRadarPanel(isDriver) {
            const sub = activeSubscriptionForRadar();
            if (!sub) return '';
            const dirId = directionIdForRadar(sub);
            const title = escapeHtml(sub.title || sub.direction_title || (dirId ? `#${dirId}` : 'Напрямок'));
            const openCrews = openCrewCountForRadar(dirId);
            const mapText = S.lastMapSyncAt ? `${openCrews} ${openCrews === 1 ? 'водій' : 'водіїв'} на карті` : 'карта синхронізується';
            const primaryLine = isDriver
                ? (S.myCrew ? 'Екіпаж відкрито. Попутники можуть постукати до вас.' : 'Відкрийте місця, щоб попутники побачили ваш екіпаж.')
                : (openCrews > 0 ? 'Є відкриті екіпажі на цьому напрямку.' : 'Поки немає відкритих водіїв, але ваша підписка активна.');
            const pollSec = Math.round(POLL_INTERVAL_MS / 1000);
            const stopButton = dirId
                ? `<button class="btn btn-ghost" style="margin-top:8px;width:100%;" onclick="unsubscribeDir(${dirId})">⏹️ Зупинити пошук</button>`
                : '';
            return `
                <div style="margin:16px auto 0;max-width:360px;text-align:left;padding:14px;border:1px solid rgba(56,189,248,0.22);border-radius:12px;background:rgba(56,189,248,0.07);">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;">
                        <div style="font-size:12px;font-weight:800;color:var(--accent);letter-spacing:0;">📡 Радар активний</div>
                        <div style="font-size:11px;color:var(--text-muted);">${escapeHtml(formatRadarSyncAge(S.lastHydrateAt || S.lastMapSyncAt))}</div>
                    </div>
                    <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:6px;">✅ Підписка активна · ${title}</div>
                    <div style="font-size:12px;color:var(--text-secondary);line-height:1.45;">${escapeHtml(primaryLine)}</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
                        <div style="padding:9px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);">
                            <div style="font-size:11px;color:var(--text-muted);">Сервер</div>
                            <div style="font-size:12px;font-weight:700;color:var(--text-primary);">бачить вас</div>
                        </div>
                        <div style="padding:9px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);">
                            <div style="font-size:11px;color:var(--text-muted);">Карта</div>
                            <div style="font-size:12px;font-weight:700;color:var(--text-primary);">${escapeHtml(mapText)}</div>
                        </div>
                    </div>
                    <div style="margin-top:10px;font-size:11px;color:var(--text-muted);">Синхронізація активна · polling ${pollSec} сек · без таймера підбору</div>
                    ${!isDriver ? `<button class="btn btn-secondary" style="margin-top:12px;width:100%;" onclick="switchScreen('explore')">🗺️ Переглянути водіїв на карті</button>` : ''}
                    ${stopButton}
                </div>`;
        }

        function filterBoard(query) {
            clearTimeout(searchTimer);
            const q = sanitizeSearchInput(query).trim();
            if (!q) {
                // Clear search, reload current level
                renderBoard();
                return;
            }
            // First, filter locally (current level)
            const localResults = allDirections.filter(d => (d.title || '').toLowerCase().includes(q.toLowerCase()));
            if (localResults.length > 0) {
                renderBoardList(localResults, S.boardSubSet);
                const el = document.getElementById('board-breadcrumb');
                if (el) {
                    el.innerHTML = `<div class="board-crumb-path" style="color:var(--accent);">🔍 ${localResults.length} результат${localResults.length !== 1 ? 'ів' : ''} (поточний рівень)</div>`;
                }
                return;
            }
            // No local results, perform deep search (debounced)
            searchTimer = setTimeout(async () => {
                // Show loading indicator
                const el = document.getElementById('board-breadcrumb');
                if (el) {
                    el.innerHTML = `<div class="board-crumb-path" style="color:var(--accent);">🔍 Шукаю по всій дошці...</div>`;
                }
                const qp = new URLSearchParams({ lang: S.lang, q });
                if (S.userId) qp.set('user_id', String(S.userId));
                const data = await api(`/api/v3/board?${qp.toString()}`);
                const searchResults = Array.isArray(data) ? data : (data?.directions || []);
                renderBoardList(searchResults, S.boardSubSet);
                if (el) {
                    el.innerHTML = `<div class="board-crumb-path" style="color:var(--accent);">🔍 ${searchResults.length} результат${searchResults.length !== 1 ? 'ів' : ''} (вся дошка)</div>`;
                }
            }, 300);
        }

        // ─── OPEN DIRECTION — full version ───
        async function openDirection(dirId) {
            const data = await api(`/api/v3/fractal/organizers?direction_id=${dirId}&lang=${S.lang}&user_id=${S.userId || ''}`);
            let dir = allDirections.find(d => String(d.id) === String(dirId));
            if (!dir && data?.direction && typeof data.direction === 'object') {
                dir = {
                    id: data.direction.id ?? dirId,
                    title: data.direction.title || data.direction.name || 'Напрямок',
                    drivers: Number(data.direction.drivers || data.direction.drivers_count || 0),
                    passengers: Number(data.direction.passengers || data.direction.passengers_count || 0),
                    is_folder: !!data.direction.is_folder,
                    has_kids: !!data.direction.has_kids,
                    kind: data.direction.kind || '',
                };
            }
            if (!dir) { showToast('Напрямок недоступний', 'error'); return; }
            if (isFolderNode(dir)) { await boardOpenFolder(dirId); return; }
            const orgs = data?.organizers || [];
            const isSub = data?.user_status?.subscribed;
            const creatorId = data?.direction?.creator_id || data?.direction?.user_id;
            const isMyDir = creatorId && String(creatorId) === String(S.userId);
            const availOrgs = orgs.filter(o => String(o.user_id) !== String(S.userId) && (o.seats_free > 0 || o.role !== 'driver'));
            const hasPickup = !!S.pickupCoords;
            const directionStats = buildDirectionCardStats(dir);
            const dirMeta = data?.direction || dir || {};
            const meetingPoint = dirMeta.meeting_point || dir.meeting_point || '';
            const desc = dirMeta.description || dir.description || '';
            const startAt = dirMeta.start_date || dir.start_date || '';
            const endAt = dirMeta.end_date || dir.end_date || '';
            const whenText = startAt && endAt ? `${formatIdeaDate(startAt)} — ${formatIdeaDate(endAt)}` : (formatIdeaDate(startAt) || formatIdeaDate(endAt));
            const detailRows = [
                meetingPoint ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.4;">📍 ${escapeHtml(meetingPoint)}</div>` : '',
                whenText ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.4;">🗓 ${escapeHtml(whenText)}</div>` : '',
                desc ? `<div style="font-size:12px;color:var(--text-secondary);line-height:1.45;margin-top:6px;white-space:pre-wrap;">${escapeHtml(desc)}</div>` : ''
            ].filter(Boolean).join('');

            openSheet(`
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
                    <div style="font-size:28px;">🧭</div>
                    <div style="flex:1;">
                        <div class="sheet-title" style="margin-bottom:0;">${escapeHtml(dir.title || 'Напрямок')}</div>
                        <div style="font-size:12px;color:var(--text-secondary);font-weight:600;">${escapeHtml(directionStats.primary)}<br><span style="color:var(--text-muted);">${escapeHtml(directionStats.secondary)}</span></div>
                    </div>
                    ${isMyDir ? `<div style="display:flex;gap:6px;flex-shrink:0;"><button onclick="shareDirectionInvite(${parseInt(dirId) || 0})" style="padding:6px 10px;border-radius:8px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.28);color:var(--blue);font-size:14px;cursor:pointer;" title="Запросити учасників">📨</button><button data-dir-id="${parseInt(dirId) || 0}" data-dir-title="${escapeAttr(String(dir.title || ''))}" onclick="openEditDirectionFromButton(this)" style="padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text-secondary);font-size:14px;cursor:pointer;" title="Редагувати">✏️</button></div>` : ''}
                </div>
                ${detailRows ? `<div style="margin:10px 0 12px;padding:10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);">${detailRows}</div>` : ''}
                <div style="display:flex;gap:8px;margin:12px 0 8px;">
                    ${isSub
                    ? `<button class="btn btn-danger" style="flex:1;" onclick="unsubscribeDir(${dirId})">🚫 Відписатись</button>`
                    : `<button class="btn btn-primary" style="flex:1;" onclick="subscribeAndPickup(${dirId})">Шукати місце / партнера</button>`}
                    <button class="btn btn-secondary" onclick="closeSheet()">Закрити</button>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);line-height:1.45;margin:-2px 0 10px;">${isSub ? 'Ви ще не в поїздці. Очікуйте запит або запросіться до водія.' : 'Напрямок може створити водій або попутник. Після підписки ви дієте за своєю роллю.'}</div>
                ${isSub ? `<button class="btn btn-secondary" style="width:100%;margin-bottom:8px;font-size:12px;" onclick="pickPickupLocation(${dirId})">${hasPickup ? '📍 Моя точка посадки ✓' : '📍 Додати точку посадки'}</button>` : ''}
                ${availOrgs.length > 1 ? `<button class="btn btn-secondary" style="width:100%;margin-bottom:8px;font-size:12px;color:var(--blue);" onclick="groupJoinDirection(${dirId}, [${availOrgs.map(o => o.user_id).join(',')}])">🔀 Запроситись до доступного екіпажу (${availOrgs.length})</button>` : ''}
                ${orgs.length ? `
                    <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text-muted);letter-spacing:1px;margin:8px 0 4px;">Водії та екіпажі</div>
                    ${orgs.slice(0, 6).map(o => `
                        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
                            ${renderAvatarInline(o.name || 'Водій', o.photo_url || '', 36)}
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:700;font-size:13px;">${escapeHtml(o.name || 'Водій')}</div>
                                <div style="font-size:11px;color:var(--text-secondary);">${normalizeRole(o.role || 'driver') === 'driver' ? '🚗 Водій' : '👤 Попутник'}${o.seats_free > 0 ? ' • <span style="color:var(--accent);">' + o.seats_free + ' місць</span>' : ''}</div>
                            </div>
                            ${String(o.user_id) !== String(S.userId)
                            ? (S.userRole !== 'driver' && normalizeRole(o.role || 'driver') === 'driver'
                            ? `<button class="btn btn-primary" style="padding:6px 10px;font-size:12px;min-height:36px;" onclick="requestJoin(${o.user_id}, ${dirId}, { closeSheetOnSuccess: true })">Запроситись</button>`
                            : '')
                            : '<span class="tag tag-green">Ви</span>'}
                        </div>`).join('')}`
                    : '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">Поки немає відкритих екіпажів. Можете стати в чергу.</div>'}
            `);
        }

        async function subscribeDir(dirId) {
            if (!requireRoleForAction('стати в чергу', () => subscribeDir(dirId))) return false;
            const dir = allDirections.find(d => String(d.id) === String(dirId));
            if (isFolderNode(dir)) { showToast('Оберіть конкретний напрямок, не каталог', 'error'); return; }

            // Check if user is already subscribed to a different direction
            const currentSubs = S.subscriptions || [];
            const otherSub = currentSubs.find(s => String(s.direction_id) !== String(dirId));
            if (otherSub) {
                const oldTitle = otherSub.title || otherSub.direction_title || `#${otherSub.direction_id}`;
                const newTitle = dir?.title || `#${dirId}`;
                const confirmed = await new Promise(resolve => {
                    openSheet(`
                        <div class="sheet-title">Перемкнути чергу?</div>
                        <div class="sheet-sub">Ви вже в черзі на "${escapeHtml(oldTitle)}".<br>Перейти на "${escapeHtml(newTitle)}"?<br><br>Попередня черга буде скасована.</div>
                        <div class="sheet-actions">
                            <button class="btn btn-primary" id="confirm-switch-yes">✓ Так, перемкнути</button>
                            <button class="btn btn-ghost" id="confirm-switch-no">Скасувати</button>
                        </div>
                    `);
                    document.getElementById('confirm-switch-yes').onclick = () => { closeSheet(); resolve(true); };
                    document.getElementById('confirm-switch-no').onclick = () => { closeSheet(); resolve(false); };
                });
                if (!confirmed) return false;
            }

            const resp = await apiWithStatus('/api/v3/board/subscribe', {
                method: 'POST',
                body: JSON.stringify({ user_id: S.userId, direction_id: dirId, role: S.userRole })
            });
            const status = String(resp?.data?.status || '');
            if (!resp.ok || (status !== 'ok' && status !== 'already_subscribed')) {
                showToast(resp?.data?.detail || 'Не вдалося стати в чергу', 'error');
                return false;
            }

            // Show notification if direction was switched
            const switchedFrom = resp?.data?.switched_from;
            if (switchedFrom) {
                showToast('↩️ Чергу перемкнено на новий напрямок', 'success');
            }

            await hydrate();
            closeSheet();
            if (S.pendingMatches.length > 0) {
                switchScreen('trips');
                showToast('🔔 Є збіг інтересів! Перевірте вкладку Поїздки', 'success');
            } else {
                showToast(status === 'already_subscribed' ? 'Ви вже в черзі' : '✓ Ви в черзі. Поїздку ще не підтверджено.', 'success');
                // Re-hydrate after delay to catch handshakes created by async matching task
                setTimeout(async () => {
                    await hydrate();
                    if (S.pendingMatches.length > 0 && !S.activeTrip) {
                        switchScreen('trips');
                        showToast('🔔 Є збіг інтересів!', 'success');
                    } else {
                        // No match yet — show lifecycle feedback
                        switchScreen('trips');
                    }
                }, 1500);
            }
            return true;
        }

        async function unsubscribeDir(dirId) {
            const dir = allDirections.find(d => String(d.id) === String(dirId));
            if (isFolderNode(dir)) { showToast('Це каталог, оберіть напрямок', 'error'); return; }
            const resp = await apiWithStatus('/api/v3/board/unsubscribe', {
                method: 'POST',
                body: JSON.stringify({ user_id: S.userId, direction_id: dirId })
            });
            if (!resp.ok) {
                showToast(resp?.data?.detail || 'Не вдалося відписатись', 'error');
                return false;
            }
            await hydrate();
            showToast('Відписано');
            closeSheet();
            return true;
        }

        // ─── TRIPS ───
        async function renderTrips() {
            const container = document.getElementById('trips-content');
            if (!S.activeTrip) stopLocationTracking(true);

            // Rating gate: if partner already finished and we have a cached trip
            if (!S.activeTrip && !S.pendingMatches.length && lastKnownTripForRating && !waitingForPartner) {
                const ratingContext = buildRatingContext(lastKnownTripForRating);
                if (ratingContext) {
                    openRatingSheet(ratingContext);
                    lastKnownTripForRating = null;
                    try { localStorage.removeItem(_stateKey('ltr')); } catch (_) { }
                    container.innerHTML = '<div class="empty" style="padding-top:80px;"><div class="empty-icon">🏁</div><div class="empty-title">Подорож завершена</div><div class="empty-sub">Оцініть вашого партнера у вікні зверху</div></div>';
                    return;
                }
            }

            // Waiting for partner confirmation
            if (waitingForPartner) { renderTripsWaiting(); return; }

            if (S.activeTrip) {
                const t = S.activeTrip;
                const isDriver = t.viewer_role === 'driver';
                const isStarted = !!t.is_started;
                const partnerFinished = tripPartnerFinished(t);
                const viewerFinished = tripViewerFinished(t);
                const cancelBy = t.cancel_requested_by;

                const cancelRequested = cancelBy && !isStarted && String(cancelBy) === String(S.userId);
                const liveLocationActive = shouldShareLiveLocation(t);

                if (liveLocationActive) startLocationTracking(); else stopLocationTracking(true);
                container.innerHTML = `
                    <div class="hero ${isStarted ? 'driving' : 'reservation'} animate-in">
                        <div class="hero-label" style="color:${isStarted ? 'var(--accent)' : 'var(--amber)'};">
                            ${isStarted ? '🚀 В ДОРОЗІ' : '⏳ ЕКІПАЖ ФОРМУЄТЬСЯ'}
                        </div>
                        <div class="hero-title">${escapeHtml(t.direction_title || 'Поїздка')}</div>
                        <div class="hero-sub">Екіпаж #${t.crew_id || '—'} • ${isDriver ? '🚗 Ви водій' : '👤 Ви попутник'}</div>
                        ${buildCrewTree(t)}
                        <div class="lifecycle-progress">
                            <div class="lifecycle-step done"><div class="lifecycle-dot"></div>Збіг</div>
                            <div class="lifecycle-arrow"></div>
                            <div class="lifecycle-step ${isStarted ? 'done' : 'active'}"><div class="lifecycle-dot"></div>Екіпаж</div>
                            <div class="lifecycle-arrow"></div>
                            <div class="lifecycle-step ${isStarted ? 'active' : ''}"><div class="lifecycle-dot"></div>В дорозі</div>
                            <div class="lifecycle-arrow"></div>
                            <div class="lifecycle-step"><div class="lifecycle-dot"></div>Завершення</div>
                        </div>
                        ${liveLocationActive ? `<div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="switchScreen('explore')">
                            <span style="font-size:18px;">🗺️</span>
                            <span>${isStarted ? 'Відкрити карту з маркерами екіпажу' : 'Відкрити live-радар точки збору'}</span>
                            <span style="margin-left:auto;color:var(--accent);">→</span>
                        </div>` : ''}
                        ${cancelPending ? `<div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);font-size:13px;color:var(--red);">⚠️ Партнер хоче скасувати поїздку</div>` : ''}
                        ${cancelRequested ? `<div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(255,193,7,0.1);border:1px solid rgba(255,193,7,0.3);font-size:13px;color:var(--amber);">⏳ Очікуємо підтвердження партнера</div>` : ''}
                        ${partnerFinished && !viewerFinished ? `<div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);font-size:13px;color:var(--green);">🏁 Партнер вже відмітив фініш. Підтвердіть завершення, коли подорож справді завершена.</div>` : ''}
                        ${viewerFinished && !partnerFinished ? `<div style="margin-top:12px;padding:10px;border-radius:10px;background:rgba(255,193,7,0.1);border:1px solid rgba(255,193,7,0.3);font-size:13px;color:var(--amber);">⏳ Ви відмітили фініш. Очікуємо підтвердження партнера.</div>` : ''}
                        <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px;">
                            ${!isStarted && isDriver && !cancelRequested ? `<button class="btn btn-primary" onclick="startTrip()">🚀 Поїхали!</button>` : ''}
                            ${isStarted ? `<div style="display:flex;gap:10px;"><button class="btn btn-secondary" style="flex:1;" onclick="openChat(${t.request_id || t.id || 0}, ${isDriver ? (t.client_id || 0) : (t.driver_id || 0)})">💬 Чат</button><button class="btn btn-success" style="flex:1;" onclick="finishTrip()">✅ Завершити подорож</button></div>` : ''}
                            ${cancelPending ? `<div style="display:flex;gap:10px;"><button class="btn btn-primary" style="flex:1;" onclick="confirmCancelTrip()">✅ Згоден скасувати</button><button class="btn btn-secondary" style="flex:1;" onclick="rejectCancelTrip()">❌ Відмовити</button></div>` : ''}
                            ${!isStarted && !cancelPending && !cancelRequested ? `<button class="btn btn-danger" onclick="cancelTrip()">❌ Покинути домовленість</button>` : ''}

                    </div>
                    <div class="section-label">Деталі</div>
                    <div class="card">
                        <div class="card-meta">Водій: ${escapeHtml(t.driver_name || '—')}</div>
                        <div class="card-meta">Пасажир: ${escapeHtml(t.client_name || '—')}</div>
                        <div class="card-meta">Статус: ${t.status || '—'}</div>
                    </div>`;
                return;
            }

            if (S.pendingMatches.length > 0) {
                container.innerHTML = `<div class="section-label">Запити (${S.pendingMatches.length})</div>
                    ${S.pendingMatches.map(m => {
                    const isIncoming = m.scope === 'incoming';
                    const partnerName = isIncoming ? (m.partner_name || m.sender_name || `#${m.partner_id}`) : (m.target_name || m.partner_name || `#${m.target_id}`);
                    const partnerId = isIncoming ? (m.partner_id || m.sender_id) : (m.target_id || m.partner_id);
                    return `<div class="card animate-in" style="border-left:3px solid ${isIncoming ? 'var(--amber)' : 'var(--blue)'};">
                            <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
                                ${renderAvatarInline(partnerName, m.partner_photo_url || m.sender_photo_url || m.target_photo_url || '', 40)}
                                <div style="flex:1;"><div style="font-weight:800;font-size:14px;">${escapeHtml(partnerName)}</div><div style="font-size:11px;color:var(--text-secondary);">${escapeHtml(m.direction || m.direction_title || 'Напрямок')}</div></div>
                                <div class="tag ${isIncoming ? 'tag-amber' : 'tag-blue'}">${isIncoming ? '📩 Вхідний' : '📤 Очікування'}</div>
                            </div>
                            ${isIncoming
                            ? `<div style="display:flex;gap:10px;"><button class="btn btn-primary" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, true)">✓ Прийняти</button><button class="btn btn-danger" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, false)">✕ Відхилити</button></div><button class="btn btn-secondary" style="width:100%;margin-top:10px;" onclick="stopSearchFromHandshake(${partnerId}, ${m.direction_id})">⏹️ Зупинити пошук</button>`
                            : `<div style="display:flex;gap:10px;"><button class="btn btn-secondary" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, false)">🛑 Скасувати запит</button><button class="btn btn-danger" style="flex:1;" onclick="stopSearchFromHandshake(${partnerId}, ${m.direction_id})">⏹️ Зупинити пошук</button></div>`}
                        </div>`;
                }).join('')}`;
                return;
            }

            const isDriver = _isDriverRole(S.userRole);
            const activeSubTitle = escapeHtml(S.subscriptions?.[0]?.title || S.subscriptions?.[0]?.direction_title || '');
            const queueTitle = isDriver ? 'Попутники чекають' : 'Шукаємо для тебе водія';
            const queueSub = isDriver
                ? 'Відкрийте місця — попутники з цього напрямку побачать ваш екіпаж.'
                : 'Підписка активна. Система запропонує допустиму пару без таймера; можна також обрати водія вручну.';
            const queuePulse = isDriver ? 'Очікуємо явний запит' : 'Пошук активний без таймера';
            stopLocationTracking();
            container.innerHTML = `
                ${isDriver ? `<div class="open-crew-btn animate-in" onclick="openMyCrew()">
                    <div class="open-crew-icon">🚗</div>
                    <div class="open-crew-info">
                        <div class="open-crew-title">Я водій: відкрити місця</div>
                        <div class="open-crew-sub">Попутники зможуть запроситись</div>
                    </div>
                    <div class="open-crew-arrow">›</div>
                </div>` : ''}
                <div class="empty" style="padding-top:${isDriver ? '40px' : '80px'};">
                    ${S.subscriptions && S.subscriptions.length > 0
                        ? `<div class="empty-icon">⏳</div>
                           <div class="empty-title">${queueTitle}</div>
                           <div class="empty-sub">${queueSub}</div>
                           ${renderQueuePulse(queuePulse)}
                           ${renderQueueRadarPanel(isDriver)}
                           <div style="margin-top:12px;font-size:12px;color:var(--text-muted);">${activeSubTitle}</div>
                           ${isDriver
                            ? `<button class="btn btn-primary" style="margin-top:16px;" onclick="openMyCrew()">🚗 Я везу — шукаю попутників</button>`
                            : `<button class="btn btn-primary" style="margin-top:16px;" onclick="switchScreen('board')">🔍 Знайти водія в каталозі</button>`}`
                        : `<div class="empty-icon">🧭</div>
                           <div class="empty-title">Немає активних поїздок</div>
                           <div class="empty-sub">${isDriver ? 'Відкрийте екіпаж або знайдіть напрямок' : 'Знайдіть напрямок в каталозі або на мапі'}</div>`
                    }
                    <button class="btn btn-secondary" style="margin-top:20px;" onclick="switchScreen('board')">Перейти до каталогу</button>
                </div>`;
        }

        function renderTripsWaiting() {
            const container = document.getElementById('trips-content');
            if (!container) return;
            const title = S.activeTrip?.direction_title || lastKnownTripForRating?.direction_title || 'Подорож';
            container.innerHTML = `
                <div class="hero reservation animate-in">
                    <div class="hero-label" style="color:var(--amber);">⏳ ОЧІКУВАННЯ</div>
                    <div class="hero-title">${escapeHtml(title)}</div>
                    <div class="hero-sub">Ви відмітили завершення. Очікуємо підтвердження партнера.</div>
                    <div style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;">
                        <div class="pulse-dot"></div>
                        <span style="font-size:13px;color:var(--text-secondary);">Очікування...</span>
                    </div>
                </div>`;
        }

        async function respondHandshake(partnerId, dirId, accept) {
            if (!beginOp('respond_handshake')) return;
            try {
                const res = await api('/api/v3/match/respond', { method: 'POST', body: JSON.stringify({ user_id: S.userId, target_id: partnerId, direction_id: dirId, accept }) });
                if (res?.status === 'ok') {
                    showToast(accept ? '✓ Ваш екіпаж готовий!' : 'Запит відхилено', accept ? 'success' : '');
                    clearCriticalState();
                    await hydrate();
                    return true;
                } else if (res?.reason === 'action_forbidden') {
                    showToast('Після старту — тільки фініш', 'error');
                } else {
                    showToast(getErrorMessage(res, 'Не вдалось обробити запит'), 'error');
                }
            } catch (e) {
                showToast('Немає з\'єднання — спробуйте ще раз', 'error');
            } finally { endOp('respond_handshake'); }
            return false;
        }

        async function stopSearchFromHandshake(partnerId, dirId) {
            const safePartnerId = parseInt(partnerId, 10) || 0;
            const safeDirId = parseInt(dirId, 10) || 0;
            if (!safePartnerId || !safeDirId) {
                showToast('Запит не знайдено', 'error');
                return false;
            }
            if (!beginOp('stop_search')) return false;
            try {
                const res = await api('/api/v3/match/stop-search', {
                    method: 'POST',
                    silent: true,
                    body: JSON.stringify({ user_id: S.userId, target_id: safePartnerId, direction_id: safeDirId })
                });
                if (res?.status === 'ok') {
                    showToast('Пошук зупинено', 'success');
                    clearCriticalState();
                    removePendingMatchByPair(safePartnerId, safeDirId);
                    renderSubBar();
                    renderTrips();
                    verifyHandshakePanelState();
                    await hydrate();
                    return true;
                }
                showToast(getErrorMessage(res, 'Не вдалось зупинити пошук'), 'error');
            } catch (e) {
                showToast('Немає з\'єднання — спробуйте ще раз', 'error');
            } finally { endOp('stop_search'); }
            return false;
        }

        function verifyHandshakePanelState() {
            const panel = document.getElementById('handshake-panel');
            if (!panel) return;

            // Only show panel if we have incoming matches and NO active trip
            const incoming = S.pendingMatches.filter(m => m.scope === 'incoming');

            if (incoming.length === 0 || (S.activeTrip && S.activeTrip.is_started) || waitingForPartner) {
                panel.classList.remove('open');
                panel.innerHTML = '';
                document.body.style.paddingBottom = '';
                return;
            }

            const m = incoming[0];
            const partnerName = m.partner_name || m.sender_name || `#${m.partner_id}`;
            const partnerId = m.partner_id || m.sender_id;
            const dirTitle = m.direction || m.direction_title || 'Напрямок';

            document.body.style.paddingBottom = '170px';

            panel.innerHTML = `
                <div style="font-weight:800;font-size:14px;margin-bottom:4px;color:var(--accent);">🟢 Вхідний запит!</div>
                <div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:12px;">
                    <b>${escapeHtml(partnerName)}</b> • ${escapeHtml(dirTitle)}
                </div>
                <div style="display:flex;gap:10px;">
                    <button class="btn btn-primary" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, true)">✓ Прийняти</button>
                    <button class="btn btn-danger" style="flex:1;" onclick="respondHandshake(${partnerId}, ${m.direction_id}, false)">✕ Відхилити</button>
                </div>
                <button class="btn btn-secondary" style="width:100%;margin-top:10px;" onclick="stopSearchFromHandshake(${partnerId}, ${m.direction_id})">⏹️ Зупинити пошук</button>
            `;
            panel.classList.add('open');
        }

        function currentRequestIdFromTrip(trip) {
            const raw = trip?.id ?? trip?.request_id ?? null;
            const reqId = Number(raw);
            return Number.isFinite(reqId) && reqId > 0 ? reqId : null;
        }

        function tripViewerFinished(trip) {
            if (!trip) return false;
            return trip.viewer_role === 'driver' ? !!trip.driver_finished : !!trip.client_finished;
        }

        function tripPartnerFinished(trip) {
            if (!trip) return false;
            return trip.viewer_role === 'driver' ? !!trip.client_finished : !!trip.driver_finished;
        }

        function shouldPromptPartnerFinish(trip) {
            return !!trip && !!currentRequestIdFromTrip(trip) && tripPartnerFinished(trip) && !tripViewerFinished(trip);
        }

        function maybeOpenPartnerFinishSheet(trip = S.activeTrip) {
            const reqId = currentRequestIdFromTrip(trip);
            if (!reqId || !shouldPromptPartnerFinish(trip)) return false;
            if (S.partnerFinishSheetShownIds.has(reqId)) return false;
            if (isAppInBackground || S.roleGateOpen || S.matchSheetOpen || isSheetOpen()) return false;

            S.partnerFinishSheetShownIds.add(reqId);
            const title = escapeHtml(trip.direction_title || 'поїздка');
            const partner = trip.viewer_role === 'driver' ? 'Попутник' : 'Водій';
            openSheet(`
                <div class="sheet-title">🏁 ${partner} відмітив фініш</div>
                <div class="sheet-sub">Поїздка «${title}» чекає вашого підтвердження. Натисніть завершення тільки якщо ви справді доїхали.</div>
                <div class="sheet-actions">
                    <button class="btn btn-success" id="partner-finish-confirm">✅ Підтвердити завершення</button>
                    <button class="btn btn-secondary" id="partner-finish-open">Відкрити Поїздки</button>
                    <button class="btn btn-ghost" id="partner-finish-later">Ще в дорозі</button>
                </div>
            `);
            document.getElementById('partner-finish-confirm').onclick = () => { closeSheet(); finishTrip(); };
            document.getElementById('partner-finish-open').onclick = () => { closeSheet(); switchScreen('trips'); };
            document.getElementById('partner-finish-later').onclick = () => { closeSheet(); showToast('Фініш лишився у Поїздках', ''); };
            return true;
        }

        function notifyLifecycleTransitions(prevTrip, nextTrip) {
            if (!nextTrip) return;
            const reqId = currentRequestIdFromTrip(nextTrip);
            if (!reqId) return;
            const sameTrip = prevTrip && currentRequestIdFromTrip(prevTrip) === reqId;
            if (sameTrip && !prevTrip.is_started && nextTrip.is_started && nextTrip.viewer_role !== 'driver' && !S.tripStartNotifiedIds.has(reqId)) {
                S.tripStartNotifiedIds.add(reqId);
                showToast('🚀 Водій почав поїздку. Скасування закрито', 'success');
            }
            if (sameTrip && !tripPartnerFinished(prevTrip) && tripPartnerFinished(nextTrip) && !tripViewerFinished(nextTrip) && !S.partnerFinishNotifiedIds.has(reqId)) {
                S.partnerFinishNotifiedIds.add(reqId);
                showToast('🏁 Партнер відмітив фініш. Підтвердіть у Поїздках', '');
            }
            maybeOpenPartnerFinishSheet(nextTrip);
        }

        function buildCrewTree(trip) {
            if (!trip || !trip.members) return '';
            const isDriver = trip.viewer_role === 'driver';
            // Sort: driver first, then passengers, then empty seats
            const sorted = [...trip.members].sort((a, b) => {
                if (a.role === 'driver') return -1;
                if (b.role === 'driver') return 1;
                return 0;
            });
            const totalSeats = trip.total_seats || sorted.length + 1;
            const emptySeats = Math.max(0, totalSeats - sorted.length);
            let html = '<div class="crew-tree">';
            sorted.forEach((m, i) => {
                const isLast = i === sorted.length - 1 && emptySeats === 0;
                const connector = i === 0 ? '' : (isLast ? '└' : '├');
                const isMe = String(m.user_id) === String(S.userId);
                const icon = m.role === 'driver' ? '🚗' : '👤';
                const name = escapeHtml(m.name || `#${m.user_id || '?'}`);
                const roleLabel = m.role === 'driver' ? 'водій' : (isMe ? 'Ви' : '');
                html += `<div class="crew-member${isMe ? ' is-self' : ''}">
                    ${connector ? `<span class="crew-connector">${connector} </span>` : ''}
                    <span class="crew-icon">${icon}</span>
                    <span>${name}</span>
                    ${roleLabel ? `<span class="crew-role">${roleLabel}</span>` : ''}
                </div>`;
            });
            for (let e = 0; e < emptySeats; e++) {
                const isLastE = e === emptySeats - 1;
                const connector = sorted.length === 0 && e === 0 ? '' : (isLastE ? '└' : '├');
                html += `<div class="crew-empty">
                    ${connector ? `<span class="crew-connector">${connector} </span>` : ''}
                    <span class="crew-icon">⬜</span>
                    <span>Вільне місце</span>
                </div>`;
            }
            html += '</div>';
            return html;

        function buildRatingContext(trip) {
            if (!trip) return null;
            const requestId = currentRequestIdFromTrip(trip);
            if (!requestId) return null;
            const viewerRole = String(trip.viewer_role || S.userRole || '').toLowerCase();
            const partnerRaw = viewerRole === 'driver'
                ? (trip.client_id ?? trip.partner_id)
                : (trip.driver_id ?? trip.partner_id);
            const partnerId = Number(partnerRaw);
            if (!Number.isFinite(partnerId) || partnerId <= 0) return null;
            return { request_id: requestId, partner_id: partnerId };
        }

        function getCurrentRatingContext() {
            return S._ratingContext || buildRatingContext(S.activeTrip);
        }

        function currentRequestId() {
            return currentRequestIdFromTrip(S.activeTrip);
        }

        function confirmStartTripIntent() {
            if (!S.activeTrip) return;
            const t = S.activeTrip;
            const crewLabel = t.crew_id ? ` #${parseInt(t.crew_id, 10) || ''}` : '';

        async function startTrip() {
            if (!S.activeTrip) return;
            if (!await confirmStartTripIntent()) return;
            if (!beginOp('start_trip')) return;
            try {
                const reqId = currentRequestId();
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/start', { method: 'POST', body: JSON.stringify({ request_id: reqId, user_id: S.userId }) });
                if (res?.status === 'ok') { showToast('🚀 Поїхали!', 'success'); await hydrate(); }
                else showToast('Помилка старту', 'error');
            } finally { endOp('start_trip'); }
        }

        async function finishTrip() {
            if (!S.activeTrip) return;
            if (!beginOp('finish_trip')) return;
            try {
                const reqId = currentRequestId();
                const tripSnapshot = S.activeTrip ? { ...S.activeTrip } : null;
                const ratingContext = buildRatingContext(tripSnapshot);
                if (!reqId) { showToast('Немає активної поїздки', 'error'); return; }
                const res = await api('/api/v3/trip/done', {
                    method: 'POST',
                    body: JSON.stringify({ request_id: reqId, user_id: S.userId, role: S.activeTrip.viewer_role || S.userRole })
                });
                if (res?.status === 'ok') {
                    stopLocationTracking(true);
                    if (res?.completed) {
                        showToast('🎉 Подорож завершена! Дякуємо.', 'success');
                        waitingForPartner = false;
                        openRatingSheet(ratingContext);
                        lastKnownTripForRating = null;
                    } else {
                        showToast('⏳ Очікуємо підтвердження партнера...', '');
                        waitingForPartner = true;
                        if (tripSnapshot) lastKnownTripForRating = tripSnapshot;
                        renderTripsWaiting();
                    }
                    await hydrate();
                } else if (res?.reason === 'action_forbidden') {
                    showToast('Вже завершено — очікуємо партнера', '');
                } else { showToast('Помилка', 'error'); }
            } finally { endOp('finish_trip'); }

        function escapeAttr(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

        // ═══ SHEET — mobile drag / desktop click-only ═══
        function openSheet(html) {
            document.getElementById('sheet-body').innerHTML = html;
            document.getElementById('sheet-backdrop').classList.add('open');
            document.getElementById('sheet').classList.add('open');
            const sheet = document.getElementById('sheet');

            // Track if sheet is alive (prevents stale event fires)
            const sheetId = Date.now();
            sheet._sheetId = sheetId;

            // ── MOBILE: drag-to-dismiss from sheet ──
            let touchStartY = 0, touchCurrentY = 0, isTouchDragging = false;
            const TOUCH_DISMISS_PX = 150;

            const onTouchStart = (e) => {
                const target = e.target;
                
                // Do not drag if touching interactive/form elements
                if (target.closest('button') || target.closest('input') || target.closest('textarea') || target.closest('select') || target.closest('a')) {
                    touchStartY = 0;
                    return;
                }
                
                // If touching inside the body, only drag if sheet-body is scrolled to the top
                const body = document.getElementById('sheet-body');
                if (body && body.contains(target) && body.scrollTop > 0) {
                    touchStartY = 0;
                    return;
                }

                touchStartY = e.touches[0].clientY;
                touchCurrentY = touchStartY;
                isTouchDragging = false;
                sheet.style.transition = 'none';
            };

            const onTouchMove = (e) => {
                if (sheet._sheetId !== sheetId) return;
                if (!touchStartY) return;
                
                const y = e.touches[0].clientY;
                const diff = y - touchStartY;

                if (!isTouchDragging) {
                    if (diff > 10) {
                        isTouchDragging = true;
                    } else if (diff < -10) {
                        // User swiped up: cancel drag detection so normal scroll occurs
                        touchStartY = 0;
                        return;
                    }
                }

                if (!isTouchDragging) return;

                touchCurrentY = y;
                if (diff > 0) {
                    e.preventDefault();
                    sheet.style.transform = `translateY(${diff * 0.55}px)`; // rubber-band drag
                }
            };

            const onTouchEnd = () => {
                if (sheet._sheetId !== sheetId) return;
                if (!isTouchDragging) { 
                    sheet.style.transition = ''; 
                    touchStartY = 0;
                    return; 
                }
                isTouchDragging = false;
                sheet.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                
                const diff = touchCurrentY - touchStartY;
                touchStartY = 0;
                
                if (diff > TOUCH_DISMISS_PX) {
                    sheet.style.transform = 'translateY(100%)';
                    setTimeout(() => { if (sheet._sheetId === sheetId) closeSheet(); }, 300);
                } else {
                    sheet.style.transform = '';
                }
            };

            sheet.addEventListener('touchstart', onTouchStart, { passive: true });
            sheet.addEventListener('touchmove', onTouchMove, { passive: false });
            sheet.addEventListener('touchend', onTouchEnd);

            // Store cleanup
            sheet._cleanup = () => {
                sheet._sheetId = null;
                sheet.removeEventListener('touchstart', onTouchStart);
                sheet.removeEventListener('touchmove', onTouchMove);
                sheet.removeEventListener('touchend', onTouchEnd);
            };
        }

                showToast('Дата має бути сьогодні або пізніше', 'error'); return;

                        name: title,
                        departure_date: `${date} ${time}`,

                        description: desc || directionText,

        // ═══════ PICKUP LOCATION WITH MAP MARKER ═══════
        async function pickPickupLocation(dirId) {
            if (!navigator.geolocation) { showToast('GPS недоступний', 'error'); return; }
            showToast('📍 Визначення локації...');
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        S.pickupCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        // Show marker on map
                        if (S._pickupMarker && S.map) { S.map.removeLayer(S._pickupMarker); }
                        if (S.map) {
                            S._pickupMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {
                                icon: L.divIcon({
                                    className: '',
                                    html: '<div style="width:32px;height:32px;border-radius:50%;background:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid rgba(0,0,0,0.4);box-shadow:0 2px 10px rgba(251,191,36,0.5);">📍</div>',
                                    iconSize: [32, 32], iconAnchor: [16, 32]
                                })
                            }).addTo(S.map).bindPopup('Моя точка посадки');
                            S.map.flyTo([pos.coords.latitude, pos.coords.longitude], 15, { duration: 1 });
                        }
                        showToast('✓ Точку посадки визначено', 'success');
                        resolve(S.pickupCoords);
                    },
                    () => { showToast('Не вдалося отримати GPS', 'error'); resolve(null); },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }
