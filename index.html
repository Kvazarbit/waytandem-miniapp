<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no,
        viewport-fit=cover">
    <title>WayTandem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ═══════ DESIGN TOKENS ═══════ */
        :root {
            --bg: #0a0e17;
            --bg-elevated: #111827;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-glass: rgba(17, 24, 39, 0.72);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.16);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #a3e635;
            --accent-dim: rgba(163, 230, 53, 0.15);
            --accent-glow: rgba(163, 230, 53, 0.4);
            --blue: #38bdf8;
            --blue-dim: rgba(56, 189, 248, 0.15);
            --amber: #fbbf24;
            --amber-dim: rgba(251, 191, 36, 0.15);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.15);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.15);
            --purple: #a78bfa;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --nav-height: 72px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --header-height: 52px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ═══════ LAYOUT SHELL ═══════ */
        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .header {
            flex-shrink: 0;
            height: var(--header-height);
            padding: 0 16px;
            padding-top: var(--safe-top);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .header-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .header-title .accent {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .role-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-pill.driver {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(163, 230, 53, 0.25);
        }

        .role-pill.passenger {
            background: var(--blue-dim);
            color: var(--blue);
            border: 1px solid rgba(56, 189, 248, 0.25);
        }

        .role-pill.none {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .nav-suggest-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            padding: 6px 12px;
            margin: 0 10px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            display: none;
            align-self: center;
        }
        .floating-suggest-btn {
            position: fixed;
            bottom: calc(var(--nav-height) + 20px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), 0 0 10px var(--accent-glow);
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            white-space: nowrap;
        }
        .floating-suggest-btn.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .avatar-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* 🎯 СОЦІАЛЬНИЙ БАНЕР ПОДІЇ */
        .event-accordion {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.08) 0%, rgba(17, 24, 39, 0.85) 100%);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: var(--radius-md);
            margin: 0 16px 16px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .event-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .event-title-block {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .event-icon-badge {
            font-size: 18px;
            background: rgba(56, 189, 248, 0.12);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .event-meta-info {
            min-width: 0;
        }

        .event-goal-name {
            font-weight: 700;
            font-size: 13.5px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-stats {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .event-arrow {
            font-size: 12px;
            color: var(--blue);
            transition: transform 0.3s ease;
            margin-left: auto;
        }

        .avatar-group {
            display: flex;
            align-items: center;
            margin-left: 8px;
        }

        .avatar-mini {
            border: 1.5px solid #0f172a !important;
            font-size: 8px !important;
            font-weight: 800 !important;
            margin-left: -6px !important;
        }

        .avatar-mini:first-child {
            margin-left: 0 !important;
        }

        .event-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 16px;
        }

        .event-accordion.expanded .event-details {
            max-height: 500px;
            opacity: 1;
            padding-bottom: 16px;
        }

        .event-accordion.expanded .event-arrow {
            transform: rotate(180deg);
        }

        .event-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 12px;
        }

        .event-desc {
            font-size: 12.5px;
            color: var(--text-secondary);
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .event-creator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .creator-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
            color: white;
            font-size: 9px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .creator-info {
            font-size: 12px;
        }

        .creator-name {
            font-weight: 600;
            color: var(--text);
        }

        .creator-label {
            color: var(--text-muted);
            font-size: 10px;
        }

        .event-participants-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .p-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
        }

        .p-avatar {
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            font-size: 9px !important;
            font-weight: 800 !important;
        }

        .p-name {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .p-role-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
        }

        .p-role-tag.passenger {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .p-role-tag.driver {
            background: var(--accent-dim);
            color: var(--accent);
        }

        /* 🚗 Візуальна панель місць */
        .capacity-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            max-width: 320px;
            margin: 12px auto 0;
            text-align: left;
        }

        .capacity-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .seats-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .seat-dot {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .seat-dot.driver-seat {
            background: var(--blue-dim);
            color: var(--blue);
            border: 1px solid rgba(56, 189, 248, 0.25);
        }

        .seat-dot.free {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px dashed rgba(163, 230, 53, 0.3);
        }

        .seat-dot.taken {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .freshness-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 10px;
        }

        .search-icon-container {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .search-icon-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--accent-dim);
            animation: pulse-ring-large 2.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .search-icon {
            font-size: 32px;
            z-index: 2;
        }

        .freshness-indicator .pulse-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent);
            animation: pulse-ring 1.8s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            top: 0;
            left: 0;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.33);
            }
            80%, 100% {
                opacity: 0;
            }
        }

        @keyframes pulse-ring-large {
            0% {
                transform: scale(0.66);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .avatar-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .avatar-inline {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            overflow: hidden;
            color: #fff;
            flex-shrink: 0;
        }

        /* ═══ SUBSCRIPTION BAR ═══ */
        .sub-bar {
            flex-shrink: 0;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(163, 230, 53, 0.08), rgba(163, 230, 53, 0.03));
            border-bottom: 1px solid rgba(163, 230, 53, 0.15);
            z-index: 99;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .sub-bar::-webkit-scrollbar {
            display: none;
        }

        .sub-bar:empty {
            display: none;
            padding: 0;
            border: none;
            height: 0;
        }

        .sub-bar-chip {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 14px;
            background: rgba(163, 230, 53, 0.12);
            border: 1px solid rgba(163, 230, 53, 0.2);
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sub-bar-chip:active {
            background: rgba(163, 230, 53, 0.2);
            transform: scale(0.96);
        }

        .sub-bar-pending {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 14px;
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.2);
            font-size: 11px;
            font-weight: 700;
            color: var(--amber);
            cursor: pointer;
        }

        .sub-bar-crew {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 14px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            cursor: pointer;
        }

        .sub-bar-text {
            flex: 1;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ═══ OPEN CREW BUTTON ═══ */
        .open-crew-btn {
            margin: 12px 16px;
            padding: 16px 20px;
            border-radius: var(--radius-xl);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(99, 102, 241, 0.1));
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .open-crew-btn:active {
            transform: scale(0.98);
            border-color: var(--blue);
        }

        .open-crew-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .open-crew-info {
            flex: 1;
        }

        .open-crew-title {
            font-weight: 800;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .open-crew-sub {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .open-crew-arrow {
            color: var(--blue);
            font-size: 20px;
        }

        .req-pending-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--amber-dim);
            color: var(--amber);
            font-size: 10px;
            font-weight: 800;
            animation: pulse-amber 2s infinite;
        }

        @keyframes pulse-amber {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .screen {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .screen::-webkit-scrollbar {
            display: none;
        }

        .nav {
            flex-shrink: 0;
            height: calc(var(--nav-height) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav.board-deep {
            justify-content: center;
            gap: 10px;
        }

        .nav.board-deep .nav-item[data-tab="board"],
        .nav.board-deep .nav-item[data-tab="board-add"] {
            flex-direction: row;
            gap: 8px;
            min-width: 150px;
            padding: 10px 18px;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .nav.board-deep .nav-item[data-tab="board"] span,
        .nav.board-deep .nav-item[data-tab="board-add"] span {
            font-size: 12px;
            font-weight: 800;
        }

        /* Акцентна кнопка "Додати подію" в нижньому меню каталогу */
        .nav.board-deep .nav-item[data-tab="board-add"] {
            color: #000;
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .nav-badge {
            position: absolute;
            top: 2px;
            right: 6px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            background: var(--red);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .badge-pulse {
            animation: badge-pulse 0.5s ease 3;
        }
        @keyframes badge-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* ═══════ REUSABLE COMPONENTS ═══════ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin: 0 16px 12px;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s;
        }

        .card:active {
            border-color: var(--border-active);
        }

        .card-title {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .hero {
            margin: 12px 16px;
            border-radius: var(--radius-xl);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .hero.reservation {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.12) 0%, rgba(17, 24, 39, 0.9) 100%);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .hero.driving {
            background: linear-gradient(135deg, rgba(163, 230, 53, 0.12) 0%, rgba(17, 24, 39, 0.9) 100%);
            border: 1px solid rgba(163, 230, 53, 0.3);
        }

        .hero-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-title {
            font-weight: 900;
            font-size: 22px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .hero-sub {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .lifecycle-progress {
            display: flex;
            align-items: center;
            gap: 0;
            margin-top: 14px;
            padding: 0 4px;
        }
        .lifecycle-step {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .lifecycle-step.active { color: var(--accent); font-weight: 600; }
        .lifecycle-step.done { color: var(--green); }
        .lifecycle-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }
        .lifecycle-step.active .lifecycle-dot { background: var(--accent); }
        .lifecycle-step.done .lifecycle-dot { background: var(--green); }
        .lifecycle-arrow {
            flex: 1;
            height: 2px;
            background: var(--border);
            min-width: 8px;
        }
        .lifecycle-step.done + .lifecycle-arrow,
        .lifecycle-step.done ~ .lifecycle-arrow { background: var(--green); }

        .crew-tree {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .crew-member {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 14px;
            color: var(--text-primary);
        }
        .crew-member.is-self { color: var(--accent); font-weight: 600; }
        .crew-member .crew-icon { font-size: 16px; flex-shrink: 0; }
        .crew-member .crew-connector {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 12px;
            margin-right: 2px;
        }
        .crew-member .crew-role {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
        }
        .crew-empty {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-weight: 800;
            font-size: 13px;
            text-align: center;
            line-height: 1.2;
            white-space: normal;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            min-height: 48px;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .btn-success {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            padding: 10px 16px;
            min-height: 40px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin: 12px 16px;
        }

        .btn-row .btn {
            flex: 1;
        }

        .section-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 16px 16px 8px;
        }

        .news-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-right: 16px;
        }

        .news-scope-btn {
            flex-shrink: 0;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }

        .news-scope-btn.scope-sub {
            border-color: var(--accent);
            color: var(--accent);
        }

        .news-scope-btn:active {
            transform: scale(0.97);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .tag-accent {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tag-amber {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .tag-blue {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .tag-red {
            background: var(--red-dim);
            color: var(--red);
        }

        .tag-green {
            background: var(--green-dim);
            color: var(--green);
        }

        .seats-row {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-top: 8px;
        }

        .seat-dot {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .seat-dot.taken {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .seat-dot.free {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px dashed rgba(163, 230, 53, 0.3);
        }

        .seat-dot.driver-seat {
            background: var(--blue-dim);
            color: var(--blue);
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 32px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-title {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .empty-sub {
            font-size: 13px;
            color: var(--text-muted);
            max-width: 240px;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ═══════ BOTTOM SHEET ═══════ */
        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 9000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .sheet-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            z-index: 9001;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: none;
        }

        .sheet.open {
            transform: translateY(0);
            pointer-events: auto;
        }

        .sheet-card {
            margin: 0 8px;
            margin-bottom: max(8px, var(--safe-bottom));
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5);
        }

        .sheet-handle {
            display: flex;
            justify-content: center;
            padding: 16px 0 12px;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }

        .sheet-handle-bar {
            width: 44px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.25);
            transition: background 0.15s ease, width 0.15s ease;
        }

        .sheet-handle:active .sheet-handle-bar {
            background: rgba(255, 255, 255, 0.45);
            width: 48px;
        }

        .sheet-body {
            padding: 0 20px 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .sheet-title {
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .sheet-sub {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .sheet-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        /* ═══════ SCREEN: EXPLORE ═══════ */
        #screen-explore {
            display: flex;
            flex-direction: column;
        }

        #map-container {
            flex: 1;
            min-height: 200px;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-overlay-cards {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(transparent, var(--bg) 30%);
            z-index: 500;
            pointer-events: none;
            display: none;
        }

        .map-fab-stack {
            position: absolute;
            right: 16px;
            bottom: 120px;
            z-index: 520;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .map-fab {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 22px rgba(0,0,0,0.24);
            pointer-events: auto;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
        }

        .map-fab:active {
            transform: scale(0.96);
        }

        .map-focus-btn {
            background: rgba(251,191,36,0.14);
            border-color: rgba(251,191,36,0.45);
            color: #fbbf24;
            transition: all 0.3s ease;
        }
        .map-fab.location-active {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: #000 !important;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Маркер власної локації — синя пульсуюча точка */
        .my-loc-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2f7bff;
            border: 2px solid #fff;
            box-shadow: 0 0 0 rgba(47,123,255,0.5);
            animation: my-loc-pulse 2s infinite;
            margin: 3px;
        }
        @keyframes my-loc-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(47,123,255,0.5); }
            70%  { box-shadow: 0 0 0 14px rgba(47,123,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(47,123,255,0); }
        }

        .map-pin {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 16px;
            font-weight: 900;
            color: #081018;
            border: 2px solid rgba(0,0,0,0.35);
            box-shadow: 0 6px 18px rgba(0,0,0,0.28);
            transform-origin: center;
        }

        .map-pin-event {
            background: #fbbf24;
            box-shadow: 0 0 18px rgba(251,191,36,0.42), 0 6px 18px rgba(0,0,0,0.28);
        }

        .map-pin-theocracy {
            background: #a78bfa;
            box-shadow: 0 0 18px rgba(167,139,250,0.42), 0 6px 18px rgba(0,0,0,0.28);
        }

        .map-pin-leisure {
            background: #34d399;
            box-shadow: 0 0 18px rgba(52,211,153,0.42), 0 6px 18px rgba(0,0,0,0.28);
        }

        .map-pin-work {
            background: #38bdf8;
            box-shadow: 0 0 18px rgba(56,189,248,0.42), 0 6px 18px rgba(0,0,0,0.28);
        }

        .map-pin-crew {
            background: var(--accent);
            box-shadow: 0 0 18px var(--accent-glow), 0 6px 18px rgba(0,0,0,0.28);
        }

        .map-pin-focused {
            background: #fbbf24;
            transform: scale(1.08);
            box-shadow: 0 0 0 4px rgba(251,191,36,0.22), 0 0 18px rgba(251,191,36,0.46), 0 6px 18px rgba(0,0,0,0.28);
        }

        .map-pin-full {
            opacity: 0.58;
            filter: grayscale(0.35);
        }

        .map-pin-badge {
            position: absolute;
            right: -6px;
            top: -7px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: #111827;
            border: 2px solid #fff;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            line-height: 1;
        }

        /* ── LOCATION MAP PICKER (overlay над формою) ── */
        .map-picker {
            position: fixed;
            inset: 0;
            z-index: 9500;
            background: var(--bg-card);
        }
        .map-picker-map {
            position: absolute;
            inset: 0;
            z-index: 1; /* власний stacking-контекст: внутрішні шари Leaflet не перекривають пін і кнопки */
        }
        /* Нерухомий пін по центру: його кінчик вказує на центр карти */
        .map-picker-pin {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -100%);
            font-size: 38px;
            line-height: 1;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.45));
        }
        .map-picker-top {
            position: absolute;
            top: calc(8px + var(--safe-top, 0px));
            left: 12px;
            right: 12px;
            z-index: 20;
        }
        .map-picker-search {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.24);
            outline: none;
        }
        .map-picker-results {
            margin-top: 6px;
            max-height: 230px;
            overflow-y: auto;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            box-shadow: 0 8px 22px rgba(0,0,0,0.28);
        }
        .map-picker-results:empty {
            display: none;
        }
        .map-picker-result {
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .map-picker-result:last-child { border-bottom: none; }
        .map-picker-result:active { background: rgba(255,255,255,0.06); }
        .map-picker-gps {
            position: absolute;
            right: 16px;
            bottom: 150px;
            z-index: 20;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(0,0,0,0.24);
        }
        .map-picker-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 88px;
            z-index: 20;
            background: rgba(0,0,0,0.62);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 7px 12px;
            border-radius: 999px;
            white-space: nowrap;
            pointer-events: none;
        }
        .map-picker-bottom {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            display: flex;
            gap: 10px;
            padding: 12px 12px calc(12px + var(--safe-bottom));
            background: linear-gradient(to top, var(--bg-card) 70%, transparent);
        }

        .map-focus-btn[hidden] {
            display: none;
        }

        .map-overlay-cards>* {
            pointer-events: auto;
        }

        .crew-mini-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .crew-mini-card:active {
            border-color: var(--accent);
        }

        .crew-mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            color: #fff;
            flex-shrink: 0;
        }

        .crew-mini-info {
            flex: 1;
            min-width: 0;
        }

        .crew-mini-name {
            font-weight: 800;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .crew-mini-dir {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .crew-mini-seats {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 8px;
            background: var(--accent-dim);
            color: var(--accent);
            white-space: nowrap;
        }

        /* Спільний абсолютний стек для смуг над картою: «Режим:» + банери-фільтри.
           Flex-стовпець гарантує, що фільтри завжди під смугою режиму без накладання,
           незалежно від висоти (раніше були крихкі фіксовані top:12px / top:54px). */
        .map-top-stack {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 505;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .map-top-stack > * {
            pointer-events: auto;
        }

        .news-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .news-strip::-webkit-scrollbar {
            display: none;
        }

        .map-mode-strip {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            line-height: 1.25;
        }

        .map-mode-label {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .map-mode-value {
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .map-scope-btn {
            flex-shrink: 0;
            margin-left: auto;
            padding: 5px 11px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
        }

        .map-scope-btn.scope-sub {
            border-color: var(--accent);
            color: var(--accent);
        }

        .map-scope-btn:active {
            transform: scale(0.97);
        }

        .news-chip {
            flex-shrink: 0;
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
        }

        /* ═══════ SCREEN: BOARD ═══════ */
        #screen-board {
            padding-bottom: 20px;
        }

        .board-breadcrumb {
            margin: 10px 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 30px;
        }

        .board-crumb-back {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .board-crumb-path {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .board-search {
            margin: 12px 16px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            width: calc(100% - 32px);
            transition: border-color 0.2s;
        }

        .board-search::placeholder {
            color: var(--text-muted);
        }

        .board-search:focus {
            border-color: var(--accent);
        }

        .dir-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            margin: 0 16px 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.15s;
        }

        .dir-card:active {
            border-color: var(--accent);
            transform: scale(0.98);
        }

        .dir-card-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .dir-card-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.95;
        }

        .dir-card-info {
            flex: 1;
            min-width: 0;
        }

        .dir-card-name {
            font-weight: 800;
            font-size: 15px;
        }

        .dir-card-stats {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-top: 2px;
            display: flex;
            gap: 3px;
            flex-direction: column;
            align-items: flex-start;
        }

        .dir-card-total {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            max-width: 100%;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-weight: 700;
            line-height: 1.35;
        }

        .dir-card-context {
            color: var(--text-muted);
            font-weight: 600;
            line-height: 1.35;
        }

        .dir-card-arrow {
            color: var(--text-muted);
            font-size: 18px;
        }

        .dir-card.subscribed {
            border-color: rgba(52, 211, 153, 0.25);
            background: rgba(52, 211, 153, 0.04);
        }

            margin: 0 16px 12px;
        }

        .board-folder-action .btn {
            width: 100%;

            padding-bottom: 20px;
        }

        .news-banners {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin: 8px 16px 12px;
        }

            border: 1px solid var(--border);
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
        }

        .news-banner:active {
            transform: scale(0.98);
        }

        .news-banner.active {
            border-color: rgba(163, 230, 53, 0.45);
            background: rgba(163, 230, 53, 0.08);
        }

        .news-banner-title {
            font-size: 11px;
            font-weight: 800;
            color: var(--text);
        }

        .news-banner-count {
            margin-top: 4px;
            font-size: 12px;
            font-weight: 900;
            color: var(--accent);
        }

           Стосується лише смуги над картою (#news-strip), не екрана новин. */
        #news-strip .news-banner.active .news-banner-title,

            color: #0b1117;

        }

<body>
    <div id="app">
        <!-- SKELETON OVERLAY -->
        <div id="skeleton-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9998;padding-top:60px;">
            <div style="padding:16px;">
                <div class="skeleton" style="height:48px;margin-bottom:12px;border-radius:8px;"></div>
                <div class="skeleton" style="height:32px;width:60%;margin-bottom:24px;border-radius:6px;"></div>
                <div class="skeleton" style="height:120px;margin-bottom:12px;border-radius:12px;"></div>
                <div class="skeleton" style="height:120px;margin-bottom:12px;border-radius:12px;"></div>
                <div class="skeleton" style="height:120px;border-radius:12px;"></div>
            </div>
        </div>
        <!-- HEADER -->
        <div class="header">
            <div class="header-title"><span class="accent">Way</span>Tandem</div>
            <div class="header-right">
                <div class="role-pill none" id="role-pill" onclick="openRoleSelector()"></div>
                <div class="avatar-btn" id="avatar-btn" onclick="switchScreen('profile')"></div>
            </div>
        </div>

        <!-- SUBSCRIPTION BAR -->
        <div class="sub-bar" id="sub-bar"></div>

        <!-- MAIN SCREENS -->
        <div class="main">
            <!-- EXPLORE -->
            <div class="screen active" id="screen-explore">
                <div class="map-top-stack">
                    <div class="map-mode-strip" id="map-mode-strip" style="display:none;"></div>
                    <div class="news-strip" id="news-strip" style="display:none;"></div>
                </div>
                <div id="map-container">
                    <div id="map"></div>
                    <div class="map-overlay-cards" id="map-overlay-cards"></div>
                </div>
            </div>

            <!-- BOARD -->
            <div class="screen" id="screen-board">
                <div style="display:flex;padding:12px 16px 0;">
                    <input class="board-search" id="board-search" placeholder="🔍 Пошук напрямку..."
                        oninput="filterBoard(this.value)" style="flex:1;margin:0;width:100%;">
                </div>
                <div class="board-breadcrumb" id="board-breadcrumb"></div>
                <div id="board-list"></div>
            </div>

            <!-- NEWS -->
            <div class="screen" id="screen-news">
                <div class="news-head">
                    <div class="section-label">Стрічка Новин</div>
                    <button class="news-scope-btn" id="news-scope-btn" onclick="toggleNewsScope()" type="button" style="display:none;"></button>
                </div>
                <div class="news-banners" id="news-banners"></div>
                <div class="news-feed" id="news-feed"></div>
            </div>

            <!-- TRIPS -->
            <div class="screen" id="screen-trips">
                <div id="trips-content"></div>
            </div>

            <!-- PROFILE -->
            <div class="screen" id="screen-profile">
                <div class="profile-header">
                    <div class="profile-avatar" id="profile-avatar">?</div>
                    <div class="profile-name" id="profile-name">Користувач</div>
                    <div class="profile-id" id="profile-id">Telegram: —</div>
                </div>
                <div class="settings-group">
                    <div class="settings-row" onclick="openRoleSelector()">
                        <div class="settings-icon">👤</div>
                        <div class="settings-label">Роль</div>
                        <div class="settings-value" id="settings-role">Не обрано</div>
                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-row" id="settings-row-car" onclick="openCarSettings()">
                        <div class="settings-icon">🚗</div>
                        <div class="settings-label">Авто</div>
                        <div class="settings-value" id="settings-car">—</div>
                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-row" id="settings-row-seats" onclick="openSeatsSettings()">
                        <div class="settings-icon">💺</div>
                        <div class="settings-label">Місць</div>
                        <div class="settings-value" id="settings-seats">4</div>
                        <div class="settings-arrow">›</div>
                    </div>
                </div>
                <div class="settings-group">
                    <div class="settings-row" onclick="openMyIdeas()">
                        <div class="settings-icon">💡</div>
                        <div class="settings-label">Моя подія</div>
                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-row" onclick="openTripHistory()">
                        <div class="settings-icon">📋</div>

                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-row">
                        <div class="settings-icon">🔔</div>

                        </div>
                    </div>
                    <div class="settings-row" onclick="toggleAppSound()">
                        <div class="settings-icon">🔊</div>
                        <div class="settings-label">Звуки в додатку</div>
                        <div class="settings-value" id="settings-sound">Важливі</div>
                        <div class="toggle on" id="toggle-app-sound"></div>
                    </div>
                </div>
            </div>
        </div>
