<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WayTandem Client</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f2f2f2; }
header { background: #333; padding: 10px; color: white; display: flex; align-items: center; }
header button { background: #555; color: white; border: none; padding: 10px 15px; margin-right: 5px; cursor: pointer; }
header button.active { background: #007BFF; }
.tabcontent { display: none; padding: 20px; }
.list-item { background: white; padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.list-item:hover { background: #e6e6e6; }
.list-item .title { font-weight: bold; flex: 1; }
.form-group { margin-bottom: 10px; }
.form-group label { display: block; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
button { cursor: pointer; }
.chat-box { border: 1px solid #ccc; padding: 10px; height: 200px; overflow-y: auto; background: white; margin-bottom: 10px; }
.chat-message { margin-bottom: 5px; }
.chat-message span { font-weight: bold; }
</style>
</head>
<body>
<header>
  <button id="discoverBtn">Discover</button>
  <button id="createBtn">Create</button>
  <button id="myBtn">My Missions</button>
  <button id="profileBtn">Profile</button>
</header>

<div id="discoverTab" class="tabcontent">
  <h2>Discover Missions</h2>
  <div id="missionsList">Loading missions...</div>
</div>

<div id="createTab" class="tabcontent">
  <h2>Create New Mission</h2>
  <div class="form-group">
    <label for="titleInput">Title:</label>
    <input type="text" id="titleInput">
  </div>
  <div class="form-group">
    <label for="routeSelect">Route (Category):</label>
    <select id="routeSelect"><option value="">No route</option></select>
  </div>
  <div class="form-group">
    <label for="descInput">Description:</label>
    <textarea id="descInput" rows="3"></textarea>
  </div>
  <button id="createBtnAction">Create Mission</button>
  <div id="createStatus"></div>
</div>

<div id="myTab" class="tabcontent">
  <h2>My Missions</h2>
  <div id="myMissionsList">You haven't joined any missions.</div>
</div>

<div id="profileTab" class="tabcontent">
  <h2>Profile</h2>
  <div class="form-group">
    <label for="usernameInput">Username:</label>
    <input type="text" id="usernameInput">
  </div>
  <button id="saveUserBtn">Save Username</button>
  <div id="profileStatus"></div>
</div>

<div id="missionDetailTab" class="tabcontent">
  <button id="backBtn">← Back</button>
  <h2 id="detailTitle">Mission Detail</h2>
  <p><strong>Route:</strong> <span id="detailRoute"></span></p>
  <p><strong>Description:</strong> <span id="detailDesc"></span></p>
  <p><strong>Crew:</strong> <span id="detailCrew"></span></p>
  <button id="joinBtn">Join</button>
  <button id="leaveBtn">Leave</button>
  <h3>Chat</h3>
  <div class="chat-box" id="chatBox"></div>
  <div>
    <input type="text" id="chatInput" placeholder="Type a message..." style="width: 80%;">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
var API_URL = 'http://localhost:8020';

// State
var username = '';
var joinedMissions = []; // list of mission objects {id, title, drivers, passengers}
var currentMission = null;
var chats = {}; // missionId -> messages array
var lastTab = 'discover';

// Show a particular tab
function openTab(tabName) {
    lastTab = tabName;
    document.querySelectorAll('.tabcontent').forEach(function(el) {
        el.style.display = 'none';
    });
    document.getElementById(tabName + 'Tab').style.display = 'block';
    document.querySelectorAll('header button').forEach(function(btn) {
        btn.classList.remove('active');
    });
    document.getElementById(tabName + 'Btn').classList.add('active');
}

// Load username from localStorage
function loadUsername() {
    var stored = localStorage.getItem('username');
    if (stored) {
        username = stored;
        document.getElementById('usernameInput').value = username;
        return true;
    } else {
        openTab('profile');
        return false;
    }
}

// Save username
function saveUsername() {
    var val = document.getElementById('usernameInput').value.trim();
    if (val) {
        localStorage.setItem('username', val);
        username = val;
        document.getElementById('profileStatus').textContent = 'Username saved!';
    } else {
        document.getElementById('profileStatus').textContent = 'Username cannot be empty.';
    }
}

// Load joined missions from localStorage
function loadJoinedMissions() {
    var stored = localStorage.getItem('joinedMissions');
    if (stored) {
        try {
            joinedMissions = JSON.parse(stored);
        } catch(e) {
            joinedMissions = [];
        }
    } else {
        joinedMissions = [];
    }
}

// Save joined missions
function saveJoinedMissions() {
    localStorage.setItem('joinedMissions', JSON.stringify(joinedMissions));
}

// Fetch and display missions in Discover
async function loadMissions() {
    var listEl = document.getElementById('missionsList');
    listEl.innerHTML = 'Loading missions...';
    try {
        var res = await fetch(API_URL + '/api/v3/board');
        if (!res.ok) { listEl.textContent = 'Failed to load missions.'; return; }
        var data = await res.json();
        if (!data || data.length === 0) {
            listEl.innerHTML = 'No missions found.';
            return;
        }
        var html = '';
        data.forEach(function(m) {
            html += '<div class="list-item" data-id="' + m.id + '">' +
                    '<div class="title">' + m.title + '</div>' +
                    '<div>🚗 ' + m.drivers + '</div>' +
                    '<div>👤 ' + m.passengers + '</div>' +
                    '</div>';
        });
        listEl.innerHTML = html;
        document.querySelectorAll('#missionsList .list-item').forEach(function(item) {
            item.addEventListener('click', function() {
                var id = this.dataset.id;
                var mission = data.find(function(x){ return x.id == id; });
                if (mission) {
                    openMissionDetail(mission);
                }
            });
        });
    } catch (e) {
        listEl.textContent = 'Error loading missions.';
    }
}

// Populate route select (using top-level board items as categories)
async function loadRoutes() {
    var sel = document.getElementById('routeSelect');
    sel.innerHTML = '<option value="">No route</option>';
    try {
        var res = await fetch(API_URL + '/api/v3/board');
        if (!res.ok) return;
        var data = await res.json();
        data.forEach(function(m) {
            sel.innerHTML += '<option value="' + m.id + '">' + m.title + '</option>';
        });
    } catch (e) {}
}

// Create mission via API
async function createMission() {
    var title = document.getElementById('titleInput').value.trim();
    var route = document.getElementById('routeSelect').value;
    var desc = document.getElementById('descInput').value.trim();
    if (!title) {
        document.getElementById('createStatus').textContent = 'Title required.';
        return;
    }
    var body = { title: title };
    if (route) body.parent_id = Number(route);
    try {
        var res = await fetch(API_URL + '/api/v3/board', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            document.getElementById('createStatus').textContent = 'Failed to create.';
            return;
        }
        var result = await res.json();
        if (result && result.status === 'ok') {
            document.getElementById('createStatus').textContent = 'Mission created!';
            loadMissions();
            var created;
            if (route) {
                var res2 = await fetch(API_URL + '/api/v3/board?parent_id=' + route);
                var children = await res2.json();
                created = children.find(x => x.title === title);
            } else {
                var all = await (await fetch(API_URL + '/api/v3/board')).json();
                created = all.find(x => x.title === title);
            }
            if (created) {
                localStorage.setItem('desc_' + created.id, desc);
                joinedMissions.push({
                    id: created.id,
                    title: created.title,
                    drivers: created.drivers || 0,
                    passengers: created.passengers || 0
                });
                saveJoinedMissions();
                document.getElementById('titleInput').value = '';
                document.getElementById('descInput').value = '';
            }
        } else {
            document.getElementById('createStatus').textContent = 'Error creating.';
        }
    } catch(e) {
        document.getElementById('createStatus').textContent = 'Error connecting.';
    }
}

// Open mission detail view
function openMissionDetail(mission) {
    currentMission = mission;
    document.getElementById('detailTitle').textContent = mission.title;
    document.getElementById('detailDesc').textContent = localStorage.getItem('desc_' + mission.id) || '';
    document.getElementById('detailRoute').textContent = mission.parent_id ? 'Category ' + mission.parent_id : '';
    var isJoined = joinedMissions.some(m => m.id == mission.id);
    var drivers = mission.drivers || 0;
    var passengers = mission.passengers || 0;
    if (isJoined) passengers += 1;
    document.getElementById('detailCrew').textContent = '🚗 ' + drivers + ' · 👤 ' + passengers;
    if (isJoined) {
        document.getElementById('joinBtn').style.display = 'none';
        document.getElementById('leaveBtn').style.display = 'inline';
    } else {
        document.getElementById('joinBtn').style.display = 'inline';
        document.getElementById('leaveBtn').style.display = 'none';
    }
    document.getElementById('chatBox').innerHTML = '';
    openTab('missionDetail');
}

// Join mission (as passenger)
function joinCurrentMission() {
    if (!currentMission) return;
    if (!joinedMissions.some(m => m.id == currentMission.id)) {
        joinedMissions.push({
            id: currentMission.id,
            title: currentMission.title,
            drivers: currentMission.drivers || 0,
            passengers: currentMission.passengers || 0
        });
        saveJoinedMissions();
    }
    openMissionDetail(currentMission);
    renderMyMissions();
}

// Leave mission
function leaveCurrentMission() {
    if (!currentMission) return;
    joinedMissions = joinedMissions.filter(m => m.id != currentMission.id);
    saveJoinedMissions();
    openMissionDetail(currentMission);
    renderMyMissions();
}

// Render My Missions list
function renderMyMissions() {
    var listEl = document.getElementById('myMissionsList');
    if (joinedMissions.length === 0) {
        listEl.textContent = 'You haven\\'t joined any missions.';
        return;
    }
    var html = '';
    joinedMissions.forEach(function(m) {
        html += '<div class="list-item" data-id="' + m.id + '">' +
                '<div class="title">' + m.title + '</div>' +
                '<div>🚗 ' + (m.drivers||0) + '</div>' +
                '<div>👤 ' + (m.passengers||0) + '</div>' +
                '</div>';
    });
    listEl.innerHTML = html;
    document.querySelectorAll('#myMissionsList .list-item').forEach(function(item) {
        item.addEventListener('click', function() {
            var id = this.dataset.id;
            var mission = joinedMissions.find(function(x){ return x.id == id; });
            if (mission) {
                openMissionDetail(mission);
            }
        });
    });
}

// Chat send message
function sendMessage() {
    var text = document.getElementById('chatInput').value.trim();
    if (!text || !currentMission) return;
    var msg = { user: username, text: text, time: new Date().toLocaleTimeString() };
    if (!chats[currentMission.id]) chats[currentMission.id] = [];
    chats[currentMission.id].push(msg);
    var box = document.getElementById('chatBox');
    var div = document.createElement('div');
    div.className = 'chat-message';
    div.innerHTML = '<span>' + msg.user + ':</span> ' + msg.text;
    box.appendChild(div);
    document.getElementById('chatInput').value = '';
    box.scrollTop = box.scrollHeight;
}

document.getElementById('backBtn').addEventListener('click', function() {
    openTab(lastTab);
});
document.getElementById('discoverBtn').addEventListener('click', function(){ openTab('discover'); loadMissions(); });
document.getElementById('createBtn').addEventListener('click', function(){ openTab('create'); loadRoutes(); });
document.getElementById('myBtn').addEventListener('click', function(){ openTab('my'); renderMyMissions(); });
document.getElementById('profileBtn').addEventListener('click', function(){ openTab('profile'); });
document.getElementById('saveUserBtn').addEventListener('click', saveUsername);
document.getElementById('createBtnAction').addEventListener('click', createMission);
document.getElementById('joinBtn').addEventListener('click', joinCurrentMission);
document.getElementById('leaveBtn').addEventListener('click', leaveCurrentMission);
document.getElementById('sendBtn').addEventListener('click', sendMessage);

// Init
loadJoinedMissions();
if (loadUsername()) {
    openTab('discover');
    loadMissions();
}
</script>
</body>
</html>
