<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WayTandem</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080A0F; --s1:#0E1118; --s2:#141926; --s3:#1C2235;
  --rim:rgba(255,255,255,0.06); --rim2:rgba(255,255,255,0.11);
  --g1:#C8FF57; --g2:#A8EF3C;
  --b1:#57D1FF; --b2:#38B8F0;
  --r1:#FF5757; --o1:#FFB347;
  --w:#EEF1F8; --w2:#8890AA; --w3:#3D4460;
  --rad:20px; --rad2:14px; --rad3:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;width:100%;background:var(--bg);color:var(--w);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
/* grain */
#app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");}
/* ambients */
.amb{position:fixed;pointer-events:none;border-radius:50%;filter:blur(90px);transition:all 1.4s cubic-bezier(.4,0,.2,1);}
#a1{width:340px;height:340px;top:-100px;right:-80px;background:rgba(200,255,87,.07);}
#a2{width:300px;height:300px;bottom:40px;left:-90px;background:rgba(87,209,255,.06);}
#a3{width:180px;height:180px;top:38%;left:28%;background:rgba(255,87,87,.05);opacity:0;transition:opacity .8s;}

/* HDR */
.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px;
  background:linear-gradient(110deg,var(--g1),var(--b1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.hdr-pill{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--rim);padding:5px 11px 5px 5px;border-radius:30px;font-size:12px;color:var(--w2);}
.hdr-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--b1));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#080A0F;}
.mode-badge{font-size:10px;font-weight:700;letter-spacing:.8px;padding:4px 9px;border-radius:20px;text-transform:uppercase;}
.mode-g{background:rgba(200,255,87,.1);color:var(--g1);border:1px solid rgba(200,255,87,.2);}
.mode-b{background:rgba(87,209,255,.1);color:var(--b1);border:1px solid rgba(87,209,255,.2);}

/* STAGE BAR */
.sbar{position:relative;z-index:10;display:flex;align-items:center;gap:9px;padding:0 18px 12px;flex-shrink:0;}
.sdots{display:flex;gap:4px;align-items:center;}
.sd{height:3px;border-radius:2px;background:var(--w3);transition:all .3s;}
.sd.a{background:var(--g1);width:20px;}
.sd.d{background:var(--w2);width:8px;}
.sd.t{width:8px;}
.slbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--w3);}

/* CARD AREA */
.ca{flex:1;position:relative;overflow:hidden;padding:0 14px;}
.card{position:absolute;inset:0 14px;display:flex;flex-direction:column;border-radius:var(--rad);border:1px solid var(--rim);background:var(--s1);overflow:hidden;
  transition:transform .38s cubic-bezier(.34,1.15,.64,1),opacity .32s;
  transform:translateX(0) scale(1);opacity:1;will-change:transform,opacity;}
.card.xl{transform:translateX(108%) scale(.93);opacity:0;}
.card.xr{transform:translateX(-108%) scale(.93);opacity:0;}
.card.er{transform:translateX(108%) scale(.93);opacity:0;}
.card.el{transform:translateX(-108%) scale(.93);opacity:0;}
.card.in{transform:translateX(0) scale(1);opacity:1;}

/* HERO */
.hero{flex-shrink:0;padding:24px 22px 20px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,var(--s1) 100%);pointer-events:none;}
.h-em{font-size:52px;line-height:1;display:block;margin-bottom:14px;filter:drop-shadow(0 6px 20px rgba(0,0,0,.4));}
.h-tag{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--w3);margin-bottom:5px;}
.h-ttl{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(20px,5.5vw,26px);line-height:1.15;color:var(--w);}
.h-ttl em{font-style:normal;}
.h-sub{font-size:13px;color:var(--w2);margin-top:7px;line-height:1.55;font-weight:300;}

/* BODY */
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 22px 12px;scrollbar-width:none;}
.body::-webkit-scrollbar{display:none;}

/* ACTIONS */
.acts{flex-shrink:0;padding:10px 18px calc(10px + var(--safe-b));display:flex;flex-direction:column;gap:8px;
  background:linear-gradient(to top,var(--s1) 75%,transparent);}

/* BTNS */
.btn{width:100%;padding:14px 18px;border-radius:var(--rad2);border:none;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .14s,box-shadow .14s;position:relative;overflow:hidden;}
.btn:active{transform:scale(.97);}
.btn-p{background:linear-gradient(135deg,var(--g1),var(--g2));color:#080A0F;box-shadow:0 5px 24px rgba(200,255,87,.26);}
.btn-b{background:linear-gradient(135deg,var(--b1),var(--b2));color:#080A0F;box-shadow:0 5px 24px rgba(87,209,255,.20);}
.btn-g{background:var(--s2);border:1px solid var(--rim);color:var(--w2);}
.btn-d{background:rgba(255,87,87,.09);border:1px solid rgba(255,87,87,.18);color:var(--r1);}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* ── FRACTAL BOARD SPECIFIC ── */

/* Mode selector — 3 cards side by side */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.mode-card{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:14px 12px;
  cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:6px;}
.mode-card:active{transform:scale(.97);}
.mode-card.mc-g{border-color:rgba(200,255,87,.2);background:rgba(200,255,87,.04);}
.mode-card.mc-b{border-color:rgba(87,209,255,.2);background:rgba(87,209,255,.04);}
.mode-card.mc-o{border-color:rgba(255,179,71,.2);background:rgba(255,179,71,.04);}
.mc-ico{font-size:26px;line-height:1;}
.mc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;}
.mc-sub{font-size:11px;color:var(--w2);line-height:1.4;}

/* Breadcrumb trail */
.breadcrumb{display:flex;align-items:center;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.bc-seg{font-size:11px;color:var(--w3);cursor:pointer;padding:3px 7px;border-radius:8px;transition:all .15s;}
.bc-seg:hover,.bc-seg:active{background:var(--s2);color:var(--w2);}
.bc-seg.cur{color:var(--w);background:var(--s3);}
.bc-arr{font-size:10px;color:var(--w3);}

/* Dir item with shutter expand */
.dir-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.dir-item{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);overflow:hidden;transition:border-color .2s;}
.dir-item.pinned{border-color:rgba(200,255,87,.3);background:rgba(200,255,87,.03);}
.dir-item.pinned-b{border-color:rgba(87,209,255,.3);background:rgba(87,209,255,.03);}
.dir-item.expanded{border-color:var(--b1);}
.dir-row{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;user-select:none;}
.dir-row:active{background:rgba(255,255,255,.03);}
.di-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--s3);}
.di-icon.g{background:rgba(200,255,87,.1);}
.di-icon.b{background:rgba(87,209,255,.1);}
.di-icon.has-kids{background:linear-gradient(135deg,rgba(200,255,87,.12),rgba(87,209,255,.12));}
.di-body{flex:1;min-width:0;}
.di-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.di-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap;}
.di-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;}
.di-tag.g{background:rgba(200,255,87,.1);color:var(--g1);}
.di-tag.b{background:rgba(87,209,255,.1);color:var(--b1);}
.di-tag.w{background:var(--s3);color:var(--w3);}
.di-tag.o{background:rgba(255,179,71,.1);color:var(--o1);}
.di-count{font-size:11px;color:var(--w2);}
.di-right{flex-shrink:0;display:flex;align-items:center;gap:5px;}
.di-chevron{font-size:11px;color:var(--w3);transition:transform .25s;}
.dir-item.expanded .di-chevron{transform:rotate(180deg);}

/* Shutter (expanded panel inside dir-item) */
.shutter{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.shutter.open{max-height:220px;}
.shutter-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:7px;}
.sh-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sh-stat{background:var(--s3);border-radius:var(--rad3);padding:8px 10px;}
.sh-label{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--w3);margin-bottom:2px;}
.sh-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.sh-val.g{color:var(--g1);} .sh-val.b{color:var(--b1);}
.sh-btn-row{display:flex;gap:7px;}
.sh-btn{flex:1;padding:9px 10px;border-radius:var(--rad3);border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.sh-btn:active{transform:scale(.97);}
.sh-btn-p{background:linear-gradient(135deg,var(--g1),var(--g2));color:#080A0F;}
.sh-btn-b{background:linear-gradient(135deg,var(--b1),var(--b2));color:#080A0F;}
.sh-btn-g{background:var(--s3);color:var(--w2);border:1px solid var(--rim);}
.sh-btn-d{background:rgba(255,87,87,.09);color:var(--r1);border:1px solid rgba(255,87,87,.15);}
.sh-divider{height:1px;background:var(--rim);margin:0 -14px;}
.sh-kids-hint{font-size:11px;color:var(--b1);cursor:pointer;display:flex;align-items:center;gap:5px;padding:2px 0;}

/* Pagination row */
.pag-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0 2px;}
.pag-btn{padding:7px 14px;border-radius:var(--rad3);border:none;background:var(--s2);border:1px solid var(--rim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--w2);cursor:pointer;transition:all .15s;}
.pag-btn:disabled{opacity:.3;cursor:default;}
.pag-info{font-size:12px;color:var(--w3);}

/* Sort toggle */
.sort-row{display:flex;gap:6px;margin-bottom:12px;}
.sort-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--rim);background:var(--s2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--w3);cursor:pointer;transition:all .15s;}
.sort-btn.on{background:var(--s3);border-color:var(--rim2);color:var(--w);}

/* Group cards */
.group-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.grp-card{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:13px 14px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;}
.grp-card:active{transform:scale(.98);}
.grp-av{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--b1),rgba(200,255,87,.6));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.grp-body{flex:1;min-width:0;}
.grp-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.grp-meta{font-size:11px;color:var(--w2);margin-top:2px;}
.grp-badge{flex-shrink:0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;}
.grp-open{background:rgba(200,255,87,.1);color:var(--g1);}
.grp-closed{background:var(--s3);color:var(--w3);}

/* Misc shared */
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--w3);margin-bottom:9px;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.stat-cell{background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:11px 13px;}
.stat-label{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--w3);margin-bottom:3px;}
.stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.stat-val.g{color:var(--g1);} .stat-val.b{color:var(--b1);}

.seat-row{display:flex;gap:6px;margin-bottom:13px;}
.seat-btn{flex:1;padding:10px 5px;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--w2);cursor:pointer;text-align:center;transition:all .17s;}
.seat-btn.sel{background:rgba(200,255,87,.1);border-color:var(--g1);color:var(--g1);}

.member-list{display:flex;flex-direction:column;gap:6px;margin-bottom:11px;}
.member{display:flex;align-items:center;gap:11px;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:10px 13px;}
.member.you{border-color:rgba(87,209,255,.25);background:rgba(87,209,255,.04);}
.member.drv{border-color:rgba(200,255,87,.2);background:rgba(200,255,87,.04);}
.member.empty{opacity:.32;}
.m-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.m-av.d{background:linear-gradient(135deg,var(--g1),#80E800);color:#080A0F;}
.m-av.y{background:linear-gradient(135deg,var(--b1),var(--b2));color:#080A0F;}
.m-av.p{background:var(--s3);color:var(--w2);}
.m-av.e{background:var(--s3);border:1px dashed var(--w3);}
.m-name{font-weight:600;font-size:13px;}
.m-sub{font-size:11px;color:var(--w3);margin-top:1px;}
.m-tag{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 6px;border-radius:5px;}
.m-tag.d{background:rgba(200,255,87,.1);color:var(--g1);}
.m-tag.y{background:rgba(87,209,255,.1);color:var(--b1);}

.radar-line{display:flex;align-items:center;gap:9px;background:var(--s3);border-radius:11px;padding:9px 13px;margin-bottom:11px;}
.r-dot{width:7px;height:7px;border-radius:50%;background:var(--g1);box-shadow:0 0 10px var(--g1);animation:pulse 1.8s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.7);}}
.r-txt{font-size:12px;color:var(--w2);}
.r-cnt{color:var(--g1);font-weight:700;}

.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(200,255,87,.09);border:1px solid rgba(200,255,87,.2);padding:4px 11px;border-radius:30px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--g1);margin-bottom:12px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--g1);box-shadow:0 0 7px var(--g1);animation:pulse 1.2s infinite;}

.stars{display:flex;gap:7px;justify-content:center;padding:8px 0 14px;}
.star{font-size:36px;cursor:pointer;transition:transform .17s;filter:grayscale(1) opacity(.3);}
.star.on{filter:none;transform:scale(1.1);}

.wait-anim{font-size:60px;display:block;text-align:center;margin:14px 0 18px;animation:float 2.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-11px);}}

.contact-card{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:13px 15px;margin-bottom:11px;}
.c-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#5b7fff,#9f6fff);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;flex-shrink:0;}
.c-name{font-weight:600;font-size:15px;}
.c-meta{font-size:11px;color:var(--w2);margin-top:2px;}
.c-dir{font-size:11px;color:var(--b1);margin-top:2px;}

.hist-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.hist-item{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:12px 14px;}
.h-ico{width:38px;height:38px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.h-info{flex:1;min-width:0;}
.h-dir{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-meta{font-size:11px;color:var(--w2);margin-top:2px;}
.h-stars{font-size:11px;margin-top:2px;}

/* Toast */
#toast{position:fixed;bottom:calc(72px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--s3);border:1px solid var(--rim2);padding:9px 18px;border-radius:30px;
  font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;z-index:999;
  transition:all .26s cubic-bezier(.34,1.3,.64,1);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--g1);color:var(--g1);}
#toast.err{border-color:var(--r1);color:var(--r1);}
#toast.warn{border-color:var(--o1);color:var(--o1);}

/* NAV */
.nav{position:relative;z-index:10;display:flex;background:rgba(8,10,15,.94);backdrop-filter:blur(22px);border-top:1px solid var(--rim);padding:7px 0 calc(7px + var(--safe-b));flex-shrink:0;}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px;cursor:pointer;color:var(--w3);transition:color .14s;position:relative;user-select:none;}
.nv.on{color:var(--g1);}
.nv-ico{font-size:20px;line-height:1;position:relative;}
.nv-lbl{font-size:8px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;}
.nv-badge{position:absolute;top:-3px;right:-7px;min-width:14px;height:14px;border-radius:7px;background:var(--r1);font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 3px;}
.nv-badge.show{display:flex;}

/* SHEET */
.sheet-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);display:none;align-items:flex-end;}
.sheet-ov.open{display:flex;}
.sheet{background:var(--s1);border:1px solid var(--rim);border-radius:22px 22px 0 0;padding:18px 18px calc(18px + var(--safe-b));width:100%;animation:sup .3s cubic-bezier(.34,1.2,.64,1);}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:30px;height:3px;border-radius:2px;background:var(--w3);margin:0 auto 16px;}
.sh-ttl{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;}
.fld label{display:block;font-size:11px;color:var(--w3);font-weight:500;margin-bottom:5px;letter-spacing:.4px;}
.fld input{width:100%;background:var(--s2);border:1px solid var(--rim);border-radius:var(--rad2);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--w);outline:none;transition:border-color .2s;margin-bottom:11px;}
.fld input:focus{border-color:var(--b1);}
.fld input::placeholder{color:var(--w3);}
</style>
</head>
<body>
<div id="app">
  <div class="amb" id="a1"></div>
  <div class="amb" id="a2"></div>
  <div class="amb" id="a3"></div>

var tg = window.Telegram && window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('#080A0F');tg.setBackgroundColor('#080A0F');}catch(e){}}

// 🌐 API Configuration
var API_URL = "https://3b5c12985fb953.lhr.life"; 

async function apiFetch(endpoint, params = {}) {
  if (!API_URL || API_URL.includes("your-ngrok-id")) return null;
  var url = new URL(API_URL + endpoint);
  Object.keys(params).forEach(function(key) { url.searchParams.append(key, params[key]); });
  
  try {
    var response = await fetch(url, {
      headers: { 'Authorization': 'tma ' + (tg ? tg.initData : '') }
    });
    if (!response.ok) throw new Error('API Error');
    return await response.json();
  } catch (e) {
    console.error("Fetch failed:", e);
    return null;
  }
}

async function loadBoardData() {
  var params = {};
  if (S.board.parentId) params.parent_id = S.board.parentId;
  if (S.board.groupId) params.group_id = S.board.groupId;
  
  var data = await apiFetch('/api/v3/board', params);
  if (data) {
    S.dirs = data;
    renderCurrent();
  }
}

async function loadGroupsData() {
  var data = await apiFetch('/api/v3/groups');
  if (data) {
    S.groups = data;
    renderCurrent();
  }
}

async function loadHistoryData() {
  var uid = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || 0;
  var data = await apiFetch('/api/v3/history', { user_id: uid });
  if (data) {
    S.history = data;
    renderCurrent();
  }
}

function renderCurrent() {
  var area = document.getElementById('ca');
  var card = area.querySelector('.card');
  if (card && SCENES[curScene]) card.innerHTML = SCENES[curScene].render();
}

  dirs:[], // 🛡 v24.7.1: Clean Slate
  groups:[],
  privateDirs:[],
  
  board:{ mode:null, parentId:null, groupId:null, page:0, sort:'popularity', expandedId:null },

SCENES.bg={label:'Маршрути',flow:'board',stage:2,total:4,render:function(){
  var b=S.board;
  var LIMIT=4;
  
  var pool=S.dirs.filter(function(d){
    return d.group_id===null && d.parent_id===b.parentId;
  });
  
  if(b.sort==='popularity') pool.sort(function(a,c){return (c.drivers+c.passengers)-(a.drivers+a.passengers);});
  else pool.sort(function(a,c){return c.id-a.id;});
  
  if(b.page===0){
    var pinned=pool.filter(function(d){return d.sub;});
    var rest=pool.filter(function(d){return !d.sub;});
    pool=pinned.concat(rest);
  }
  var offset=b.page*LIMIT;
  var page=pool.slice(offset,offset+LIMIT);
  var hasNext=pool.length>offset+LIMIT;
  var hasPrev=b.page>0;

  var bc='<div class="breadcrumb">'
    +'<span class="bc-seg" onclick="_bsm(\'global\')">🌐 Глобальна</span>';
  if(b.parentId!==null){
    var parent=S.dirs.find(function(d){return d.id===b.parentId;});
    if(parent) bc+='<span class="bc-arr">›</span><span class="bc-seg cur">'+parent.title+'</span>';
  }
  bc+='</div>';

  var items=page.map(function(d){
    var isExp=b.expandedId===d.id;
    var isSub=d.sub;
    var cls='dir-item'+(isSub?(S.role==='driver'?' pinned':' pinned-b'):'')+(isExp?' expanded':'');
    var icoClass=d.has_kids?'di-icon has-kids':(isSub?(S.role==='driver'?'di-icon g':'di-icon b'):'di-icon');
    var icoEmoji=d.has_kids?'📁':(d.drivers>0?'🚗':'📍');
    var tagHtml='';
    if(isSub) tagHtml='<span class="di-tag '+(S.role==='driver'?'g':'b')+'">'+(S.role==='driver'?'Ви тут':'Активно')+'</span>';
    else if(d.drivers>0) tagHtml='<span class="di-tag g">'+d.drivers+' 🚗</span>';
    else tagHtml='<span class="di-tag w">Тихо</span>';
    if(d.has_kids) tagHtml+='<span class="di-tag b" style="margin-left:3px">↳ підрозділи</span>';

    var shutterHtml='';
    if(!d.has_kids){
      var subBtn=(isSub)
        ?'<div class="sh-btn sh-btn-d" onclick="event.stopPropagation();_bun('+d.id+')">Відписатись</div>'
        :(S.role==='driver'
          ?'<div class="sh-btn sh-btn-p" onclick="event.stopPropagation();_bsu('+d.id+')">✅ Я їду сюди</div>'
          :'<div class="sh-btn sh-btn-b" onclick="event.stopPropagation();_bsu('+d.id+')">✅ Підписатись</div>');
      var hsBtn=S.role==='passenger'&&d.drivers>0
        ?'<div class="sh-btn sh-btn-g" onclick="event.stopPropagation();_shs('+d.id+')">👋 Попроситись</div>':'' ;
      shutterHtml='<div class="shutter'+(isExp?' open':'')+'"><div class="shutter-body">'
        +'<div class="sh-divider" style="margin:0 -14px 10px"></div>'
        +'<div class="sh-stats">'
        +'<div class="sh-stat"><div class="sh-label">Мандрівники</div><div class="sh-val g">'+d.drivers+'</div></div>'
        +'<div class="sh-stat"><div class="sh-label">Попутники</div><div class="sh-val b">'+d.passengers+'</div></div>'
        +'</div>'
        +(d.meeting_point?'<div style="font-size:11px;color:var(--w2)">📍 '+d.meeting_point+'</div>':'')
        +'<div class="sh-btn-row">'+subBtn+hsBtn+'</div>'
        +'</div></div>';
    } else {
      shutterHtml='<div class="shutter'+(isExp?' open':'')+'"><div class="shutter-body">'
        +'<div class="sh-divider" style="margin:0 -14px 10px"></div>'
        +'<div class="sh-kids-hint" onclick="event.stopPropagation();_bdi('+d.id+')">'
        +'↳ Відкрити підрозділи ('+S.dirs.filter(function(x){return x.parent_id===d.id;}).length+' маршрутів)'
        +'<span style="color:var(--b1)">→</span>'
        +'</div>'
        +'<div class="sh-stats">'
        +'<div class="sh-stat"><div class="sh-label">Водіїв всього</div><div class="sh-val g">'+d.drivers+'</div></div>'
        +'<div class="sh-stat"><div class="sh-label">Попутників</div><div class="sh-val b">'+d.passengers+'</div></div>'
        +'</div>'
        +'</div></div>';
    }
    return '<div class="'+cls+'" id="dir'+d.id+'">'
      +'<div class="dir-row" onclick="_be('+d.id+')">'
      +'<div class="'+icoClass+'">'+icoEmoji+'</div>'
      +'<div class="di-body">'
      +'<div class="di-name">'+d.title+'</div>'
      +'<div class="di-meta">'+tagHtml+'<span class="di-count">'+d.drivers+'🚗&nbsp;'+d.passengers+'👤</span></div>'
      +'</div>'
      +'<div class="di-right"><span class="di-chevron">▾</span></div>'
      +'</div>'
      +shutterHtml
      +'</div>';
  }).join('');

  if(!page.length) items='<div style="color:var(--w3);font-size:13px;padding:12px 0;text-align:center">Немає маршрутів у цьому розділі</div>';

  var sortHtml='<div class="sort-row">'
    +'<div class="sort-btn'+(b.sort==='popularity'?' on':'')+'" onclick="_bs(\'popularity\')">🔥 Популярні</div>'
    +'<div class="sort-btn'+(b.sort==='newest'?' on':'')+'" onclick="_bs(\'newest\')">🆕 Нові</div>'
    +'</div>';

  var pagHtml='<div class="pag-row">'
    +'<button class="pag-btn" onclick="_bp(-1)"'+(hasPrev?'':' disabled')+'>← Назад</button>'
    +'<span class="pag-info">Стор. '+(b.page+1)+'</span>'
    +'<button class="pag-btn" onclick="_bp(1)"'+(hasNext?'':' disabled')+'>Далі →</button>'
    +'</div>';

  var backBtn=b.parentId!==null
    ?'<div class="btn btn-g" onclick="_bdb()">← Назад до списку</div>'
    :'<div class="btn btn-g" onclick="go(\'bm\')">← Змінити режим</div>';

  return '<div class="hero" style="padding-bottom:12px">'
    +'<span class="h-em">'+(b.parentId!==null?'📁':'🌐')+'</span>'
    +'<div class="h-tag">Глобальна дошка</div>'
    +'<div class="h-ttl" style="font-size:20px">'+(b.parentId!==null?(S.dirs.find(function(d){return d.id===b.parentId;})||{title:''}).title:'Всі напрямки')+'</div>'
    +'</div>'
    +'<div class="body">'
    +bc
    +sortHtml
    +'<div class="dir-list">'+items+'</div>'
    +pagHtml
    +'</div>'
    +'<div class="acts">'
    +'<div class="btn btn-g" onclick="_os(\'shNewDir\')">+ Запропонувати маршрут</div>'
    +backBtn
    +'</div>';
}};

SCENES.bp={label:'Приватні',flow:'board',stage:2,total:4,render:function(){
  var items=S.privateDirs.map(function(d){
    return '<div class="dir-item" style="border-color:rgba(255,179,71,.2);background:rgba(255,179,71,.04)">'
      +'<div class="dir-row" onclick="_be('+d.id+')">'

var curScene='role';

function go(id,dir){
  if(!dir)dir='right';
  if(!SCENES[id])return;
  var area=document.getElementById('ca');
  var old=area.querySelector('.card');
  var card=document.createElement('div');
  card.className='card '+(dir==='right'?'er':'el');
  card.innerHTML=SCENES[id].render();
  area.appendChild(card);
  if(old){old.classList.add(dir==='right'?'xl':'xr');setTimeout(function(){if(old.parentNode)old.parentNode.removeChild(old);},420);}
  requestAnimationFrame(function(){requestAnimationFrame(function(){card.classList.remove('er','el');card.classList.add('in');});});
  curScene=id;
  _updateSbar();_updateNav();_updateAmbient();_updateModeBadge();
}

function _updateSbar(){
  var sc=SCENES[curScene];
  var d=document.getElementById('sdots');
  var l=document.getElementById('slbl');
  l.textContent=sc.label;
  var h='';
  for(var i=1;i<=sc.total;i++){
    if(i<sc.stage)h+='<div class="sd d"></div>';
    else if(i===sc.stage)h+='<div class="sd a"></div>';
    else h+='<div class="sd t"></div>';
  }
  d.innerHTML=h;
}
function _updateNav(){
  var fm={home:0,board:1,crew:2,trips:3};
  var idx=fm[SCENES[curScene].flow]||0;
  document.querySelectorAll('.nv').forEach(function(n,i){n.classList.toggle('on',i===idx);});
}
function _updateAmbient(){
  var c={home:'rgba(200,255,87,.07)',board:'rgba(200,255,87,.05)',crew:'rgba(87,209,255,.07)',trips:'rgba(87,209,255,.05)'};
  document.getElementById('a1').style.background=c[SCENES[curScene].flow]||c.home;
  document.getElementById('a3').style.opacity=['rating','it'].indexOf(curScene)>=0?'1':'0';
}
function _updateModeBadge(){
  var b=document.getElementById('modeBadge');
  if(!S.role){b.style.display='none';return;}
  b.style.display='';
  b.className='mode-badge '+(S.role==='driver'?'mode-g':'mode-b');
  b.textContent=S.role==='driver'?'🚗 Мандрівник':'👤 Попутник';
}

function navTo(i){
  var m={0:S.role?'role_'+S.role:'role',1:'bm',2:S._cf==='idle'?'hsi':S._cf,3:'mt'};
  if(m[i]&&SCENES[m[i]]){
    go(m[i]);
    // 🌐 v24.6: Load real data when board tab is clicked
    if(i===1) loadBoardData();
  }
}

function _ob(){
  S.board.parentId=null;S.board.page=0;S.board.expandedId=null;
  go('bm');
  loadBoardData(); // 🌐 v24.6: Load real data
}
function _bsm(m){
  S.board.mode=m;S.board.parentId=null;S.board.page=0;S.board.expandedId=null;
  if(m==='global')go('bg');
  else if(m==='groups')go('bgg');
  else go('bp');
}
function _bdi(parentId){
  S.board.parentId=parentId;S.board.page=0;S.board.expandedId=null;
  go('bg');
  toast('📁 Відкрито підрозділи','');
}
function _bdb(){
  
  if(S.board.parentId!==null){
    var cur=S.dirs.find(function(d){return d.id===S.board.parentId;});
    S.board.parentId=cur?cur.parent_id:null;
  }
  S.board.page=0;S.board.expandedId=null;
  go('bg','left');
}
function _bog(gid){
  S.board.groupId=gid;go('bgv');
}
function _be(id){
  S.board.expandedId=S.board.expandedId===id?null:id;
  
  var area=document.getElementById('ca');
  var card=area.querySelector('.card');
  if(card){
    var scrollY=card.querySelector('.body')?card.querySelector('.body').scrollTop:0;
    card.innerHTML=SCENES[curScene].render();
    var b=card.querySelector('.body');
    if(b)b.scrollTop=scrollY;
  }
}
function _bs(s){
  S.board.sort=s;S.board.page=0;S.board.expandedId=null;
  var area=document.getElementById('ca');
  var card=area.querySelector('.card');
  if(card){card.innerHTML=SCENES[curScene].render();}
}
function _bp(d){
  S.board.page=Math.max(0,S.board.page+d);
  S.board.expandedId=null;
  var area=document.getElementById('ca');
  var card=area.querySelector('.card');
  if(card){card.innerHTML=SCENES[curScene].render();}
}
function _bod(id){
  
  var d=S.dirs.find(function(x){return x.id===id;});
  if(!d)return;
  S.board.mode='global';
  S.board.parentId=d.parent_id;
  S.board.expandedId=id;
  S.board.page=0;
  go('bg');
}
function _bsu(id){
  var d=S.dirs.find(function(x){return x.id===id;});
  if(!d)return;
  d.sub=true;
  if(S.role==='driver')d.drivers++;else d.passengers++;
  toast('✅ Підписано: '+d.title,'ok');
  S.board.expandedId=null;
  var area=document.getElementById('ca');
  var card=area.querySelector('.card');
  if(card)card.innerHTML=SCENES[curScene].render();
}
function _bun(id){
  var d=S.dirs.find(function(x){return x.id===id;});
  if(!d)return;
  d.sub=false;
  if(S.role==='driver')d.drivers=Math.max(0,d.drivers-1);else d.passengers=Math.max(0,d.passengers-1);
  toast('📤 Відписано','');
  S.board.expandedId=null;
  var area=document.getElementById('ca');
  var card=area.querySelector('.card');
  if(card)card.innerHTML=SCENES[curScene].render();
}

function _pr(r){S.role=r;go('role_'+r);}
function _gh(){go(S.role?'role_'+S.role:'role');}
function _ss(n){S.seats=n;go('rd');toast('🚘 Місць: '+n,'ok');}

function _shs(id){
  S._sd=S.dirs.find(function(d){return d.id===id;});
  S._cf='waiting';go('waiting');
}
function _cw(){S._cf='idle';_gh();toast('🚫 Запит скасовано','');}
function _ahs(){
  S._cf='ic';
  var b=document.getElementById('crewBadge');if(b)b.classList.remove('show');
  go('ic');toast('✅ Марію додано до екіпажу','ok');
  if(!S.crew.passengers.find(function(p){return p.name==='Марія Т.';})){
    S.crew.passengers.push({name:'Марія Т.',rating:4.9});
    S.crew.freeSeats=Math.max(0,S.crew.freeSeats-1);
  }
}
function _dhs(){
  S._cf='idle';
  var b=document.getElementById('crewBadge');if(b)b.classList.remove('show');
  go('rd','left');toast('❌ Запит відхилено','');
}
function _lhs(){S._cf='idle';go('rp','left');toast('↩ Покинуто резервацію','');}
function _st(){S._cf='it';go('it');toast('🚀 Гарної дороги!','ok');}
function _ft(){S._cf='rating';S.rating=4;go('rating');toast('🏁 Поїздку завершено','ok');}
function _sr(n){S.rating=n;var c=document.getElementById('ca').querySelector('.card');if(c)c.innerHTML=SCENES.rating.render();}
function _snr(){
  S._cf='idle';
  S.history.unshift({dir:S.crew.dirTitle,date:'Сьогодні',role:S.role==='driver'?'Мандрівник':'Попутник',stars:S.rating});
  toast('⭐ Оцінку '+S.rating+'/5 надіслано!','ok');
  if(tg)tg.sendData(JSON.stringify({action:'rating',value:S.rating,crew:S.crew.id}));
  setTimeout(function(){go(S.role?'role_'+S.role:'role');},500);
}
function _cd(){
  var v=document.getElementById('ndInput').value.trim();
  if(v.length<3){toast('⚠️ Мінімум 3 символи','err');return;}
  var meet=document.getElementById('ndMeet').value.trim()||null;
  var pid=S.board.parentId;var gid=S.board.mode==='groups'?S.board.groupId:null;
  S.dirs.unshift({id:Date.now(),title:v,parent_id:pid,group_id:gid,drivers:1,passengers:0,has_kids:false,sub:true,kind:'custom',meeting_point:meet||null});
  _cs('shNewDir');
  document.getElementById('ndInput').value='';document.getElementById('ndMeet').value='';
  toast('✅ "'+v+'" додано!','ok');
  var c=document.getElementById('ca').querySelector('.card');if(c)c.innerHTML=SCENES[curScene].render();
}
function _sm(){
  var i=document.getElementById('chatIn');var v=i.value.trim();if(!v)return;
  var log=document.getElementById('chatLog');
  log.innerHTML+=(log.innerHTML?'<br>':'')+'👤 <b style="color:var(--b1)">'+S.user.name.split(' ')[0]+'</b>: '+v;
  i.value='';log.scrollTop=log.scrollHeight;
}

function _os(id){document.getElementById(id).classList.add('open');}
function _cs(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.sheet-ov').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});
});

var _tt;
function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m;el.className='toast show '+(t||'');
  clearTimeout(_tt);_tt=setTimeout(function(){el.className='toast';},2600);
}

function init(){
  var n=S.user.name;
  document.getElementById('hdAv').textContent=n[0]?n[0].toUpperCase():'?';
  document.getElementById('hdName').textContent=n.split(' ')[0];
  
  document.getElementById('chatLog').innerHTML='🚗 <b style="color:var(--g1)">Олег</b>: Виїжджаю о 9:00<br>👤 <b style="color:var(--b1)">Ви</b>: Буду на місці!';
